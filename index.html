const weakness=st=>{const acc=st.attempts?st.errors/st.attempts:0;const slow=Math.min(median(st.lat)/600,1);return 0.15+acc*2+slow;};
const pick=stats=>{const w=SYMBOLS.map(s=>weakness(stats[s.ch]));const tot=w.reduce((p,q)=>p+q,0);let r=Math.random()*tot;
  for(let i=0;i<SYMBOLS.length;i++){r-=w[i];if(r<=0)return SYMBOLS[i];}return SYMBOLS[SYMBOLS.length-1];};

/* ── Sketch: every keystroke unfolds a single continuous line a little — MORE when correct,
   a little when you miss — so it draws live as you type. Faster typing → faster drawing.
   One drawing fills over ~STROKES_GOAL key-units (≈ a 5-minute session). pathLength="100"
   normalizes each path so stroke-dashoffset reveals the right fraction. */
const STROKES_GOAL=200;   // key-units to finish a drawing (~5 min of typing)
const STEP_OK=1;          // a correct key unfolds this much
const STEP_MISS=0.34;     // a miss still nudges it forward a little
// Simple, iconic line drawings — clean thick blue stroke in the lesson style, no fills or filters.
// Each is one connected path; pathLength="100" lets us reveal a fraction with stroke-dashoffset.
const SKETCHES=[
  { name:"a heart",       d:"M60,40 C50,22 25,25 25,52 C25,75 60,98 60,98 C60,98 95,75 95,52 C95,25 70,22 60,40 Z" },
  { name:"a star",        d:"M60,18 L72,50 L106,50 L78,71 L90,103 L60,82 L30,103 L42,71 L14,50 L48,50 Z" },
  { name:"a check",       d:"M22,62 L48,90 L100,28" },
  { name:"a house",       d:"M28,98 L28,55 L60,28 L92,55 L92,98 M52,98 L52,72 L68,72 L68,98" },
  { name:"a mountain",    d:"M10,95 L40,42 L62,65 L82,40 L110,95" },
  { name:"a balloon",     d:"M60,18 C30,18 30,62 60,74 C90,62 90,18 60,18 M60,74 L60,98" },
  { name:"an arrow",      d:"M18,60 L92,60 M76,42 L94,60 L76,78" },
  { name:"a leaf",        d:"M60,98 C60,80 60,62 60,52 C40,52 28,38 30,22 C46,22 60,32 60,52 C60,32 74,22 90,22 C92,38 80,52 60,52" },
  { name:"a key",         d:"M40,60 a14,14 0 1,1 28,0 a14,14 0 1,1 -28,0 M68,60 L104,60 M90,60 L90,74 M98,60 L98,72" },
  { name:"a smiley face", d:"M60,15 C90,15 100,55 70,80 C40,90 22,72 22,45 C22,22 40,15 60,15 M42,42 L42,42 M78,42 L78,42 M40,60 C50,76 70,76 80,60" },
];
const randomSketch=cur=>{ if(SKETCHES.length<2)return 0; let i; do{ i=Math.floor(Math.random()*SKETCHES.length); }while(i===cur); return i; };

/* ── Biodiversity ladder — unlock order mirrors real ecological succession ── */
const GARDEN_LADDER=[
  {id:"wf",   name:"native wildflowers",      emoji:"🌸",threshold:3,
   fact:"Plant in clusters of a few square feet — pollinators find and forage them far more easily."},
  {id:"water",name:"a birdbath",              emoji:"💧",threshold:8,
   fact:"Wildlife needs three things: food, water, and cover. This is the water."},
  {id:"bh",   name:"a bee house",             emoji:"🐝",threshold:15,
   fact:"Solitary bees can pollinate up to ~20× more than honeybees — and most can't sting."},
  {id:"bug",  name:"a bug hotel",             emoji:"🌿",threshold:24,
   fact:"Fallen leaves shelter insects through winter — food for ground-feeding birds."},
  {id:"berry",name:"berry shrubs",            emoji:"🫐",threshold:35,
   fact:"Native berries pack more fat and energy than invasive fruit, and birds prefer them."},
  {id:"oak",  name:"a native oak & nest box", emoji:"🌳",threshold:48,
   fact:"One oak can host hundreds of caterpillar species — the food nesting birds feed their young."},
  {id:"bat",  name:"a bat house",             emoji:"🦇",threshold:63,
   fact:"A single insect-eating bat can eat about 1,000 mosquito-sized insects in one night."},
  {id:"cert", name:"certified habitat",       emoji:"🏆",threshold:80,
   fact:"Skip pesticides — they kill the very insects and birds you're trying to attract."},
];
const GARDEN_BY_ID=Object.fromEntries(GARDEN_LADDER.map(l=>[l.id,l]));
const blankGarden=()=>({growth:0,unlocked:[],lastVisit:null});
const loadGarden=()=>{
  const g=store.load().garden;
  if(!g||typeof g!=="object")return blankGarden();
  return{growth:Math.max(0,Number(g.growth)||0),
    unlocked:Array.isArray(g.unlocked)?g.unlocked.filter(id=>GARDEN_BY_ID[id]):[],
    lastVisit:g.lastVisit||null};
};

const blankSketch=()=>({current:Math.floor(Math.random()*SKETCHES.length),strokes:0,finished:[],pending:null});
const loadSketch=()=>{
  const s=store.load().sketch;if(!s||typeof s!=="object")return blankSketch();
  const okIdx=i=>Number.isInteger(i)&&i>=0&&i<SKETCHES.length;
  return {current:okIdx(s.current)?s.current:Math.floor(Math.random()*SKETCHES.length),
    strokes:Math.max(0,Math.min(STROKES_GOAL,Number(s.strokes)||0)),
    finished:Array.isArray(s.finished)?s.finished.filter(okIdx).slice(-24):[],
    pending:okIdx(s.pending)?s.pending:null};
};
// returning reward: a gentle day-streak that grows when you come back — never punished, never a timer
const blankStreak=()=>({lastVisit:null,streak:0,days:0,sessions:0});
const loadStreak=()=>{
  const s=store.load().streak;if(!s||typeof s!=="object")return blankStreak();
  return {lastVisit:typeof s.lastVisit==="string"?s.lastVisit:null,streak:s.streak|0,days:s.days|0,sessions:s.sessions|0};
};

/* ── App ── */
function App(){
  const [tplId,setTplId]=useState(initialTemplateId); // null => show first-run field picker
  if(tplId) applyTemplate(tplId); else applyTemplate("data"); // keep module globals populated
  const [mode,setMode]=useState("drill");
  const [stats,setStats]=useState(()=>loadStatsFor(tplId||"data"));
  const [sketch,setSketch]=useState(loadSketch);
  const [muted,setMuted]=useState(()=>{const m=store.load().muted;return typeof m==="boolean"?m:true;}); // sound OFF by default
  const [relaxOn,setRelaxOn]=useState(()=>{const v=store.load().relaxOn;return typeof v==="boolean"?v:true;}); // breathing prompt ON by default
  const [sens,setSens]=useState(()=>{const s=store.load().sens;return typeof s==="number"?s:0.4;});
  const [showSet,setShowSet]=useState(false);
  const [welcome,setWelcome]=useState(()=>!store.load().welcomeSeen); // shown first visit, reopen via ?
  const [streak,setStreak]=useState(loadStreak);
  const [focusKeys,setFocusKeys]=useState(null); // when set, Drill practices only these (the most-missed) keys
  const [breathe,setBreathe]=useState(0);        // >0 = breathing overlay open with this many cycles
  const [voiceOn,setVoiceOn]=useState(()=>!!store.load().voiceOn); // spoken coaching toggle
  const [garden,setGarden]=useState(loadGarden);
  const [newUnlock,setNewUnlock]=useState(null); // set to a GARDEN_LADDER step when it just unlocked
  useEffect(()=>{store.save({garden});},[garden]);
  // detect newly-unlocked steps after addGrowth fires → show toast
  const prevUnlockedRef=useRef(null);
  useEffect(()=>{
    if(prevUnlockedRef.current===null){prevUnlockedRef.current=garden.unlocked;return;}
    const fresh=garden.unlocked.filter(id=>!prevUnlockedRef.current.includes(id));
    if(fresh.length)setNewUnlock(GARDEN_BY_ID[fresh[0]]||null);
    prevUnlockedRef.current=garden.unlocked;
  },[garden.unlocked]);
  const addGrowth=useCallback((n=1)=>setGarden(g=>{
    const growth=g.growth+n;
    const unlocked=[...g.unlocked];
    for(const step of GARDEN_LADDER)if(!unlocked.includes(step.id)&&growth>=step.threshold)unlocked.push(step.id);
    return{...g,growth,unlocked};
  }),[]);
  // PWA install prompt — captured from `beforeinstallprompt`; pill button in topbar lets the user trigger it
  const [installPrompt,setInstallPrompt]=useState(null);
  const [installDismissed,setInstallDismissed]=useState(()=>!!store.load().installDismissed);
  const isStandalone=useMemo(()=>{try{return window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone;}catch(e){return false;}},[]);
  useEffect(()=>{
    const onPrompt=e=>{e.preventDefault();setInstallPrompt(e);};
    const onInstalled=()=>{setInstallPrompt(null);};
    window.addEventListener("beforeinstallprompt",onPrompt);
    window.addEventListener("appinstalled",onInstalled);
    return ()=>{window.removeEventListener("beforeinstallprompt",onPrompt);window.removeEventListener("appinstalled",onInstalled);};
  },[]);
  const triggerInstall=useCallback(async()=>{
    if(!installPrompt)return;
    installPrompt.prompt();
    const c=await installPrompt.userChoice;
    if(c&&c.outcome==="accepted"){setInstallPrompt(null);}
  },[installPrompt]);
  const dismissInstall=useCallback(()=>{setInstallDismissed(true);store.save({installDismissed:true});},[]);
  useEffect(()=>{RELAX_SENS=sens;store.save({sens});},[sens]);
  useEffect(()=>{RELAX_ON=relaxOn;store.save({relaxOn});},[relaxOn]);
  useEffect(()=>{audio.setMuted(muted);store.save({muted});},[muted]);
  useEffect(()=>{store.save({sketch});},[sketch]);   // sketch progress persists on every change
  useEffect(()=>{store.save({streak});},[streak]);   // returning streak persists
  useEffect(()=>{VOICE_ON=voiceOn;store.save({voiceOn});},[voiceOn]); // speech toggle syncs the module flag
  // count this visit; the day-streak grows when you come back (consecutive days), never punished on a gap
  useEffect(()=>{
    const today=new Date().toISOString().slice(0,10);
    const yest=new Date(Date.now()-864e5).toISOString().slice(0,10);
    setStreak(s=>{
      if(s.lastVisit===today)return {...s,sessions:s.sessions+1};   // another session, same day
      const streak=s.lastVisit===yest?s.streak+1:1;                 // consecutive day grows it; a gap simply restarts at 1
      return {lastVisit:today,streak,days:s.days+1,sessions:s.sessions+1};
    });
  },[]);
  const saveTimer=useRef(0);
  const record=useCallback((ch,ok,lat)=>{
    if(!SYMBOL_SET.has(ch))return;
    setStats(prev=>{
      const c=prev[ch]||{attempts:0,errors:0,lat:[]};
      const next={...prev,[ch]:{attempts:c.attempts+1,errors:c.errors+(ok?0:1),lat:ok?[...c.lat.slice(-30),lat]:c.lat}};
      clearTimeout(saveTimer.current);
      const id=ACTIVE_TPL.id;
      saveTimer.current=setTimeout(()=>saveStatsFor(id,next),400); // debounce, per-template
      return next;
    });
  },[]);
  const chooseTemplate=useCallback((id)=>{
    if(!TPL_BY_ID[id])return;
    applyTemplate(id);
    setStats(loadStatsFor(id));
    setFocusKeys(null);            // a focus list from another field doesn't apply here
    setMode("drill");
    setShowSet(false);
    setTplId(id);
    store.save({template:id});
  },[]);
  // EVERY keystroke unfolds the drawing a little (more when correct), so it draws live as you type
  const addProgress=useCallback(ok=>setSketch(s=>{
    if(s.pending!=null)return s;                  // finished drawing waiting on a save/delete choice — pause
    const t=s.strokes+(ok?STEP_OK:STEP_MISS);
    if(t<STROKES_GOAL)return {...s,strokes:t};
    return {...s,strokes:STROKES_GOAL,pending:s.current}; // finished: pause on it (save/delete)
  }),[]);
  const triggerBreathe=useCallback(n=>setBreathe(prev=>prev>0?prev:n),[]);
  const closeBreathe=useCallback(()=>setBreathe(0),[]);
  useEffect(()=>{audio.duck(breathe>0);},[breathe]);
  // when a drawing finishes (~5 min in), a breathing break pops up for 5 cycles
  const justFinished=useRef(false);
  useEffect(()=>{ if(sketch.pending!=null){ if(!justFinished.current){justFinished.current=true;setBreathe(5);} } else justFinished.current=false; },[sketch.pending]);
  const saveSketch=useCallback(()=>setSketch(s=>s.pending==null?s:({current:randomSketch(s.current),strokes:0,finished:[...s.finished,s.pending].slice(-24),pending:null})),[]);
  const discardSketch=useCallback(()=>setSketch(s=>s.pending==null?s:({current:randomSketch(s.current),strokes:0,finished:s.finished,pending:null})),[]);
  const startFocus=useCallback(keys=>{setFocusKeys(keys&&keys.length?keys:null);setMode("drill");},[]);
  const clearFocus=useCallback(()=>setFocusKeys(null),[]);
  const toggleWelcome=useCallback(()=>setWelcome(w=>{const nx=!w;if(!nx)store.save({welcomeSeen:true});return nx;}),[]);
  const startApp=useCallback(()=>{store.save({welcomeSeen:true});setWelcome(false);setMode("drill");},[]);
  const toggleMute=()=>setMuted(m=>!m);
  const resetAll=()=>{store.clear();setStats(blankStatsFor(ACTIVE_TPL));setSketch(blankSketch());setStreak(blankStreak());setGarden(blankGarden());setSens(0.4);setRelaxOn(true);setMuted(true);setWelcome(true);setBreathe(0);setShowSet(false);setTplId(null);};
  const sensLabel=sens<0.25?"Rarely":sens<0.55?"Calm":sens<0.8?"Attentive":"Eager";
  const total=useMemo(()=>Object.values(stats).reduce((s,x)=>s+x.attempts,0),[stats]);

  // Field picker view — shown on true first run OR when the user clicks the topbar field-pill.
  // If they already have a saved field, the picker lets them cancel back to it.
  // The Welcome splash renders ABOVE the picker on first run so newcomers see the
  // orientation + features list before they're asked to pick anything.
  if(!tplId){
    const saved = store.load().template;
    const cancelTo = TPL_BY_ID[saved] ? saved : null;
    const dismissWelcomeAndStay = ()=>{store.save({welcomeSeen:true});setWelcome(false);};
    return (
      <div className="kf-root">
        {welcome&&<Welcome onStart={dismissWelcomeAndStay} onClose={toggleWelcome} muted={muted} hasField={false} fieldLabel="" tpl={null}/>}
        <header className="kf-topbar">
          <div className="kf-brand"><a href="https://michaelnocito.github.io/" title="Back to Michael Nocito's portfolio" style={{display:"inline-flex",alignItems:"center",textDecoration:"none",fontSize:"13px",fontWeight:700,color:"#5b6470",marginRight:"10px",whiteSpace:"nowrap"}}>← Home</a><span className="kf-glyph">{"{ }"}</span><span className="kf-brandname">Keygarden</span></div>
          <div className="kf-controls">
            <button className={"kf-mute"+(welcome?" on":"")} onClick={toggleWelcome} title="welcome &amp; how it works">?</button>
          </div>
        </header>
        <div className="kf-stage" style={{gridTemplateColumns:"1fr",maxWidth:"720px"}}>
          <main className="kf-work"><Picker onPick={chooseTemplate} current={cancelTo} onCancel={cancelTo?()=>setTplId(cancelTo):null}/></main>
        </div>
      </div>
    );
  }

  return (
    <div className="kf-root" key={tplId}>
      <SketchDefs/>
      <header className="kf-topbar">
        <div className="kf-brand"><a href="https://michaelnocito.github.io/" title="Back to Michael Nocito's portfolio" style={{display:"inline-flex",alignItems:"center",textDecoration:"none",fontSize:"13px",fontWeight:700,color:"#5b6470",marginRight:"10px",whiteSpace:"nowrap"}}>← Home</a><span className="kf-glyph">{"{ }"}</span><span className="kf-brandname">Keygarden</span><span className="kf-field-pill" title="Click to change field" onClick={()=>setTplId(null)}>{ACTIVE_TPL.label}<span className="kf-field-pill-caret" aria-hidden="true">▾</span></span></div>
        <nav className="kf-nav">
          <button className={mode==="drill"?"on":""} onClick={()=>setMode("drill")}>Drill keys</button>
          <button className={mode==="snippet"?"on":""} onClick={()=>setMode("snippet")}>Type code</button>
          <button className={mode==="garden"?"on":""} onClick={()=>setMode("garden")}>Garden</button>
        </nav>
        <div className="kf-controls">
          {installPrompt&&!installDismissed&&!isStandalone&&(
            <span className="kf-install kf-fade" onClick={triggerInstall} title="Install Keygarden as a desktop app — works offline and gets a Start Menu shortcut">
              <span className="kf-install-arrow" aria-hidden="true">⬇</span>
              <span className="kf-install-label">Install app</span>
              <span className="kf-install-x" onClick={e=>{e.stopPropagation();dismissInstall();}} title="Not now" role="button" aria-label="Dismiss">×</span>
            </span>
          )}
          <button className={"kf-mute"+(welcome?" on":"")} onClick={toggleWelcome} title="welcome &amp; how it works">?</button>
          <button className={"kf-mute speech"+(voiceOn?" on":"")} onClick={()=>setVoiceOn(v=>!v)} title={voiceOn?"voice coaching on — click to mute":"voice coaching off — click to enable"}>🔊</button>
          <button className={"kf-mute"+(muted?" off":"")} onClick={toggleMute} title={muted?"sound off":"sound on"}>♪</button>
          <button className="kf-mute" onClick={()=>setShowSet(s=>!s)} title="settings">⚙</button>
        </div>
      </header>
      {welcome&&<Welcome onStart={startApp} onClose={toggleWelcome} muted={muted} hasField={true} fieldLabel={ACTIVE_TPL.label} tpl={ACTIVE_TPL}/>}
      {breathe>0&&<BreatheOverlay cycles={breathe} onClose={closeBreathe}/>}
      {newUnlock&&<GardenUnlockToast step={newUnlock} onClose={()=>setNewUnlock(null)}/>}
      {showSet&&(
        <div className="kf-settings-wrap" onClick={e=>{if(e.target===e.currentTarget)setShowSet(false);}}>
          <div className="kf-settings kf-fade">
            <label style={{display:"block",marginBottom:".35rem"}}>Field</label>
            <div className="kf-fieldgrid">
              {TEMPLATES.map(t=>(
                <button key={t.id} className={"kf-fieldbtn"+(t.id===tplId?" on":"")} onClick={()=>chooseTemplate(t.id)}>
                  <span className="kf-fieldbtn-label">{t.label}</span>
                  <span className="kf-fieldbtn-blurb">{t.blurb}</span>
                </button>
              ))}
            </div>
            <p className="kf-dim" style={{margin:".4rem 0 .9rem"}}>Switching keeps each field's progress separate. Your garden and sketches stay shared.</p>
            <label className="kf-toggle"><input type="checkbox" checked={relaxOn} onChange={e=>setRelaxOn(e.target.checked)}/> Breathing breaks <strong>{relaxOn?"on":"off"}</strong></label>
            <p className="kf-dim">A gentle 3-breath reset when it senses tension or hesitation — never from typing fast. Visual only; turn it off to never be interrupted.</p>
            {relaxOn&&<>
              <label style={{fontSize:".85rem"}}>How often: <strong style={{color:"var(--accent-d)"}}>{sensLabel}</strong></label>
              <input type="range" min="0" max="1" step="0.05" value={sens} onChange={e=>setSens(parseFloat(e.target.value))}/>
              <div className="kf-slabels"><span>rarely</span><span>eager</span></div>
            </>}
            <button className="kf-reset" onClick={resetAll}>Reset progress &amp; settings</button>
          </div>
        </div>
      )}
      <div className="kf-stage">
        <aside className="kf-rail">
          <ProgressRail stats={stats} attempts={total} sketch={sketch} streak={streak} onFocus={startFocus} onSave={saveSketch} onDiscard={discardSketch}/>
        </aside>
        <main className="kf-work">
          {mode==="garden"
            ? <Garden garden={garden}/>
            : mode==="snippet"
              ? <Snippet record={record} addProgress={addProgress} addGrowth={addGrowth} onBreathe={triggerBreathe} voiceOn={voiceOn} sketch={sketch} onSave={saveSketch} onDiscard={discardSketch}/>
              : <Drill stats={stats} record={record} addProgress={addProgress} addGrowth={addGrowth} onBreathe={triggerBreathe} focusKeys={focusKeys} clearFocus={clearFocus} voiceOn={voiceOn} sketch={sketch} onSave={saveSketch} onDiscard={discardSketch}/>}
        </main>
      </div>
    </div>
  );
}

// The always-visible progress rail: streak, most-missed report, the live sketch, accuracy, collection.
/* Collapsible rail card — click the header to open/close. Chevron rotates. */
function Collapsible({title,defaultOpen=false,subtitle,children}){
  const [open,setOpen]=useState(defaultOpen);
  return (
    <div className={"kf-railcard kf-coll"+(open?" open":"")}>
      <button className="kf-coll-head" onClick={()=>setOpen(o=>!o)} aria-expanded={open}>
        <span className="kf-coll-title">
          <span className="kf-eyebrow" style={{margin:0}}>{title}</span>
          {subtitle&&<span className="kf-coll-sub">{subtitle}</span>}
        </span>
        <span className="kf-coll-chev" aria-hidden="true">▾</span>
      </button>
      {open&&<div className="kf-coll-body">{children}</div>}
    </div>
  );
}

function ProgressRail({stats,attempts,sketch,streak,onFocus,onSave,onDiscard}){
  const finished=sketch?sketch.finished:[];
  const recent=[...finished].reverse().slice(0,9);
  const streakWord=streak&&streak.streak>1?`${streak.streak} days in a row`:"a fresh start";
  // status report: the keys you miss most (need a few tries before it counts)
  const missed=SYMBOLS.map(s=>({...s,st:stats[s.ch]}))
    .filter(s=>s.st.attempts>=3&&s.st.errors>0)
    .map(s=>({...s,miss:s.st.errors/s.st.attempts}))
    .sort((a,b)=>b.miss-a.miss).slice(0,5);
  const focusSet=missed.map(s=>s.ch);
  return (
    <>
      {streak&&streak.sessions>0&&(
        <div className="kf-streak">
          <span className="kf-streak-num">{streak.streak||1}</span>
          <span className="kf-streak-txt">
            {streak.streak>1 ? <>Welcome back — <b>{streakWord}</b>.</> : <>Good to see you. Showing up is the whole game.</>}
            {streak.days>1 && <> {streak.days} days · {streak.sessions} sessions{finished.length>0?` · ${finished.length} ${finished.length===1?"sketch":"sketches"}`:""}.</>}
          </span>
        </div>
      )}
      <Collapsible title="Your most-missed keys" defaultOpen={true} subtitle={attempts===0?null:missed.length>0?`${missed.length} ${missed.length===1?"key":"keys"} fumbled`:"clean so far"}>
        {attempts===0
          ? <p className="kf-dim" style={{margin:0}}>No keystrokes yet. Start the warm-up — the keys you fumble surface here, with a button to drill just those.</p>
          : missed.length>0
            ? <>
                <div className="kf-missed">
                  {missed.map(m=>(
                    <div key={m.ch} className="kf-missed-row" title={`${m.st.errors} misses in ${m.st.attempts} tries — ${m.where}`}>
                      <code className="kf-missed-ch">{m.ch}</code>
                      <span className="kf-missed-bar"><i style={{width:Math.max(6,Math.round(m.miss*100))+"%"}}/></span>
                      <span className="kf-missed-pct">{Math.round(m.miss*100)}%</span>
                    </div>
                  ))}
                </div>
                <button className="kf-drillthese" onClick={()=>onFocus(focusSet)}>Drill just these {focusSet.map(c=><code key={c}>{c}</code>)} →</button>
              </>
            : <p className="kf-dim" style={{margin:0}}>Clean so far — nothing's tripping you up. Keep going.</p>}
      </Collapsible>
      {attempts>0&&(
        <Collapsible title="Accuracy per key" subtitle="heatmap">
          <Heatmap stats={stats}/>
        </Collapsible>
      )}
      {recent.length>0&&(
        <Collapsible title="Finished sketches" defaultOpen={true} subtitle={`${recent.length} saved`}>
          <div className="kf-collection">
            {recent.map((idx,i)=><div key={i} className="kf-frame"><SketchArt sketch={SKETCHES[idx]} frac={1}/></div>)}
          </div>
        </Collapsible>
      )}
    </>
  );
}
function Heatmap({stats}){
  return (
    <div className="kf-heat">
      {SYMBOLS.map(s=>{const st=stats[s.ch];const acc=st.attempts?1-st.errors/st.attempts:null;const ml=Math.round(mean(st.lat));const hue=acc===null?null:95-(1-acc)*95;
        return (
          <div key={s.ch} className="kf-cell"
            style={{background:acc===null?"var(--sheet-head)":`hsl(${hue},48%,${90-acc*8}%)`,borderColor:acc===null?"var(--line)":`hsl(${hue},42%,${80-acc*8}%)`}}
            title={acc===null?"untouched":`${Math.round(acc*100)}% · ${ml}ms · ${st.attempts} hits`}>
            <span className="kf-cell-ch">{s.ch}</span>
            <span className="kf-cell-meta">{acc===null?"—":`${Math.round(acc*100)}%`}</span>
          </div>
        );})}
    </div>
  );
}

/* ── On-screen keyboard diagram ──
   Shows the full QWERTY layout; target key = blue, shift key = purple (when needed),
   wrong key = red for ~700ms. Finger-zone tints follow standard 8-finger color guide. */
function KeyboardDiagram({target,wrongKey}){
  // The POS map (already computed above) gives us row + column for every key
  const tKey=target?target.physKey:null;
  const needsShift=target?target.shift:false;
  const OFFSETS=[0,14,23,34]; // horizontal offset per row (px) to stagger like a real keyboard
  return (
    <div className="kf-kbd-wrap" style={{overflowX:"auto"}}>
      <div style={{display:"inline-block",minWidth:440}}>
        {KROWS.map((row)=>(
          <div key={row.row} className="kf-krow" style={{justifyContent:"flex-start",paddingLeft:OFFSETS[row.row]}}>
            {row.row===2&&<div className="kf-key wide" style={{fontSize:9,color:"var(--dim)"}}>Caps</div>}
            {row.row===3&&<div className={"kf-key wide"+(needsShift?" target-shift":"")} style={{fontSize:9}}>Shift</div>}
            {row.keys.map(k=>{
              const isTarget=tKey&&k.k===tKey&&!(!needsShift&&k.s&&k.s===target.ch); // main highlight
              // For `physKey` highlight, we match the raw base key regardless of shift
              const isPhysTarget=tKey&&k.k===tKey;
              const isWrong=wrongKey&&k.k===wrongKey;
              const cls=["kf-key std","finger-"+k.f, isPhysTarget?"target":"", isWrong?"wrong":""].filter(Boolean).join(" ");
              return (
                <div key={k.k} className={cls}>
                  {k.s&&<span className="kf-shifted">{k.s}</span>}
                  <span className="kf-base">{k.k.toUpperCase()}</span>
                </div>
              );
            })}
            {row.row===2&&<div className="kf-key wide" style={{fontSize:9,color:"var(--dim)"}}>Enter</div>}
            {row.row===0&&<div className="kf-key xwide" style={{fontSize:9,color:"var(--dim)"}}>Back</div>}
          </div>
        ))}
        <div className="kf-krow" style={{paddingLeft:120}}>
          <div className="kf-key spc"><span className="kf-base" style={{fontSize:8,letterSpacing:2}}>SPACE</span></div>
        </div>
      </div>
    </div>
  );
}

/* TypedSlots: each keystroke "draws into" the next slot — same visual language as the kf-bigkey guide,
   but smaller and in a row. Correct = blue (accent), wrong = red. A blinking dashed slot waits next. */
function TypedSlots({typed}){
  const recent=typed.slice(-14);
  return (
    <div className="kf-term">
      <span className="kf-term-label">Typed</span>
      {recent.length===0
        ? <span className="kf-dim" style={{fontSize:".82rem"}}>The keys you press will appear here.</span>
        : recent.map((t,i)=>(
            <span key={typed.length-recent.length+i} className={"kf-slot"+(t.ok?"":" bad")}>{t.ch===" "?"␣":t.ch}</span>
          ))}
      <span className="kf-slot-empty" aria-hidden="true"/>
    </div>
  );
}

function Drill({stats,record,addProgress,addGrowth,onBreathe,focusKeys,clearFocus,voiceOn,sketch,onSave,onDiscard}){
  const statsRef=useRef(stats);statsRef.current=stats;
  // focus mode: practice ONLY the chosen (most-missed) keys — weighted toward the weaker ones
  const focus=useMemo(()=>{const set=Array.isArray(focusKeys)?focusKeys:[];const pool=SYMBOLS.filter(s=>set.includes(s.ch));return pool.length?pool:null;},[focusKeys]);
  // ── learning-science scheduler (SYMBOLS is the easy→hard, chunked-by-finger pedagogical order):
  //    layered release — introduce keys gradually, give each a little massed acquisition, then SPACED +
  //    INTERLEAVED review weighted by weakness (and no back-to-back repeats). Not random. ──
  const intro=useRef(0); const seen=useRef({}); const sinceIntro=useRef(0); const last=useRef(null);
  const schedule=useCallback(()=>{
    const weightedPick=poolN=>{const w=poolN.map(s=>weakness(statsRef.current[s.ch]));const tot=w.reduce((p,q)=>p+q,0)||1;let r=Math.random()*tot;
      for(let i=0;i<poolN.length;i++){r-=w[i];if(r<=0)return poolN[i];}return poolN[poolN.length-1];};
    if(focus) return {sym:weightedPick(focus),isNew:false};
    if(intro.current===0){intro.current=1;sinceIntro.current=0;return {sym:SYMBOLS[0],isNew:true};}
    const newest=SYMBOLS[intro.current-1];
    const review=()=>{let p=SYMBOLS.slice(0,intro.current).filter(s=>s.ch!==last.current);return weightedPick(p.length?p:SYMBOLS.slice(0,intro.current));};
    // 1) acquire the newest key (massed, but lightly interleaved so it isn't rote)
    if((seen.current[newest.ch]||0)<4 && (intro.current===1||Math.random()<0.6)) return {sym:newest,isNew:false};
    // 2) introduce the next key once the newest is warm and a few reps have passed
    if(intro.current<SYMBOLS.length && (seen.current[newest.ch]||0)>=3 && sinceIntro.current>=3){intro.current++;sinceIntro.current=0;return {sym:SYMBOLS[intro.current-1],isNew:true};}
    // 3) spaced + interleaved review across everything introduced
    return {sym:review(),isNew:false};
  },[focus]);
  const advance=useCallback(()=>{const l=schedule();seen.current[l.sym.ch]=(seen.current[l.sym.ch]||0)+1;if(!l.isNew)sinceIntro.current++;last.current=l.sym.ch;return l;},[schedule]);
  const [lesson,setLesson]=useState(advance);   // { sym, isNew }
  const target=lesson.sym, isNew=lesson.isNew;
  const prevTarget=useRef(target.ch);
  const [flash,setFlash]=useState(null);
  const [hint,setHint]=useState(null);
  const [wrongKey,setWrongKey]=useState(null);  // physical key lit red on the keyboard diagram
  const [typed,setTyped]=useState([]);          // terminal echo of what you actually pressed
  const [ks,setKs]=useState(0);                 // keystroke counter this session
  const [cel,setCel]=useState(0);
  const [celLvl,setCelLvl]=useState(1);
  const shownAt=useRef(performance.now());
  const streak=useRef(0);
  const report=useRelaxCue(useCallback(()=>onBreathe(3),[onBreathe]));
  // speak the key name when target changes
  useEffect(()=>{if(target.ch!==prevTarget.current){prevTarget.current=target.ch;speak(target.name,0.88);}},[target]);
  const next=useCallback(()=>{setLesson(advance());shownAt.current=performance.now();},[advance]);
  useEffect(()=>{
    shownAt.current=performance.now();
    const onKey=e=>{
      if(e.metaKey||e.ctrlKey||e.altKey)return;
      if(e.key.length!==1)return;
      e.preventDefault();
      const lat=performance.now()-shownAt.current;
      const ok=e.key===target.ch;
      record(target.ch,ok,lat);report(ok,lat);audio.playKey(ok);addProgress(ok);
      setKs(k=>k+1);
      setTyped(p=>[...p,{ch:e.key,ok}].slice(-36)); // echo it into the terminal line
      if(ok){
        setHint(null);setWrongKey(null);
        streak.current+=1;
        if(streak.current%12===0){audio.milestone();setCelLvl(Math.min(Math.floor(streak.current/12),4));setCel(c=>c+1);addGrowth(1);}
      }
      else{
        const h=diagnose(target.ch,e.key);setHint(h);
        if(h)speak(h,0.9);  // voice coaching: "you hit A — colon is up and to the right"
        const wrongPhys=(SYM_BY_CH[e.key]?SYM_BY_CH[e.key].physKey:e.key.toLowerCase());
        setWrongKey(wrongPhys);setTimeout(()=>setWrongKey(null),700);
        streak.current=0;
      }
      setFlash(ok?"ok":"miss");setTimeout(()=>setFlash(null),180);
      if(ok)setTimeout(next,120);
    };
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[target,record,next,report,addProgress]);
  return (
    <section className="kf-card kf-fade kf-center">
      <Celebrate trigger={cel} level={celLvl}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",width:"100%",marginBottom:".3rem",flexWrap:"wrap",gap:".4rem"}}>
        {focus
          ? <p className="kf-focusbar" style={{margin:0}}>Focusing on {focus.map(s=><code key={s.ch}>{s.ch}</code>)} <button className="kf-linkbtn" onClick={clearFocus}>drill all</button></p>
          : <p className="kf-dim" style={{margin:0}}>{intro.current>=SYMBOLS.length?"All keys in play":`Building up · ${intro.current}/${SYMBOLS.length} keys`}</p>}
        <p className="kf-counter" style={{margin:0}}><b>{ks}</b> keys this session</p>
      </div>
      {isNew&&!focus&&<span className="kf-newkey">New key — take it slow</span>}
      <div className="kf-place">
        <p className="kf-place-where">{target.where}</p>
        <p className="kf-place-finger">{target.finger}</p>
      </div>
      <div className={"kf-bigkey "+(flash||"")}>{target.ch}</div>
      <p className="kf-name">{target.name}</p>
      {hint&&<p className="kf-hint" key={hint}>{hint}</p>}
      <div className="kf-kbdrow">
        <div className="kf-kbd"><KeyboardDiagram target={target} wrongKey={wrongKey}/></div>
        <LiveSketch sketch={sketch} onSave={onSave} onDiscard={onDiscard} inline/>
      </div>
      <TypedSlots typed={typed}/>
    </section>
  );
}

function Snippet({record,addProgress,addGrowth,onBreathe,voiceOn,sketch,onSave,onDiscard}){
  const [track,setTrack]=useState("Mixed");
  const [level,setLevel]=useState(()=>store.load().level||"Words"); // start beginners on Words
  const lvl=LEVEL_TO_SINGULAR[level];
  const pool=useMemo(()=>{
    let p=SNIPPETS.filter(s=>s.level===lvl);
    if(track!=="Mixed")p=p.filter(s=>s.track===track);
    return p.length?p:SNIPPETS.filter(s=>s.level===lvl); // fallback if track has no entries at this level
  },[track,lvl]);
  useEffect(()=>{store.save({level});},[level]);
  const [snip,setSnip]=useState(()=>pool[0]);
  const [pos,setPos]=useState(0);
  const [wrong,setWrong]=useState(false);
  const [hint,setHint]=useState(null);
  const [cel,setCel]=useState(0);
  const [celLvl,setCelLvl]=useState(1);
  const [ks,setKs]=useState(0);
  const lastAt=useRef(performance.now());
  const errs=useRef(0);
  const report=useRelaxCue(useCallback(()=>onBreathe(3),[onBreathe]));
  const loadNext=useCallback(p=>{const list=p||pool;setSnip(list[Math.floor(Math.random()*list.length)]);setPos(0);setWrong(false);setHint(null);errs.current=0;lastAt.current=performance.now();},[pool]);
  useEffect(()=>{loadNext(pool);},[track,level]); // eslint-disable-line
  useEffect(()=>{
    const onKey=e=>{
      if(e.metaKey||e.ctrlKey||e.altKey)return;
      if(e.key.length!==1)return;
      e.preventDefault();
      const want=snip.text[pos];
      const lat=performance.now()-lastAt.current;
      const ok=e.key===want;
      if(SYMBOL_SET.has(want))record(want,ok,lat);
      report(ok,lat);audio.playKey(ok);addProgress(ok);setKs(k=>k+1);
      if(ok){
        setWrong(false);setHint(null);lastAt.current=performance.now();
        const np=pos+1; setPos(np); // you type every character — closers included
        if(np>=snip.text.length){if(errs.current===0){audio.milestone();setCelLvl(snip.text.length>=24?3:snip.text.length>=16?2:1);setCel(c=>c+1);addGrowth(1);}setTimeout(()=>loadNext(),420);}
      }else{
        errs.current+=1;setWrong(true);
        const h=diagnose(want,e.key);setHint(h);
        if(h)speak(h,0.9);
        setTimeout(()=>setWrong(false),200);
      }
    };
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[snip,pos,record,loadNext,report,addProgress]);
  return (
    <section className="kf-card kf-fade">
      <Celebrate trigger={cel} level={celLvl}/>
      <div className="kf-tracks" style={{marginBottom:".4rem"}}>
        <span className="kf-tracks-label">Level</span>
        {LEVELS.map(l=><button key={l} className={l===level?"on":""} onClick={()=>setLevel(l)} title={l==="Words"?"Single tokens (easiest)":l==="Phrases"?"Mid-length expressions":"Full statements"}>{l}</button>)}
      </div>
      <div className="kf-tracks">
        <span className="kf-tracks-label">Track</span>
        {TRACKS.map(t=><button key={t} className={t===track?"on":""} onClick={()=>setTrack(t)}>{t}</button>)}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".25rem",flexWrap:"wrap",gap:".4rem"}}>
        <p className="kf-dim" style={{margin:0}}>Type every character including closers — like a real terminal. <code>{snip.track}</code></p>
        <p className="kf-counter" style={{margin:0}}><b>{ks}</b> keys this session</p>
      </div>
      <div className="kf-kbdrow">
        <div className={"kf-snip "+(wrong?"wrong":"")} style={{flex:"1 1 auto",margin:0}}>
          {snip.text.split("").map((c,i)=><span key={i} className={i<pos?"done":i===pos?"cur":"pending"}>{c===" "?"\u00A0":c}</span>)}
        </div>
        <LiveSketch sketch={sketch} onSave={onSave} onDiscard={onDiscard} inline/>
      </div>
      {hint&&<p className="kf-hint" key={hint}>{hint}</p>}
    </section>
  );
}

// shared sensitivity, 0 (rarely) .. 1 (eager); default calm. RELAX_ON gates the breathing prompt entirely.
let RELAX_SENS = 0.4;
let RELAX_ON = true;
// returns a report(ok,lat) fn; on detected tension it calls onTrigger() (App opens a 3-breath break)
function useRelaxCue(onTrigger){
  const recent=useRef([]);const cooldown=useRef(0);const spikes=useRef(0);
  return useCallback((ok,lat)=>{
    if(!RELAX_ON)return;                              // breathing breaks switched off
    const r=recent.current;r.push({ok,lat});if(r.length>16)r.shift();
    if(performance.now()<cooldown.current)return;
    // sensitivity maps to thresholds: low sens = needs more evidence
    const errNeeded=Math.round(7-RELAX_SENS*4);      // 0→7 errors … 1→3 errors
    const spikeMult=4.5-RELAX_SENS*1.5;              // 0→4.5× … 1→3× the median gap
    const spikesNeeded=RELAX_SENS>0.66?1:2;          // only eager mode trips on a single pause
    const med=median(r.map(x=>x.lat));
    if(med>0 && lat>med*spikeMult && lat>450) spikes.current++; else spikes.current=Math.max(0,spikes.current-1);
    const errCount=r.filter(x=>!x.ok).length;
    if(r.length>=12 && (errCount>=errNeeded || spikes.current>=spikesNeeded)){
      recent.current=[];spikes.current=0;cooldown.current=performance.now()+60000;onTrigger();
    }
  },[onTrigger]);
}
const PRAISE=["Clean","Nice flow","Smooth","Locked in","Effortless","No misses","Flowing","Crisp"];
const PRAISE_HI=["On fire","Unstoppable","Flawless run","In the zone","Masterful"];
function Celebrate({trigger,level=1}){
  const [state,setState]=useState(null);
  useEffect(()=>{
    if(!trigger)return;
    const L=Math.max(1,Math.min(level,4));
    const hi=L>=3;
    const pool=hi?PRAISE_HI:PRAISE;
    setState({L,hi,word:pool[Math.floor(Math.random()*pool.length)]});
    const t=setTimeout(()=>setState(null),1100);
    return ()=>clearTimeout(t);
  },[trigger]);
  if(!state)return null;
  const {L,hi,word}=state;
  const count=6+L*5;            // 11 → 26 particles
  const radius=40+L*16;         // 56 → 104 px
  const parts=Array.from({length:count},(_,i)=>{
    const ang=(i/count)*Math.PI*2+(i%2?0.3:0);
    const r=radius*(0.7+Math.random()*0.5);
    return [Math.cos(ang)*r,Math.sin(ang)*r,i%2];
  });
  return (
    <div className="kf-celebrate" key={trigger}>
      <div className={"kf-check"+(hi?" hi":"")} style={{width:(48+L*8)+"px",height:(48+L*8)+"px",fontSize:(1.6+L*0.15)+"rem"}}>✓</div>
      {parts.map((d,i)=><span key={i} className="kf-particle" style={{"--tx":d[0]+"px","--ty":d[1]+"px",background:d[2]?"var(--accent)":"var(--good)",width:(7+L)+"px",height:(7+L)+"px"}}/>)}
      <span className={"kf-praise"+(hi?" hi":"")}>{word}{hi?` ×${level}`:""}</span>
    </div>
  );
}

/* Guided breathing reset: N slow breaths, exhale longer than inhale (the lever that flips on the
   calming "rest" response fastest). Starts with a small "prepare" circle, then grows on each in-breath. */
const BREATHE_IN=4000, BREATHE_OUT=6000, BREATHE_PREP=2200;
function BreatheOverlay({onClose,cycles=3}){
  const [phase,setPhase]=useState("prep"); // prep | in | out | done
  const [count,setCount]=useState(0);
  useEffect(()=>{
    let alive=true; const timers=[]; let n=1;
    const after=(ms,fn)=>timers.push(setTimeout(()=>{if(alive)fn();},ms));
    const cycle=()=>{
      setPhase("in"); setCount(n);
      after(BREATHE_IN,()=>{ setPhase("out");
        after(BREATHE_OUT,()=>{
          if(n>=cycles){ setPhase("done"); after(2800,onClose); }
          else { n+=1; cycle(); }
        });
      });
    };
    setPhase("prep"); after(BREATHE_PREP,cycle); // small circle first: "prepare to breathe in"
    return ()=>{ alive=false; timers.forEach(clearTimeout); };
  },[onClose,cycles]);
  const done=phase==="done";
  const scale=phase==="in"?1.15:phase==="prep"?0.42:done?0.95:0.55;
  const dur=phase==="in"?BREATHE_IN:phase==="prep"?BREATHE_PREP:BREATHE_OUT;
  return (
    <div className="kf-relax" onClick={onClose}>
      {phase==="prep"&&<p className="kf-bcount">Get ready · {cycles} slow breaths</p>}
      {(phase==="in"||phase==="out")&&<p className="kf-bcount">Breath {count} of {cycles}</p>}
      <div className="kf-borb" style={{transform:`scale(${scale})`,transitionDuration:dur+"ms"}}/>
      <p>{done?"Nice.":phase==="prep"?"Prepare to breathe in…":phase==="in"?"Deep breath in…":"…and slowly out"}</p>
      <p className="kf-dim">{done
        ? "Shoulders down, wrists floating. Carry on whenever you're ready."
        : "Let your shoulders drop and your wrists float. Follow the circle — slow and easy."}</p>
      <span className="kf-skip">tap anywhere to skip</span>
    </div>
  );
}

/* ── Simple line sketch ──
   One connected path with pathLength="100", revealed a fraction at a time via stroke-dashoffset.
   Clean, thick, blue accent stroke — in the lesson visual style. No filters, no fills, no packs. */
function SketchDefs(){ return null; } // legacy hook — no filters needed anymore
function SketchArt({sketch,frac}){
  const f=Math.max(0,Math.min(1,frac));
  return (
    <svg className="kf-art" viewBox="0 0 120 120" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <path className="ghost" d={sketch.d} pathLength="100"/>
      <path className="ink" d={sketch.d} pathLength="100" style={{strokeDasharray:100,strokeDashoffset:100*(1-f)}}/>
    </svg>
  );
}
/* LiveSketch: the prominent drawing panel in the work area.
   A pen-tip dot follows the end of the drawn line so it looks like it's being sketched. */
function LiveSketch({sketch,onSave,onDiscard,inline}){
  const pending=sketch.pending!=null;
  const cur=SKETCHES[pending?sketch.pending:sketch.current]||SKETCHES[0];
  const frac=pending?1:Math.max(0,Math.min(1,sketch.strokes/STROKES_GOAL));
  const near=frac>=0.75&&!pending;
  const n=sketch.finished?sketch.finished.length:0;
  const title=cur.name.charAt(0).toUpperCase()+cur.name.slice(1);
  const pathRef=useRef(null);
  const [tip,setTip]=useState({x:60,y:60,visible:false});
  useEffect(()=>{
    if(!pathRef.current||frac===0||frac>=1){setTip(t=>({...t,visible:false}));return;}
    try{ const total=pathRef.current.getTotalLength(); const pt=pathRef.current.getPointAtLength(frac*total); setTip({x:pt.x,y:pt.y,visible:true}); }catch(e){}
  },[frac,cur.d]);
  return (
    <div className={"kf-sketch-row"+(pending?" done":"")+(inline?" inline":"")}>
        <div className="kf-sketch-canvas">
          <svg className="kf-art" viewBox="0 0 120 120" aria-hidden="true">
            <path className="ghost" d={cur.d} pathLength="100"/>
            <path ref={pathRef} className="ink" d={cur.d} pathLength="100" style={{strokeDasharray:100,strokeDashoffset:100*(1-frac)}}/>
            {tip.visible&&<circle cx={tip.x} cy={tip.y} r="3.6" className="kf-pen-tip" fill="var(--accent)"/>}
          </svg>
        </div>
        <div className="kf-sketch-info">
          <p className="kf-sketch-name">{title}</p>
          {pending?(
            <>
              {!inline&&<p className="kf-dim">Keep this one in your collection?</p>}
              <div className="kf-save-row" style={{marginTop:".35rem"}}>
                <button className="kf-save" onClick={onSave}>Save</button>
                <button className="kf-del" onClick={onDiscard}>Delete</button>
              </div>
            </>
          ):(
            <>
              <div className="kf-sketch-prog"><i style={{width:Math.round(frac*100)+"%"}}/></div>
              {!inline&&<p className="kf-dim">{near?"Almost there — a few more keystrokes finish it.":n>0?`${n} ${n===1?"sketch":"sketches"} saved · type to draw`:"Type to draw — each keystroke unfolds the line."}</p>}
              {inline&&<p className="kf-dim" style={{fontSize:".62rem",margin:0}}>{Math.round(frac*100)}%{n>0?` · ${n} saved`:""}</p>}
            </>
          )}
        </div>
    </div>
  );
}

// Single flower: stem + 5 petals + yellow center
function GFlower({x,y,color,h=24,size=1}){
  const r=4*size,cr=2.5*size;
  const pts=Array.from({length:5},(_,i)=>{const a=(i/5)*Math.PI*2-Math.PI/2;return[Math.cos(a)*r*1.25,Math.sin(a)*r*1.25];});
  return(
    <g transform={`translate(${x},${y})`}>
      <line y1="0" y2={h} stroke="#4a7a3c" strokeWidth={1.5*size}/>
      {pts.map(([px,py],i)=><circle key={i} cx={px} cy={-h+py} r={r} fill={color}/>)}
      <circle cy={-h} r={cr} fill="#ffeb3b"/>
    </g>
  );
}

function Garden({garden}){
  const{growth,unlocked}=garden;
  const done=GARDEN_LADDER.filter(l=>unlocked.includes(l.id));
  const next=GARDEN_LADDER.find(l=>!unlocked.includes(l.id));
  const prevThresh=done.length?done[done.length-1].threshold:0;
  const prog=next?Math.min(1,(growth-prevThresh)/Math.max(1,next.threshold-prevThresh)):1;
  return(
    <section className="kf-card kf-fade kf-garden-wrap">
      <div className="kf-eyebrow">Your garden</div>
      <GardenScene unlocked={unlocked}/>
      {next?(
        <div className="kf-garden-prog-wrap">
          <div className="kf-garden-progbar"><i style={{width:Math.round(prog*100)+"%"}}/></div>
          <span className="kf-garden-next-label">→ {next.name}</span>
        </div>
      ):(
        <p style={{marginTop:".4rem",fontSize:".8rem",color:"var(--good)",fontWeight:700}}>🏆 Fully certified wildlife habitat — congratulations.</p>
      )}
      {unlocked.length===0&&(
        <p className="kf-garden-empty">Your garden is bare soil and possibility.<br/><span style={{fontSize:".76rem"}}>Each clean drill streak or snippet adds growth. Nothing wilts — it'll wait for you.</span></p>
      )}
      <div className="kf-garden-ladder">
        {GARDEN_LADDER.map(l=>{
          const st=unlocked.includes(l.id)?"done":next&&next.id===l.id?"next":"locked";
          return(
            <div key={l.id} className={"kf-ladder-step "+st}>
              <span className="kf-ladder-ic">{l.emoji}</span>
              <div>
                <span className="kf-ladder-name">{st==="done"?"✓ ":""}{l.name}</span>
                {st==="done"&&<p className="kf-ladder-fact">{l.fact}</p>}
                {st==="next"&&<p className="kf-ladder-fact">Coming next — keep typing.</p>}
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

/* ── First-run field Picker ─────────────────────────────────────────────────
   Pick your field; sets which symbols + snippets you'll practice. Everything else
   (keyboard diagram, sketch, garden, breathing) is shared across fields. */
function Picker({onPick,current,onCancel}){
  return (
    <section className="kf-card kf-fade">
      {current&&onCancel&&(
        <button className="kf-picker-back" onClick={onCancel}>← Keep {TPL_BY_ID[current]?TPL_BY_ID[current].label:"current field"}</button>
      )}
      <h2 style={{margin:"0 0 .35rem",fontSize:"1.5rem"}}>{current?"Switch field":"Pick your field"}</h2>
      <p className="kf-dim" style={{fontSize:".88rem",margin:"0 0 1.1rem",maxWidth:"560px"}}>
        Keygarden grows your typing for the symbols your field actually runs on. {current?"Switching keeps each field's stats separate — your garden and sketches stay shared.":"Pick one to start — you can switch anytime by clicking the field name in the top bar."}
      </p>
      <div className="kf-pickergrid">
        {TEMPLATES.map(t=>(
          <button key={t.id} className={"kf-pickbtn"+(t.id===current?" current":"")} onClick={()=>onPick(t.id)}>
            <span className="kf-pickbtn-label">{t.label}</span>

            <span className="kf-pickbtn-syms">{t.symbols.slice(0,8).map(s=>s.ch).join(" ")}</span>
          </button>
        ))}
      </div>
    </section>
  );
}
