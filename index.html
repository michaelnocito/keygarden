<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keygarden — symbol typing trainer</title>
<style>
  /* ── Nocito calm-analyst design system (canonical: spreadsheet-archaeology/DESIGN_SYSTEM.md) ──
     Light theme, soft shadows, restrained color. System-ui for chrome; monospace only for code/keys. */
  *{box-sizing:border-box;}
  body{margin:0;}
  #root{
    --bg:#eef1f5;--panel:#ffffff;--line:#d6dce4;
    --shadow:0 1px 2px rgba(20,30,50,.06),0 6px 20px rgba(20,30,50,.06);
    --ink:#1f2328;--dim:#5b6470;
    --accent:#2f6df0;--accent-d:#1f4fc4;--accent-bg:#eef4ff;--accent-bd:#d4e1ff;
    --good:#1a7f37;--good-bg:#e7f6ec;--good-bd:#bfe5ca;
    --bad:#cf222e;--bad-bg:#fdecee;
    --warm:#9a6700;--warm-bg:#fbf7ec;--warm-bd:#e3d7a5;
    --sheet-head:#f3f5f8;
    --mono:"Consolas",ui-monospace,SFMono-Regular,Menlo,monospace;
    min-height:100vh;background:radial-gradient(120% 120% at 50% 0%,#f6f8fb 0%,#eef1f5 62%);
    color:var(--ink);font:15px/1.55 -apple-system,"Segoe UI",Roboto,system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    padding:0;display:block;}
  /* ── Desktop shell: sticky top bar + two-column stage (progress rail + work area) ── */
  .kf-topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:.6rem;padding:.45rem 1.2rem;background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(20,30,50,.03);}
  .kf-brand{display:flex;align-items:center;gap:.5rem;}
  .kf-glyph{font-family:var(--mono);color:var(--accent);font-size:.95rem;letter-spacing:-2px;background:linear-gradient(135deg,#eaf1ff,#dbe7ff);padding:.15rem .35rem;border-radius:7px;}
  .kf-brandname{font-weight:700;font-size:1rem;letter-spacing:-.4px;color:var(--ink);}
  .kf-nav{display:flex;gap:.4rem;margin-left:.8rem;align-items:center;}
  .kf-nav button{font-family:inherit;font-size:.78rem;font-weight:600;color:var(--dim);background:var(--sheet-head);border:1px solid var(--line);padding:.35rem .85rem;border-radius:999px;cursor:pointer;transition:.18s;}
  .kf-nav button:hover{color:var(--accent-d);border-color:var(--accent-bd);}
  .kf-nav button.on{color:#fff;background:var(--accent);border-color:var(--accent);box-shadow:0 2px 8px rgba(47,109,240,.3);}
  .kf-controls{margin-left:auto;display:flex;gap:.4rem;align-items:center;}
  .kf-mute{width:1.9rem;height:1.9rem;padding:0!important;border-radius:50%!important;font-size:.88rem;font-family:inherit;font-weight:700;color:var(--dim);background:var(--sheet-head);border:1px solid var(--line);cursor:pointer;transition:.18s;}
  .kf-mute:hover{color:var(--accent-d);border-color:var(--accent-bd);}
  .kf-mute.on{color:#fff;background:var(--accent);border-color:var(--accent);}
  .kf-mute.off{opacity:.4;text-decoration:line-through;}
  .kf-stage{max-width:1280px;margin:.9rem auto;padding:0 1.2rem 2rem;display:grid;grid-template-columns:290px 1fr;gap:1rem;align-items:start;}
  .kf-rail{position:sticky;top:62px;align-self:start;max-height:calc(100vh - 76px);overflow-y:auto;display:flex;flex-direction:column;gap:.6rem;padding-bottom:.5rem;}
  .kf-work{min-width:0;}
  .kf-railcard{background:var(--panel);border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow);padding:.65rem .85rem;}
  @media (max-width:880px){
    .kf-stage{grid-template-columns:1fr;gap:1rem;margin-top:1rem;}
    .kf-rail{position:static;max-height:none;overflow:visible;order:1;}
    .kf-work{order:2;}
    .kf-nav{margin-left:0;}
    .kf-topbar{flex-wrap:wrap;}
  }
  /* settings as a dropdown panel from the top-right */
  .kf-settings-wrap{position:fixed;inset:0;z-index:30;display:flex;justify-content:flex-end;padding:3.6rem 1.5rem 1rem;background:rgba(20,30,50,.12);}
  .kf-settings{width:100%;max-width:380px;align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 50px -18px rgba(20,30,50,.45);padding:1.1rem 1.3rem;max-height:82vh;overflow:auto;}
  .kf-settings label{font-size:.9rem;color:var(--ink);}
  .kf-settings label strong{color:var(--accent-d);}
  .kf-settings input[type=range]{width:100%;margin:.7rem 0 .2rem;accent-color:var(--accent);cursor:pointer;}
  .kf-slabels{display:flex;justify-content:space-between;font-size:.66rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
  .kf-settings .kf-dim{margin:.6rem 0 0;}
  .kf-reset{margin-top:.9rem;font-family:inherit;font-size:.72rem;font-weight:600;color:var(--bad);background:transparent;border:1px solid rgba(207,34,46,.3);padding:.4rem .8rem;border-radius:8px;cursor:pointer;transition:.15s;}
  .kf-reset:hover{background:var(--bad-bg);}
  .kf-main{width:100%;}
  .kf-card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:1.2rem 1.4rem 1.3rem;box-shadow:var(--shadow);}
  .kf-eyebrow{font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--accent-d);margin:0 0 .35rem;}
  .kf-celebrate{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:6;}
  .kf-check{border-radius:50%;background:var(--good);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 8px 24px -6px rgba(26,127,55,.5);animation:pop .55s cubic-bezier(.2,1.5,.4,1),celebfade .35s ease-out .7s forwards;}
  .kf-check.hi{background:var(--accent);box-shadow:0 8px 30px -4px rgba(47,109,240,.55);}
  .kf-praise.hi{color:var(--accent-d);font-weight:700;}
  @keyframes pop{0%{transform:scale(0);}60%{transform:scale(1.18);}100%{transform:scale(1);}}
  @keyframes celebfade{to{opacity:0;transform:scale(.9);}}
  .kf-praise{position:absolute;top:calc(50% + 44px);font-weight:700;color:var(--good);font-size:1.1rem;white-space:nowrap;animation:praise 1s ease-out forwards;}
  @keyframes praise{0%{opacity:0;transform:translateY(6px);}25%{opacity:1;transform:none;}80%{opacity:1;}100%{opacity:0;}}
  .kf-particle{position:absolute;width:9px;height:9px;border-radius:50%;animation:burst .85s cubic-bezier(.25,.6,.3,1) forwards;}
  @keyframes burst{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}
  .kf-center{text-align:center;}
  /* Typed history: a clean row of slot-boxes (matches the kf-bigkey guide aesthetic).
     Each keystroke fills the next box with the character — correct = blue, wrong = red. */
  .kf-term{display:flex;flex-wrap:wrap;justify-content:center;gap:.3rem;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:.5rem .75rem;margin:.55rem auto 0;max-width:580px;min-height:2.6rem;box-shadow:inset 0 1px 3px rgba(20,30,50,.04);}
  .kf-term-label{font-family:inherit;font-size:.66rem;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--accent-d);margin-right:.4rem;user-select:none;}
  .kf-slot{font-family:var(--mono);font-size:1.05rem;font-weight:700;line-height:1;width:1.7rem;height:1.7rem;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;background:var(--accent-bg);color:var(--accent-d);border:1px solid var(--accent-bd);box-shadow:0 1px 0 rgba(47,109,240,.08);animation:slotpop .35s cubic-bezier(.2,1.6,.4,1);position:relative;}
  .kf-slot.bad{background:var(--bad-bg);color:var(--bad);border-color:rgba(207,34,46,.3);}
  .kf-slot::after{content:"";position:absolute;left:50%;top:50%;width:130%;height:130%;border-radius:50%;border:2px solid var(--accent);opacity:0;transform:translate(-50%,-50%) scale(.5);animation:slotring .5s ease-out forwards;}
  .kf-slot.bad::after{border-color:var(--bad);}
  @keyframes slotpop{0%{transform:scale(0);opacity:0;}55%{transform:scale(1.18);opacity:1;}100%{transform:scale(1);opacity:1;}}
  @keyframes slotring{0%{opacity:.55;transform:translate(-50%,-50%) scale(.6);}100%{opacity:0;transform:translate(-50%,-50%) scale(1.7);}}
  .kf-slot-empty{width:1.7rem;height:1.7rem;border-radius:6px;border:1.5px dashed var(--accent-bd);background:transparent;animation:caret 1.15s ease-in-out infinite;}
  @keyframes caret{0%,100%{opacity:.5;}50%{opacity:.85;}}
  .kf-newkey{display:inline-block;font-size:.62rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--good);border-radius:999px;padding:.15rem .55rem;margin-bottom:.35rem;animation:fade .3s ease;}
  .kf-fade{animation:fade .4s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .kf-dim{color:var(--dim);font-size:.82rem;}
  .kf-dim code,.kf-focus code{font-family:var(--mono);color:var(--accent-d);background:var(--accent-bg);border:1px solid var(--accent-bd);padding:.05rem .35rem;border-radius:5px;}
  .kf-place{margin:0 auto .5rem;max-width:480px;}
  .kf-place-where{font-size:1.05rem;line-height:1.3;font-weight:700;color:var(--ink);margin:0;}
  .kf-place-finger{font-size:.82rem;font-weight:600;color:var(--accent-d);margin:.2rem 0 0;letter-spacing:.3px;}
  .kf-focusbar{font-size:.85rem;color:var(--ink);background:var(--warm-bg);border:1px solid var(--warm-bd);border-radius:8px;padding:.35rem .7rem;margin:0 auto .5rem;display:inline-block;}
  .kf-focusbar code{font-family:var(--mono);color:var(--warm);background:#fff;border:1px solid var(--warm-bd);padding:.02rem .3rem;border-radius:5px;margin:0 .08rem;font-size:.95em;}
  .kf-linkbtn{font-family:inherit;font-size:.78rem;font-weight:600;color:var(--accent-d);background:none;border:0;border-bottom:1px solid var(--accent-bd);cursor:pointer;padding:0 0 1px;margin-left:.4rem;}
  .kf-linkbtn:hover{color:var(--accent);}
  .kf-bigkey{font-family:var(--mono);position:relative;font-size:4rem;font-weight:700;line-height:1;margin:.1rem 0 .3rem;color:var(--ink);transition:.12s;display:inline-block;}
  .kf-bigkey.ok{color:var(--good);transform:scale(.92);}
  .kf-bigkey.ok::after{content:"";position:absolute;left:50%;top:50%;width:1.2em;height:1.2em;border:2px solid var(--good);border-radius:50%;transform:translate(-50%,-50%);animation:ring .45s ease-out forwards;}
  @keyframes ring{0%{opacity:.6;transform:translate(-50%,-50%) scale(.6);}100%{opacity:0;transform:translate(-50%,-50%) scale(1.8);}}
  .kf-bigkey.miss{color:var(--bad);animation:nudge .18s;}
  @keyframes nudge{0%,100%{transform:none;}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
  .kf-name{font-weight:700;font-size:.95rem;margin:.1rem 0 0;color:var(--ink);}
  .kf-finger{color:var(--accent-d);font-size:.78rem;font-weight:600;letter-spacing:.5px;}
  .kf-hint{margin:.5rem auto 0;color:var(--warm);font-size:.85rem;background:var(--warm-bg);border:1px solid var(--warm-bd);border-left:3px solid var(--warm);border-radius:7px;padding:.4rem .7rem;display:inline-block;animation:fade .25s ease;max-width:520px;}
  /* keystroke counter (drill + snippet) */
  .kf-counter{font-family:var(--mono);font-size:.68rem;color:var(--dim);letter-spacing:.04em;margin-bottom:.3rem;}
  .kf-counter b{color:var(--ink);}
  /* speech toggle in controls */
  .kf-mute.speech{font-size:.9rem;}
  /* on-screen keyboard diagram */
  .kf-kbd{width:100%;max-width:680px;margin:.65rem auto 0;user-select:none;}
  .kf-kbd svg{width:100%;height:auto;display:block;}
  .kf-krow{display:flex;gap:2px;margin-bottom:2px;justify-content:center;}
  .kf-key{font-family:var(--mono);font-size:9px;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:default;transition:background .12s,transform .12s;line-height:1.05;}
  .kf-key.std{height:30px;width:30px;background:var(--sheet-head);border:1px solid var(--line);color:var(--dim);}
  .kf-key.wide{height:30px;width:46px;background:var(--sheet-head);border:1px solid var(--line);color:var(--dim);}
  .kf-key.xwide{height:30px;width:62px;background:var(--sheet-head);border:1px solid var(--line);color:var(--dim);}
  .kf-key.spc{height:30px;width:160px;background:var(--sheet-head);border:1px solid var(--line);color:var(--dim);}
  .kf-key .kf-shifted{font-size:7.5px;color:var(--dim);opacity:.75;margin-bottom:0;}
  .kf-key .kf-base{font-weight:600;color:var(--ink);}
  .kf-key.finger-lp{background:#eaf3ee;}
  .kf-key.finger-lr{background:#fef3ec;}
  .kf-key.finger-lm{background:#fff8e6;}
  .kf-key.finger-li{background:#fdf2e0;}
  .kf-key.finger-ri{background:#eef4ff;}
  .kf-key.finger-rm{background:#f3eeff;}
  .kf-key.finger-rr{background:#f9eeff;}
  .kf-key.finger-rp{background:#fef0f0;}
  .kf-key.target{background:var(--accent)!important;border-color:var(--accent-d)!important;box-shadow:0 2px 10px rgba(47,109,240,.4);transform:scale(1.08);}
  .kf-key.target .kf-base,.kf-key.target .kf-shifted{color:#fff!important;}
  .kf-key.target-shift{background:#7b68ee!important;border-color:#6a5bc4!important;}
  .kf-key.target-shift .kf-base{color:#fff!important;}
  .kf-key.wrong{background:var(--bad)!important;border-color:#b01a24!important;animation:nudge .18s;}
  .kf-key.wrong .kf-base,.kf-key.wrong .kf-shifted{color:#fff!important;}
  /* sketch — sits at top of the progress rail; vertical stack in narrow column */
  .kf-sketch-row{display:flex;flex-direction:column;align-items:center;gap:.55rem;}
  .kf-sketch-canvas{width:160px;height:160px;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
  .kf-sketch-canvas svg{width:88%;height:88%;}
  .kf-sketch-info{width:100%;text-align:center;}
  .kf-art{display:block;width:100%;height:100%;}
  .kf-art .ghost{fill:none;stroke:var(--accent-bd);stroke-width:5;stroke-linecap:round;stroke-linejoin:round;}
  .kf-art .ink{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;stroke-linejoin:round;transition:stroke-dashoffset .28s ease-out;}
  .kf-pen-tip{transition:cx .28s ease-out,cy .28s ease-out;}
  /* collapsible rail cards */
  .kf-coll{padding:0;overflow:hidden;}
  .kf-coll-head{display:flex;align-items:center;justify-content:space-between;width:100%;background:transparent;border:0;cursor:pointer;font-family:inherit;text-align:left;padding:.55rem .85rem;transition:background .12s;}
  .kf-coll-head:hover{background:var(--accent-bg);}
  .kf-coll.open .kf-coll-head{border-bottom:1px solid var(--line);}
  .kf-coll-title{display:flex;align-items:baseline;gap:.6rem;}
  .kf-coll-sub{font-size:.74rem;color:var(--dim);font-weight:500;}
  .kf-coll-chev{font-size:.95rem;color:var(--dim);transition:transform .18s ease;display:inline-block;}
  .kf-coll.open .kf-coll-chev{transform:rotate(180deg);color:var(--accent-d);}
  .kf-coll-body{padding:.6rem .85rem .75rem;animation:fade .25s ease;}
  .kf-sketch-info{flex:1 1 auto;min-width:0;}
  .kf-sketch-status{font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-d);margin:0 0 .15rem;}
  .kf-sketch-name{font-size:.95rem;font-weight:700;color:var(--ink);margin:0 0 .35rem;}
  .kf-sketch-prog{height:6px;border-radius:999px;background:var(--sheet-head);border:1px solid var(--line);overflow:hidden;margin-bottom:.35rem;}
  .kf-sketch-prog i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .28s ease-out;}
  .kf-pen-tip{transition:transform .32s ease-out;pointer-events:none;}
  .kf-snip{font-family:var(--mono);font-size:1.25rem;line-height:1.9;letter-spacing:.5px;margin:.6rem 0 .35rem;word-break:break-word;border-radius:8px;padding:.5rem;transition:.15s;}
  .kf-snip.wrong{background:var(--bad-bg);}
  .kf-snip .done{color:var(--good);}
  .kf-snip .auto{color:var(--good);opacity:.6;font-style:italic;border-bottom:1px dotted var(--good);}
  .kf-snip .pending{color:var(--dim);opacity:.55;}
  .kf-snip .cur{color:#fff;background:var(--accent);border-radius:4px;padding:.05rem .12rem;box-shadow:0 0 0 2px rgba(47,109,240,.25);}
  .kf-tracks{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.6rem;align-items:center;}
  .kf-tracks-label{font-size:.62rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-right:.2rem;}
  .kf-tracks button{font-family:inherit;font-size:.7rem;font-weight:600;color:var(--dim);background:var(--sheet-head);border:1px solid var(--line);padding:.22rem .6rem;border-radius:999px;cursor:pointer;transition:.15s;}
  .kf-tracks button:hover{color:var(--accent-d);border-color:var(--accent-bd);}
  .kf-tracks button.on{color:#fff;background:var(--accent);border-color:var(--accent);}
  .kf-card h2{font-weight:700;margin:0 0 1rem;font-size:1.4rem;color:var(--ink);}
  .kf-focus{font-size:.85rem;margin:0 0 1.3rem;}
  .kf-focus code{margin-right:.3rem;font-size:1rem;}
  .kf-heat{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:.3rem;}
  .kf-cell{border-radius:7px;padding:.35rem .15rem;text-align:center;border:1px solid var(--line);}
  .kf-cell-ch{font-family:var(--mono);display:block;font-size:.95rem;font-weight:600;color:var(--ink);}
  .kf-cell-meta{display:block;font-size:.56rem;color:var(--dim);margin-top:.1rem;}
  .kf-empty{text-align:center;}
  .kf-empty p{margin:.5rem 0;}
  .kf-empty p:first-child{font-weight:700;font-size:1.25rem;color:var(--ink);}
  .kf-relax{position:fixed;inset:0;background:linear-gradient(180deg,#1b2a44 0%,#243a5e 55%,#33506f 100%);color:#eaf0fb;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;cursor:pointer;text-align:center;padding:2rem;animation:fade .5s ease;}
  .kf-relax p{font-weight:700;font-size:2rem;margin:.5rem 0 0;}
  .kf-relax .kf-dim{color:#cdddf5;font-size:1.15rem;line-height:1.5;max-width:420px;margin-top:.6rem;}
  .kf-relax .kf-skip{position:absolute;bottom:1.4rem;font-size:.72rem;color:#8fa3c4;letter-spacing:.04em;}
  .kf-bcount{font-size:.74rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#9fb6da;margin:0 0 1.1rem;}
  .kf-borb{width:130px;height:130px;border-radius:50%;border:2px solid #cfe0ff;background:radial-gradient(circle at 50% 42%,rgba(207,224,255,.4),rgba(207,224,255,.05));box-shadow:0 0 60px rgba(188,208,240,.45);margin-bottom:1.6rem;transform:scale(.55);transition:transform 4s ease-in-out;}
  @media (prefers-reduced-motion:reduce){ .kf-borb{transition:opacity .4s ease!important;transform:scale(.9)!important;} }

  /* ── Welcome / orientation screen (first visit; reopen via ?) ── */
  .kf-welcome-backdrop{position:fixed;inset:0;z-index:40;background:rgba(20,30,50,.45);display:flex;align-items:flex-start;justify-content:center;padding:3rem 1.25rem;overflow:auto;animation:fade .3s ease;}
  .kf-welcome{width:100%;max-width:640px;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 24px 60px -24px rgba(20,30,50,.5);padding:1.5rem 1.6rem 1.6rem;animation:fade .4s ease;}
  .kf-welcome-head{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
  .kf-welcome h2{font-weight:700;font-size:1.45rem;margin:0;color:var(--ink);}
  .kf-welcome-sub{color:var(--dim);font-size:.88rem;margin:.25rem 0 0;}
  .kf-welcome-x{flex:0 0 auto;font-family:inherit;font-size:.72rem;font-weight:600;color:var(--dim);background:var(--sheet-head);border:1px solid var(--line);border-radius:7px;padding:.3rem .65rem;cursor:pointer;transition:.15s;}
  .kf-welcome-x:hover{color:var(--accent-d);border-color:var(--accent-bd);}
  .kf-premise{font-size:.92rem;line-height:1.55;color:#2b3240;margin:1rem 0 1.1rem;}
  .kf-premise b{color:var(--accent-d);}
  .kf-feats{display:flex;flex-direction:column;gap:.55rem;margin:0 0 1.2rem;}
  .kf-feat{display:flex;gap:.8rem;align-items:flex-start;background:var(--sheet-head);border:1px solid var(--line);border-radius:11px;padding:.7rem .85rem;}
  .kf-feat-ic{flex:0 0 auto;width:2rem;height:2rem;border-radius:8px;display:grid;place-items:center;font-family:var(--mono);font-size:1rem;font-weight:700;background:var(--accent-bg);color:var(--accent-d);border:1px solid var(--accent-bd);}
  .kf-feat-b{flex:1 1 auto;min-width:0;}

const LEVEL_TO_SINGULAR = {"Words":"Word","Phrases":"Phrase","Lines":"Line"};

/* ── Audio: researched feedback design ──
   correct = soft warm pitched confirmation (low-salience, ignorable in bulk)
   wrong   = low dull "soft-no", quieter, slight downward slip
   reward  = warm rising arpeggio, only on clean line / clean streak */
const PENTA = (() => {
  const iv=[0,3,5,7,10], out=[];
  for(let o=0;o<2;o++) for(const i of iv) out.push(110*2**((o*12+i)/12));
  out.push(110*2**2); return out;
})();

function fade(a,sr){const f=Math.floor(sr*0.005);for(let i=0;i<f&&i<a.length;i++)a[a.length-1-i]*=i/f;return a;}
function norm(a,p){let m=0;for(const v of a)m=Math.max(m,Math.abs(v));if(m>0)for(let i=0;i<a.length;i++)a[i]=a[i]/m*p;return a;}

function warmPad(f,sr,dur=0.22,gain=0.45){
  const n=Math.floor(sr*dur),buf=new Float32Array(n),w=2*Math.PI*f;
  const a=0.008,d=0.12,sus=0.4;

    if(t<a)e=t/a; else if(t<a+d)e=1-(1-sus)*((t-a)/d); else e=sus*Math.max(0,1-(t-a-d)/(dur-a-d));
    buf[i]=(0.7*Math.sin(w*t)+0.2*Math.sin(2*w*t)+0.1*Math.sin(3*w*t))*e*gain;}
  return fade(buf,sr);

// correct: warm, gentle upward lift, no harsh high end
function correctVoice(f,sr){
  const dur=0.085,n=Math.floor(sr*dur),buf=new Float32Array(n);let ph=0;
  for(let i=0;i<n;i++){const t=i/sr;
    const finst=f*(1+0.05*(t/dur));        // small rise = "yes"
    ph+=2*Math.PI*finst/sr;
    let s=0.8*Math.sin(ph)+0.2*Math.sin(2*ph); // + soft octave
    s*=Math.exp(-t/0.03);
    if(t<0.0015)s*=t/0.0015;
    buf[i]=s;}
  return fade(norm(buf,0.55),sr);
}
// wrong: low dull soft-no, downward, quieter
function missVoice(sr){
  const dur=0.12,n=Math.floor(sr*dur),buf=new Float32Array(n);let ph=0;
  for(let i=0;i<n;i++){const t=i/sr;
    const finst=165*(1-0.27*(t/dur));      // downward slip
    ph+=2*Math.PI*finst/sr;
    let s=Math.sin(ph)*Math.exp(-t/0.04);
    if(t<0.008)s+=(Math.random()*2-1)*0.18*(1-t/0.008); // soft body, low-passed feel
    if(t<0.0015)s*=t/0.0015;
    buf[i]=s;}
  return fade(norm(buf,0.6),sr);

// reward: warm rising arpeggio (root, fifth, octave)

  const notes=[220,329.63,440],dur=0.6,n=Math.floor(sr*dur),mix=new Float32Array(n);
  notes.forEach((f,k)=>{const v=warmPad(f,sr,0.26,0.4);const off=Math.floor(sr*0.085*k);
    for(let i=0;i<v.length&&i+off<n;i++)mix[i+off]+=v[i];});

// gentle pentatonic phrase — an unbroken run plays it as a melody
const PHRASE=[0,2,4,5,4,2,3,5,7,5,4,3,2,4,5,7];

class AudioEngine{
  constructor(){this.ctx=null;this.master=null;this.notes=new Map();this.miss=null;this.reward=null;this.muted=false;this.flow=0;this.pad=null;}
  ensure(){
    if(this.ctx)return;
    const AC=window.AudioContext||window.webkitAudioContext;
    this.ctx=new AC();
    this.master=this.ctx.createGain();
    this.master.gain.value=this.muted?0:0.5;
    this.master.connect(this.ctx.destination);
    this.miss=this._buf(missVoice(this.ctx.sampleRate));
    this.reward=this._buf(rewardVoice(this.ctx.sampleRate));
    // flow pad: quiet root+fifth drone behind a lowpass; swells with the streak
    const pg=this.ctx.createGain();pg.gain.value=0;
    const lp=this.ctx.createBiquadFilter();lp.type="lowpass";lp.frequency.value=520;
    pg.connect(lp).connect(this.master);
    [110,164.81].forEach(f=>{const o=this.ctx.createOscillator();o.type="sine";o.frequency.value=f;o.connect(pg);o.start();});
    this.pad=pg;
  }
  _buf(a){const b=this.ctx.createBuffer(1,a.length,this.ctx.sampleRate);b.copyToChannel(a,0);return b;}
  _note(idx){
    if(!this.notes.has(idx)) this.notes.set(idx,this._buf(correctVoice(PENTA[idx],this.ctx.sampleRate)));
    return this.notes.get(idx);
  }
  _play(buf,g=1){if(!buf||this.muted)return;const gn=this.ctx.createGain();gn.gain.value=g;
    const s=this.ctx.createBufferSource();s.buffer=buf;s.connect(gn).connect(this.master);s.start();}
  _pad(g){if(this.pad)this.pad.gain.linearRampToValueAtTime(g,this.ctx.currentTime+0.3);}
  playKey(ok){this.ensure();if(this.ctx.state==="suspended")this.ctx.resume();
    if(ok){this._play(this._note(PHRASE[this.flow%PHRASE.length]));this.flow++;this._pad(Math.min(this.flow/22,1)*0.12);}
    else{this.flow=0;this._pad(0);this._play(this.miss,0.85);}}
  milestone(){if(this.ctx)this._play(this.reward);}
  setMuted(m){this.muted=m;if(this.master)this.master.gain.linearRampToValueAtTime(m?0:0.5,this.ctx.currentTime+0.05);}
  duck(on){if(this.master&&!this.muted)this.master.gain.linearRampToValueAtTime(on?0.12:0.5,this.ctx.currentTime+0.15);}
}
const audio=new AudioEngine();

/* ── miss diagnosis: spatial + Shift coaching ── */
const POS=(()=>{
  const rows=["`1234567890-=","qwertyuiop[]\\","asdfghjkl;'","zxcvbnm,./"];
  const sh={"`":"~","1":"!","2":"@","3":"#","4":"$","5":"%","6":"^","7":"&","8":"*","9":"(","0":")","-":"_","=":"+","[":"{","]":"}","\\":"|",";":":","'":'"',",":"<",".":">","/":"?"};
  const m={};
  rows.forEach((row,r)=>row.split("").forEach((base,c)=>{
    const x=c+r*0.4, y=r;
    m[base]={x,y,shift:false,base};
    if(sh[base]) m[sh[base]]={x,y,shift:true,base};
  }));
  for(let i=0;i<26;i++){const lo=String.fromCharCode(97+i);if(m[lo])m[String.fromCharCode(65+i)]={...m[lo],shift:true,base:lo};}

    let dir;
    if(ady<0.5) dir=`just to the ${h}`;
    else if(adx<0.6) dir=`one row ${v}`;
    else dir=`${v} and to the ${h}`;
    return `You hit ${label(actualCh)} — ${label(targetCh)} is ${dir}${t.shift?", with Shift":""}.`;
  }
  return `Not quite — aim for ${label(targetCh)}${t.shift?" (with Shift)":""}.`;
}

/* ── persistence (localStorage; safe-fails on file:// or private mode) ── */
const KEY="keygarden.v1";
const store={
  load(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return {};}},
  save(patch){try{const cur=this.load();localStorage.setItem(KEY,JSON.stringify({...cur,...patch}));}catch(e){}},
  clear(){try{localStorage.removeItem(KEY);}catch(e){}},
};

/* ── stats ── */
const blankStats=()=>{const s={};SYMBOLS.forEach(x=>s[x.ch]={attempts:0,errors:0,lat:[]});return s;};
const loadStats=()=>{
  const b=blankStats();const saved=store.load().stats;
  if(saved)SYMBOLS.forEach(x=>{if(saved[x.ch])b[x.ch]={attempts:saved[x.ch].attempts|0,errors:saved[x.ch].errors|0,lat:Array.isArray(saved[x.ch].lat)?saved[x.ch].lat.slice(-30):[]};});
  return b;
};
const median=a=>{if(!a.length)return 0;const x=[...a].sort((p,q)=>p-q),m=Math.floor(x.length/2);return x.length%2?x[m]:(x[m-1]+x[m])/2;};
const mean=a=>a.length?a.reduce((p,q)=>p+q,0)/a.length:0;
const weakness=st=>{const acc=st.attempts?st.errors/st.attempts:0;const slow=Math.min(median(st.lat)/600,1);return 0.15+acc*2+slow;};
const pick=stats=>{const w=SYMBOLS.map(s=>weakness(stats[s.ch]));const tot=w.reduce((p,q)=>p+q,0);let r=Math.random()*tot;
  for(let i=0;i<SYMBOLS.length;i++){r-=w[i];if(r<=0)return SYMBOLS[i];}return SYMBOLS[SYMBOLS.length-1];};

/* ── Sketch: every keystroke unfolds a single continuous line a little — MORE when correct,
   a little when you miss — so it draws live as you type. Faster typing → faster drawing.
   One drawing fills over ~STROKES_GOAL key-units (≈ a 5-minute session). pathLength="100"
   normalizes each path so stroke-dashoffset reveals the right fraction. */
const STROKES_GOAL=200;   // key-units to finish a drawing (~5 min of typing)
const STEP_OK=1;          // a correct key unfolds this much
const STEP_MISS=0.34;     // a miss still nudges it forward a little
// Simple, iconic line drawings — clean thick blue stroke in the lesson style, no fills or filters.
// Each is one connected path; pathLength="100" lets us reveal a fraction with stroke-dashoffset.
const SKETCHES=[
  { name:"a heart",       d:"M60,40 C50,22 25,25 25,52 C25,75 60,98 60,98 C60,98 95,75 95,52 C95,25 70,22 60,40 Z" },
  { name:"a star",        d:"M60,18 L72,50 L106,50 L78,71 L90,103 L60,82 L30,103 L42,71 L14,50 L48,50 Z" },
  { name:"a check",       d:"M22,62 L48,90 L100,28" },
  { name:"a house",       d:"M28,98 L28,55 L60,28 L92,55 L92,98 M52,98 L52,72 L68,72 L68,98" },
  { name:"a mountain",    d:"M10,95 L40,42 L62,65 L82,40 L110,95" },
  { name:"a balloon",     d:"M60,18 C30,18 30,62 60,74 C90,62 90,18 60,18 M60,74 L60,98" },
  { name:"an arrow",      d:"M18,60 L92,60 M76,42 L94,60 L76,78" },
  { name:"a leaf",        d:"M60,98 C60,80 60,62 60,52 C40,52 28,38 30,22 C46,22 60,32 60,52 C60,32 74,22 90,22 C92,38 80,52 60,52" },
  { name:"a key",         d:"M40,60 a14,14 0 1,1 28,0 a14,14 0 1,1 -28,0 M68,60 L104,60 M90,60 L90,74 M98,60 L98,72" },
  { name:"a smiley face", d:"M60,15 C90,15 100,55 70,80 C40,90 22,72 22,45 C22,22 40,15 60,15 M42,42 L42,42 M78,42 L78,42 M40,60 C50,76 70,76 80,60" },
];
const randomSketch=cur=>{ if(SKETCHES.length<2)return 0; let i; do{ i=Math.floor(Math.random()*SKETCHES.length); }while(i===cur); return i; };

const blankSketch=()=>({current:Math.floor(Math.random()*SKETCHES.length),strokes:0,finished:[],pending:null});
const loadSketch=()=>{
  const s=store.load().sketch;if(!s||typeof s!=="object")return blankSketch();
  const okIdx=i=>Number.isInteger(i)&&i>=0&&i<SKETCHES.length;
  return {current:okIdx(s.current)?s.current:Math.floor(Math.random()*SKETCHES.length),
    strokes:Math.max(0,Math.min(STROKES_GOAL,Number(s.strokes)||0)),
    finished:Array.isArray(s.finished)?s.finished.filter(okIdx).slice(-24):[],
    pending:okIdx(s.pending)?s.pending:null};
};
// returning reward: a gentle day-streak that grows when you come back — never punished, never a timer
const blankStreak=()=>({lastVisit:null,streak:0,days:0,sessions:0});
const loadStreak=()=>{
  const s=store.load().streak;if(!s||typeof s!=="object")return blankStreak();
  return {lastVisit:typeof s.lastVisit==="string"?s.lastVisit:null,streak:s.streak|0,days:s.days|0,sessions:s.sessions|0};
};

/* ── App ── */
function App(){
  const [mode,setMode]=useState("drill");
  const [stats,setStats]=useState(loadStats);
  const [sketch,setSketch]=useState(loadSketch);
  const [muted,setMuted]=useState(()=>{const m=store.load().muted;return typeof m==="boolean"?m:true;}); // sound OFF by default
  const [relaxOn,setRelaxOn]=useState(()=>{const v=store.load().relaxOn;return typeof v==="boolean"?v:true;}); // breathing prompt ON by default
  const [sens,setSens]=useState(()=>{const s=store.load().sens;return typeof s==="number"?s:0.4;});
  const [showSet,setShowSet]=useState(false);
  const [welcome,setWelcome]=useState(()=>!store.load().welcomeSeen); // shown first visit, reopen via ?
  const [streak,setStreak]=useState(loadStreak);
  const [focusKeys,setFocusKeys]=useState(null); // when set, Drill practices only these (the most-missed) keys
  const [breathe,setBreathe]=useState(0);        // >0 = breathing overlay open with this many cycles
  const [voiceOn,setVoiceOn]=useState(()=>!!store.load().voiceOn); // spoken coaching toggle
  useEffect(()=>{RELAX_SENS=sens;store.save({sens});},[sens]);
  useEffect(()=>{RELAX_ON=relaxOn;store.save({relaxOn});},[relaxOn]);
  useEffect(()=>{audio.setMuted(muted);store.save({muted});},[muted]);
  useEffect(()=>{store.save({sketch});},[sketch]);   // sketch progress persists on every change
  useEffect(()=>{store.save({streak});},[streak]);   // returning streak persists
  useEffect(()=>{VOICE_ON=voiceOn;store.save({voiceOn});},[voiceOn]); // speech toggle syncs the module flag
  // count this visit; the day-streak grows when you come back (consecutive days), never punished on a gap
  useEffect(()=>{
    const today=new Date().toISOString().slice(0,10);
    const yest=new Date(Date.now()-864e5).toISOString().slice(0,10);
    setStreak(s=>{
      if(s.lastVisit===today)return {...s,sessions:s.sessions+1};   // another session, same day
      const streak=s.lastVisit===yest?s.streak+1:1;                 // consecutive day grows it; a gap simply restarts at 1
      return {lastVisit:today,streak,days:s.days+1,sessions:s.sessions+1};
    });
  },[]);
  const saveTimer=useRef(0);
  const record=useCallback((ch,ok,lat)=>{
    if(!SYMBOL_SET.has(ch))return;
    setStats(prev=>{
      const c=prev[ch];
      const next={...prev,[ch]:{attempts:c.attempts+1,errors:c.errors+(ok?0:1),lat:ok?[...c.lat.slice(-30),lat]:c.lat}};
      clearTimeout(saveTimer.current);
      saveTimer.current=setTimeout(()=>store.save({stats:next}),400); // debounce writes
      return next;
    });
  },[]);
  // EVERY keystroke unfolds the drawing a little (more when correct), so it draws live as you type
  const addProgress=useCallback(ok=>setSketch(s=>{
    if(s.pending!=null)return s;                  // finished drawing waiting on a save/delete choice — pause
    const t=s.strokes+(ok?STEP_OK:STEP_MISS);
    if(t<STROKES_GOAL)return {...s,strokes:t};
    return {...s,strokes:STROKES_GOAL,pending:s.current}; // finished: pause on it (save/delete)
  }),[]);
  const triggerBreathe=useCallback(n=>setBreathe(prev=>prev>0?prev:n),[]);
  const closeBreathe=useCallback(()=>setBreathe(0),[]);
  useEffect(()=>{audio.duck(breathe>0);},[breathe]);
  // when a drawing finishes (~5 min in), a breathing break pops up for 5 cycles
  const justFinished=useRef(false);
  useEffect(()=>{ if(sketch.pending!=null){ if(!justFinished.current){justFinished.current=true;setBreathe(5);} } else justFinished.current=false; },[sketch.pending]);
  const saveSketch=useCallback(()=>setSketch(s=>s.pending==null?s:({current:randomSketch(s.current),strokes:0,finished:[...s.finished,s.pending].slice(-24),pending:null})),[]);
  const discardSketch=useCallback(()=>setSketch(s=>s.pending==null?s:({current:randomSketch(s.current),strokes:0,finished:s.finished,pending:null})),[]);
  const startFocus=useCallback(keys=>{setFocusKeys(keys&&keys.length?keys:null);setMode("drill");},[]);
  const clearFocus=useCallback(()=>setFocusKeys(null),[]);
  const toggleWelcome=useCallback(()=>setWelcome(w=>{const nx=!w;if(!nx)store.save({welcomeSeen:true});return nx;}),[]);
  const startApp=useCallback(()=>{store.save({welcomeSeen:true});setWelcome(false);setMode("drill");},[]);
  const toggleMute=()=>setMuted(m=>!m);
  const resetAll=()=>{store.clear();setStats(blankStats());setSketch(blankSketch());setStreak(blankStreak());setSens(0.4);setRelaxOn(true);setMuted(true);setWelcome(true);setBreathe(0);setShowSet(false);};
  const sensLabel=sens<0.25?"Rarely":sens<0.55?"Calm":sens<0.8?"Attentive":"Eager";
  const total=useMemo(()=>Object.values(stats).reduce((s,x)=>s+x.attempts,0),[stats]);
  return (
    <div className="kf-root">
      <SketchDefs/>
      <header className="kf-topbar">
        <div className="kf-brand"><span className="kf-glyph">{"{ }"}</span><span className="kf-brandname">Keygarden</span></div>
        <nav className="kf-nav">
          <button className={mode==="drill"?"on":""} onClick={()=>setMode("drill")}>Drill keys</button>
          <button className={mode==="snippet"?"on":""} onClick={()=>setMode("snippet")}>Type code</button>
        </nav>
        <div className="kf-controls">
          <button className={"kf-mute"+(welcome?" on":"")} onClick={toggleWelcome} title="welcome &amp; how it works">?</button>
          <button className={"kf-mute speech"+(voiceOn?" on":"")} onClick={()=>setVoiceOn(v=>!v)} title={voiceOn?"voice coaching on — click to mute":"voice coaching off — click to enable"}>🔊</button>
          <button className={"kf-mute"+(muted?" off":"")} onClick={toggleMute} title={muted?"sound off":"sound on"}>♪</button>
          <button className="kf-mute" onClick={()=>setShowSet(s=>!s)} title="settings">⚙</button>
        </div>
      </header>
      {welcome&&<Welcome onStart={startApp} onClose={toggleWelcome} muted={muted}/>}
      {breathe>0&&<BreatheOverlay cycles={breathe} onClose={closeBreathe}/>}
      {showSet&&(
        <div className="kf-settings-wrap" onClick={e=>{if(e.target===e.currentTarget)setShowSet(false);}}>
          <div className="kf-settings kf-fade">
            <label className="kf-toggle"><input type="checkbox" checked={relaxOn} onChange={e=>setRelaxOn(e.target.checked)}/> Breathing breaks <strong>{relaxOn?"on":"off"}</strong></label>
            <p className="kf-dim">A gentle 3-breath reset when it senses tension or hesitation — never from typing fast. Visual only; turn it off to never be interrupted.</p>
            {relaxOn&&<>
              <label style={{fontSize:".85rem"}}>How often: <strong style={{color:"var(--accent-d)"}}>{sensLabel}</strong></label>
              <input type="range" min="0" max="1" step="0.05" value={sens} onChange={e=>setSens(parseFloat(e.target.value))}/>
              <div className="kf-slabels"><span>rarely</span><span>eager</span></div>
            </>}
            <button className="kf-reset" onClick={resetAll}>Reset progress &amp; settings</button>
          </div>
        </div>
      )}
      <div className="kf-stage">
        <aside className="kf-rail">
          <ProgressRail stats={stats} attempts={total} sketch={sketch} streak={streak} onFocus={startFocus} onSave={saveSketch} onDiscard={discardSketch}/>
        </aside>
        <main className="kf-work">
          {mode==="snippet"
            ? <Snippet record={record} addProgress={addProgress} onBreathe={triggerBreathe} voiceOn={voiceOn}/>
            : <Drill stats={stats} record={record} addProgress={addProgress} onBreathe={triggerBreathe} focusKeys={focusKeys} clearFocus={clearFocus} voiceOn={voiceOn}/>}
        </main>
      </div>
    </div>
  );
}

// The always-visible progress rail: streak, most-missed report, the live sketch, accuracy, collection.
/* Collapsible rail card — click the header to open/close. Chevron rotates. */
function Collapsible({title,defaultOpen=false,subtitle,children}){
  const [open,setOpen]=useState(defaultOpen);
  return (
    <div className={"kf-railcard kf-coll"+(open?" open":"")}>
      <button className="kf-coll-head" onClick={()=>setOpen(o=>!o)} aria-expanded={open}>
        <span className="kf-coll-title">
          <span className="kf-eyebrow" style={{margin:0}}>{title}</span>
          {subtitle&&<span className="kf-coll-sub">{subtitle}</span>}
        </span>
        <span className="kf-coll-chev" aria-hidden="true">▾</span>
      </button>
      {open&&<div className="kf-coll-body">{children}</div>}
    </div>
  );
}

function ProgressRail({stats,attempts,sketch,streak,onFocus,onSave,onDiscard}){
  const finished=sketch?sketch.finished:[];
  const recent=[...finished].reverse().slice(0,9);
  const streakWord=streak&&streak.streak>1?`${streak.streak} days in a row`:"a fresh start";
  // status report: the keys you miss most (need a few tries before it counts)
  const missed=SYMBOLS.map(s=>({...s,st:stats[s.ch]}))
    .filter(s=>s.st.attempts>=3&&s.st.errors>0)
    .map(s=>({...s,miss:s.st.errors/s.st.attempts}))
    .sort((a,b)=>b.miss-a.miss).slice(0,5);
  const focusSet=missed.map(s=>s.ch);
  return (
    <>
      {streak&&streak.sessions>0&&(
        <div className="kf-streak">
          <span className="kf-streak-num">{streak.streak||1}</span>
          <span className="kf-streak-txt">
            {streak.streak>1 ? <>Welcome back — <b>{streakWord}</b>.</> : <>Good to see you. Showing up is the whole game.</>}
            {streak.days>1 && <> {streak.days} days · {streak.sessions} sessions{finished.length>0?` · ${finished.length} ${finished.length===1?"sketch":"sketches"}`:""}.</>}
          </span>
        </div>
      )}
      <Collapsible title={sketch&&sketch.pending!=null?"Sketch — finished":"Drawing"} defaultOpen={true} subtitle={sketch&&sketch.pending!=null?"keep or delete?":`${Math.round((sketch?sketch.strokes:0)/STROKES_GOAL*100)}%`}>
        <LiveSketch sketch={sketch} onSave={onSave} onDiscard={onDiscard}/>
      </Collapsible>
      <Collapsible title="Your most-missed keys" defaultOpen={true} subtitle={attempts===0?null:missed.length>0?`${missed.length} ${missed.length===1?"key":"keys"} fumbled`:"clean so far"}>
        {attempts===0
          ? <p className="kf-dim" style={{margin:0}}>No keystrokes yet. Start the warm-up — the keys you fumble surface here, with a button to drill just those.</p>
          : missed.length>0
            ? <>
                <div className="kf-missed">
                  {missed.map(m=>(
                    <div key={m.ch} className="kf-missed-row" title={`${m.st.errors} misses in ${m.st.attempts} tries — ${m.where}`}>
                      <code className="kf-missed-ch">{m.ch}</code>
                      <span className="kf-missed-bar"><i style={{width:Math.max(6,Math.round(m.miss*100))+"%"}}/></span>
                      <span className="kf-missed-pct">{Math.round(m.miss*100)}%</span>
                    </div>
                  ))}
                </div>
                <button className="kf-drillthese" onClick={()=>onFocus(focusSet)}>Drill just these {focusSet.map(c=><code key={c}>{c}</code>)} →</button>
              </>
            : <p className="kf-dim" style={{margin:0}}>Clean so far — nothing's tripping you up. Keep going.</p>}
      </Collapsible>
      {attempts>0&&(
        <Collapsible title="Accuracy per key" subtitle="heatmap">
          <Heatmap stats={stats}/>
        </Collapsible>
      )}
      {recent.length>0&&(
        <Collapsible title="Finished sketches" defaultOpen={true} subtitle={`${recent.length} saved`}>
          <div className="kf-collection">
            {recent.map((idx,i)=><div key={i} className="kf-frame"><SketchArt sketch={SKETCHES[idx]} frac={1}/></div>)}
          </div>
        </Collapsible>
      )}
    </>
  );
}
function Heatmap({stats}){
  return (
    <div className="kf-heat">
      {SYMBOLS.map(s=>{const st=stats[s.ch];const acc=st.attempts?1-st.errors/st.attempts:null;const ml=Math.round(mean(st.lat));const hue=acc===null?null:95-(1-acc)*95;
        return (
          <div key={s.ch} className="kf-cell"
            style={{background:acc===null?"var(--sheet-head)":`hsl(${hue},48%,${90-acc*8}%)`,borderColor:acc===null?"var(--line)":`hsl(${hue},42%,${80-acc*8}%)`}}
            title={acc===null?"untouched":`${Math.round(acc*100)}% · ${ml}ms · ${st.attempts} hits`}>
            <span className="kf-cell-ch">{s.ch}</span>
            <span className="kf-cell-meta">{acc===null?"—":`${Math.round(acc*100)}%`}</span>
          </div>
        );})}
    </div>
  );
}

/* ── On-screen keyboard diagram ──
   Shows the full QWERTY layout; target key = blue, shift key = purple (when needed),
   wrong key = red for ~700ms. Finger-zone tints follow standard 8-finger color guide. */
function KeyboardDiagram({target,wrongKey}){
  // The POS map (already computed above) gives us row + column for every key
  const tKey=target?target.physKey:null;
  const needsShift=target?target.shift:false;
  const OFFSETS=[0,14,23,34]; // horizontal offset per row (px) to stagger like a real keyboard
  return (
    <div className="kf-kbd-wrap" style={{overflowX:"auto"}}>
      <div style={{display:"inline-block",minWidth:560}}>
        {KROWS.map((row)=>(
          <div key={row.row} className="kf-krow" style={{justifyContent:"flex-start",paddingLeft:OFFSETS[row.row]}}>
            {row.row===2&&<div className="kf-key wide" style={{fontSize:9,color:"var(--dim)"}}>Caps</div>}
            {row.row===3&&<div className={"kf-key wide"+(needsShift?" target-shift":"")} style={{fontSize:9}}>Shift</div>}
            {row.keys.map(k=>{
              const isTarget=tKey&&k.k===tKey&&!(!needsShift&&k.s&&k.s===target.ch); // main highlight
              // For `physKey` highlight, we match the raw base key regardless of shift
              const isPhysTarget=tKey&&k.k===tKey;
              const isWrong=wrongKey&&k.k===wrongKey;
              const cls=["kf-key std","finger-"+k.f, isPhysTarget?"target":"", isWrong?"wrong":""].filter(Boolean).join(" ");
              return (
                <div key={k.k} className={cls}>
                  {k.s&&<span className="kf-shifted">{k.s}</span>}
                  <span className="kf-base">{k.k.toUpperCase()}</span>
                </div>
              );
            })}
            {row.row===2&&<div className="kf-key wide" style={{fontSize:9,color:"var(--dim)"}}>Enter</div>}
            {row.row===0&&<div className="kf-key xwide" style={{fontSize:9,color:"var(--dim)"}}>Back</div>}
          </div>
        ))}
        <div className="kf-krow" style={{paddingLeft:120}}>
          <div className="kf-key spc"><span className="kf-base" style={{fontSize:8,letterSpacing:2}}>SPACE</span></div>
        </div>
      </div>
    </div>
  );
}

/* TypedSlots: each keystroke "draws into" the next slot — same visual language as the kf-bigkey guide,
   but smaller and in a row. Correct = blue (accent), wrong = red. A blinking dashed slot waits next. */
function TypedSlots({typed}){
  const recent=typed.slice(-14);
  return (
    <div className="kf-term">
      <span className="kf-term-label">Typed</span>
      {recent.length===0
        ? <span className="kf-dim" style={{fontSize:".82rem"}}>The keys you press will appear here.</span>
        : recent.map((t,i)=>(
            <span key={typed.length-recent.length+i} className={"kf-slot"+(t.ok?"":" bad")}>{t.ch===" "?"␣":t.ch}</span>
          ))}
      <span className="kf-slot-empty" aria-hidden="true"/>
    </div>
  );
}

function Drill({stats,record,addProgress,onBreathe,focusKeys,clearFocus,voiceOn}){
  const statsRef=useRef(stats);statsRef.current=stats;
  // focus mode: practice ONLY the chosen (most-missed) keys — weighted toward the weaker ones
  const focus=useMemo(()=>{const set=Array.isArray(focusKeys)?focusKeys:[];const pool=SYMBOLS.filter(s=>set.includes(s.ch));return pool.length?pool:null;},[focusKeys]);
  // ── learning-science scheduler (SYMBOLS is the easy→hard, chunked-by-finger pedagogical order):
  //    layered release — introduce keys gradually, give each a little massed acquisition, then SPACED +
  //    INTERLEAVED review weighted by weakness (and no back-to-back repeats). Not random. ──
  const intro=useRef(0); const seen=useRef({}); const sinceIntro=useRef(0); const last=useRef(null);
  const schedule=useCallback(()=>{
    const weightedPick=poolN=>{const w=poolN.map(s=>weakness(statsRef.current[s.ch]));const tot=w.reduce((p,q)=>p+q,0)||1;let r=Math.random()*tot;
      for(let i=0;i<poolN.length;i++){r-=w[i];if(r<=0)return poolN[i];}return poolN[poolN.length-1];};
    if(focus) return {sym:weightedPick(focus),isNew:false};
    if(intro.current===0){intro.current=1;sinceIntro.current=0;return {sym:SYMBOLS[0],isNew:true};}
    const newest=SYMBOLS[intro.current-1];
    const review=()=>{let p=SYMBOLS.slice(0,intro.current).filter(s=>s.ch!==last.current);return weightedPick(p.length?p:SYMBOLS.slice(0,intro.current));};
    // 1) acquire the newest key (massed, but lightly interleaved so it isn't rote)
    if((seen.current[newest.ch]||0)<4 && (intro.current===1||Math.random()<0.6)) return {sym:newest,isNew:false};
    // 2) introduce the next key once the newest is warm and a few reps have passed
    if(intro.current<SYMBOLS.length && (seen.current[newest.ch]||0)>=3 && sinceIntro.current>=3){intro.current++;sinceIntro.current=0;return {sym:SYMBOLS[intro.current-1],isNew:true};}
    // 3) spaced + interleaved review across everything introduced
    return {sym:review(),isNew:false};
  },[focus]);
  const advance=useCallback(()=>{const l=schedule();seen.current[l.sym.ch]=(seen.current[l.sym.ch]||0)+1;if(!l.isNew)sinceIntro.current++;last.current=l.sym.ch;return l;},[schedule]);
  const [lesson,setLesson]=useState(advance);   // { sym, isNew }
  const target=lesson.sym, isNew=lesson.isNew;
  const prevTarget=useRef(target.ch);
  const [flash,setFlash]=useState(null);
  const [hint,setHint]=useState(null);
  const [wrongKey,setWrongKey]=useState(null);  // physical key lit red on the keyboard diagram
  const [typed,setTyped]=useState([]);          // terminal echo of what you actually pressed
  const [ks,setKs]=useState(0);                 // keystroke counter this session
  const [cel,setCel]=useState(0);
  const [celLvl,setCelLvl]=useState(1);
  const shownAt=useRef(performance.now());
  const streak=useRef(0);
  const report=useRelaxCue(useCallback(()=>onBreathe(3),[onBreathe]));
  // speak the key name when target changes
  useEffect(()=>{if(target.ch!==prevTarget.current){prevTarget.current=target.ch;speak(target.name,0.88);}},[target]);
  const next=useCallback(()=>{setLesson(advance());shownAt.current=performance.now();},[advance]);
  useEffect(()=>{
    shownAt.current=performance.now();
    const onKey=e=>{
      if(e.metaKey||e.ctrlKey||e.altKey)return;
      if(e.key.length!==1)return;
      e.preventDefault();
      const lat=performance.now()-shownAt.current;
      const ok=e.key===target.ch;
      record(target.ch,ok,lat);report(ok,lat);audio.playKey(ok);addProgress(ok);
      setKs(k=>k+1);
      setTyped(p=>[...p,{ch:e.key,ok}].slice(-36)); // echo it into the terminal line
      if(ok){
        setHint(null);setWrongKey(null);
        streak.current+=1;
        if(streak.current%12===0){audio.milestone();setCelLvl(Math.min(Math.floor(streak.current/12),4));setCel(c=>c+1);}
      }
      else{
        const h=diagnose(target.ch,e.key);setHint(h);
        if(h)speak(h,0.9);  // voice coaching: "you hit A — colon is up and to the right"
        const wrongPhys=(SYM_BY_CH[e.key]?SYM_BY_CH[e.key].physKey:e.key.toLowerCase());
        setWrongKey(wrongPhys);setTimeout(()=>setWrongKey(null),700);
        streak.current=0;
      }
      setFlash(ok?"ok":"miss");setTimeout(()=>setFlash(null),180);
      if(ok)setTimeout(next,120);
    };
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[target,record,next,report,addProgress]);
  return (
    <section className="kf-card kf-fade kf-center">
      <Celebrate trigger={cel} level={celLvl}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",width:"100%",marginBottom:".3rem",flexWrap:"wrap",gap:".4rem"}}>
        {focus
          ? <p className="kf-focusbar" style={{margin:0}}>Focusing on {focus.map(s=><code key={s.ch}>{s.ch}</code>)} <button className="kf-linkbtn" onClick={clearFocus}>drill all</button></p>
          : <p className="kf-dim" style={{margin:0}}>{intro.current>=SYMBOLS.length?"All keys in play":`Building up · ${intro.current}/${SYMBOLS.length} keys`}</p>}
        <p className="kf-counter" style={{margin:0}}><b>{ks}</b> keys this session</p>
      </div>
      {isNew&&!focus&&<span className="kf-newkey">New key — take it slow</span>}
      <div className="kf-place">
        <p className="kf-place-where">{target.where}</p>
        <p className="kf-place-finger">{target.finger}</p>
      </div>
      <div className={"kf-bigkey "+(flash||"")}>{target.ch}</div>
      <p className="kf-name">{target.name}</p>
      {hint&&<p className="kf-hint" key={hint}>{hint}</p>}
      <div className="kf-kbd"><KeyboardDiagram target={target} wrongKey={wrongKey}/></div>
      <TypedSlots typed={typed}/>
    </section>
  );
}

function Snippet({record,addProgress,onBreathe,voiceOn}){
  const [track,setTrack]=useState("Mixed");
  const [level,setLevel]=useState(()=>store.load().level||"Words"); // start beginners on Words
  const lvl=LEVEL_TO_SINGULAR[level];
  const pool=useMemo(()=>{
    let p=SNIPPETS.filter(s=>s.level===lvl);
    if(track!=="Mixed")p=p.filter(s=>s.track===track);
    return p.length?p:SNIPPETS.filter(s=>s.level===lvl); // fallback if track has no entries at this level
  },[track,lvl]);
  useEffect(()=>{store.save({level});},[level]);
  const [snip,setSnip]=useState(()=>pool[0]);
  const [pos,setPos]=useState(0);
  const [wrong,setWrong]=useState(false);
  const [hint,setHint]=useState(null);
  const [cel,setCel]=useState(0);
  const [celLvl,setCelLvl]=useState(1);
  const [ks,setKs]=useState(0);
  const lastAt=useRef(performance.now());
  const errs=useRef(0);
  const report=useRelaxCue(useCallback(()=>onBreathe(3),[onBreathe]));
  const loadNext=useCallback(p=>{const list=p||pool;setSnip(list[Math.floor(Math.random()*list.length)]);setPos(0);setWrong(false);setHint(null);errs.current=0;lastAt.current=performance.now();},[pool]);
  useEffect(()=>{loadNext(pool);},[track,level]); // eslint-disable-line
  useEffect(()=>{
    const onKey=e=>{
      if(e.metaKey||e.ctrlKey||e.altKey)return;
      if(e.key.length!==1)return;
      e.preventDefault();
      const want=snip.text[pos];
      const lat=performance.now()-lastAt.current;
      const ok=e.key===want;
      if(SYMBOL_SET.has(want))record(want,ok,lat);
      report(ok,lat);audio.playKey(ok);addProgress(ok);setKs(k=>k+1);
      if(ok){
        setWrong(false);setHint(null);lastAt.current=performance.now();
        const np=pos+1; setPos(np); // you type every character — closers included
        if(np>=snip.text.length){if(errs.current===0){audio.milestone();setCelLvl(snip.text.length>=24?3:snip.text.length>=16?2:1);setCel(c=>c+1);}setTimeout(()=>loadNext(),420);}
      }else{
        errs.current+=1;setWrong(true);
        const h=diagnose(want,e.key);setHint(h);
        if(h)speak(h,0.9);
        setTimeout(()=>setWrong(false),200);
      }
    };
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[snip,pos,record,loadNext,report,addProgress]);
  return (
    <section className="kf-card kf-fade">
      <Celebrate trigger={cel} level={celLvl}/>
      <div className="kf-tracks" style={{marginBottom:".4rem"}}>
        <span className="kf-tracks-label">Level</span>
        {LEVELS.map(l=><button key={l} className={l===level?"on":""} onClick={()=>setLevel(l)} title={l==="Words"?"Single tokens (easiest)":l==="Phrases"?"Mid-length expressions":"Full statements"}>{l}</button>)}
      </div>
      <div className="kf-tracks">
        <span className="kf-tracks-label">Track</span>
        {TRACKS.map(t=><button key={t} className={t===track?"on":""} onClick={()=>setTrack(t)}>{t}</button>)}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".25rem",flexWrap:"wrap",gap:".4rem"}}>
        <p className="kf-dim" style={{margin:0}}>Type every character including closers — like a real terminal. <code>{snip.track}</code></p>
        <p className="kf-counter" style={{margin:0}}><b>{ks}</b> keys this session</p>
      </div>
      <div className={"kf-snip "+(wrong?"wrong":"")}>
        {snip.text.split("").map((c,i)=><span key={i} className={i<pos?"done":i===pos?"cur":"pending"}>{c===" "?"\u00A0":c}</span>)}
      </div>
      {hint&&<p className="kf-hint" key={hint}>{hint}</p>}
    </section>
  );
}

// shared sensitivity, 0 (rarely) .. 1 (eager); default calm. RELAX_ON gates the breathing prompt entirely.
let RELAX_SENS = 0.4;
let RELAX_ON = true;
// returns a report(ok,lat) fn; on detected tension it calls onTrigger() (App opens a 3-breath break)
function useRelaxCue(onTrigger){
  const recent=useRef([]);const cooldown=useRef(0);const spikes=useRef(0);
  return useCallback((ok,lat)=>{
    if(!RELAX_ON)return;                              // breathing breaks switched off
    const r=recent.current;r.push({ok,lat});if(r.length>16)r.shift();
    if(performance.now()<cooldown.current)return;
    // sensitivity maps to thresholds: low sens = needs more evidence
    const errNeeded=Math.round(7-RELAX_SENS*4);      // 0→7 errors … 1→3 errors
    const spikeMult=4.5-RELAX_SENS*1.5;              // 0→4.5× … 1→3× the median gap
    const spikesNeeded=RELAX_SENS>0.66?1:2;          // only eager mode trips on a single pause
    const med=median(r.map(x=>x.lat));
    if(med>0 && lat>med*spikeMult && lat>450) spikes.current++; else spikes.current=Math.max(0,spikes.current-1);
    const errCount=r.filter(x=>!x.ok).length;
    if(r.length>=12 && (errCount>=errNeeded || spikes.current>=spikesNeeded)){
      recent.current=[];spikes.current=0;cooldown.current=performance.now()+60000;onTrigger();
    }
  },[onTrigger]);
}
const PRAISE=["Clean","Nice flow","Smooth","Locked in","Effortless","No misses","Flowing","Crisp"];
const PRAISE_HI=["On fire","Unstoppable","Flawless run","In the zone","Masterful"];
function Celebrate({trigger,level=1}){
  const [state,setState]=useState(null);
  useEffect(()=>{
    if(!trigger)return;
    const L=Math.max(1,Math.min(level,4));
    const hi=L>=3;
    const pool=hi?PRAISE_HI:PRAISE;
    setState({L,hi,word:pool[Math.floor(Math.random()*pool.length)]});
    const t=setTimeout(()=>setState(null),1100);
    return ()=>clearTimeout(t);
  },[trigger]);
  if(!state)return null;
  const {L,hi,word}=state;
  const count=6+L*5;            // 11 → 26 particles
  const radius=40+L*16;         // 56 → 104 px
  const parts=Array.from({length:count},(_,i)=>{
    const ang=(i/count)*Math.PI*2+(i%2?0.3:0);
    const r=radius*(0.7+Math.random()*0.5);
    return [Math.cos(ang)*r,Math.sin(ang)*r,i%2];
  });
  return (
    <div className="kf-celebrate" key={trigger}>
      <div className={"kf-check"+(hi?" hi":"")} style={{width:(48+L*8)+"px",height:(48+L*8)+"px",fontSize:(1.6+L*0.15)+"rem"}}>✓</div>
      {parts.map((d,i)=><span key={i} className="kf-particle" style={{"--tx":d[0]+"px","--ty":d[1]+"px",background:d[2]?"var(--accent)":"var(--good)",width:(7+L)+"px",height:(7+L)+"px"}}/>)}
      <span className={"kf-praise"+(hi?" hi":"")}>{word}{hi?` ×${level}`:""}</span>
    </div>
  );
}

/* Guided breathing reset: N slow breaths, exhale longer than inhale (the lever that flips on the
   calming "rest" response fastest). Starts with a small "prepare" circle, then grows on each in-breath. */
const BREATHE_IN=4000, BREATHE_OUT=6000, BREATHE_PREP=2200;
function BreatheOverlay({onClose,cycles=3}){
  const [phase,setPhase]=useState("prep"); // prep | in | out | done
  const [count,setCount]=useState(0);
  useEffect(()=>{
    let alive=true; const timers=[]; let n=1;
    const after=(ms,fn)=>timers.push(setTimeout(()=>{if(alive)fn();},ms));
    const cycle=()=>{
      setPhase("in"); setCount(n);
      after(BREATHE_IN,()=>{ setPhase("out");
        after(BREATHE_OUT,()=>{
          if(n>=cycles){ setPhase("done"); after(2800,onClose); }
          else { n+=1; cycle(); }
        });
      });
    };
    setPhase("prep"); after(BREATHE_PREP,cycle); // small circle first: "prepare to breathe in"
    return ()=>{ alive=false; timers.forEach(clearTimeout); };
  },[onClose,cycles]);
  const done=phase==="done";
  const scale=phase==="in"?1.15:phase==="prep"?0.42:done?0.95:0.55;
  const dur=phase==="in"?BREATHE_IN:phase==="prep"?BREATHE_PREP:BREATHE_OUT;
  return (
    <div className="kf-relax" onClick={onClose}>
      {phase==="prep"&&<p className="kf-bcount">Get ready · {cycles} slow breaths</p>}
      {(phase==="in"||phase==="out")&&<p className="kf-bcount">Breath {count} of {cycles}</p>}
      <div className="kf-borb" style={{transform:`scale(${scale})`,transitionDuration:dur+"ms"}}/>
      <p>{done?"Nice.":phase==="prep"?"Prepare to breathe in…":phase==="in"?"Deep breath in…":"…and slowly out"}</p>
      <p className="kf-dim">{done
        ? "Shoulders down, wrists floating. Carry on whenever you're ready."
        : "Let your shoulders drop and your wrists float. Follow the circle — slow and easy."}</p>
      <span className="kf-skip">tap anywhere to skip</span>
    </div>
  );
}

/* ── Welcome / orientation (first visit; reopen via ?) ──
   North-Star principles from the Archaeology kits: orient first — what you do, what's next,
   what the result is, what you get — top-down and scannable, with one clear way to start. */
const FEATURES=[
  { ic:"=",  name:"Drill the symbols", body:<>Warm up on one symbol at a time, easiest first, with a finger hint. The order quietly adapts to the keys you fumble. <span className="kf-feat-step">You get:</span> the awkward reaches stop feeling awkward.</> },
  { ic:"{}", name:"Type code", body:<>Real SQL, Python, Excel — start with single <b>words</b> (like <code>SELECT</code>), graduate to <b>phrases</b>, then full <b>lines</b>. You type every symbol, closers included. <span className="kf-feat-step">You get:</span> the patterns feel familiar under your fingers.</> },
  { ic:"✎",  name:"Watch a sketch appear", body:<>Each clean line quietly draws a little picture below the keys. Finish one in ~5 minutes, then save it or delete it; pick a style (charcoal, watercolor, abstract, celestial) in <code>⚙</code>. <span className="kf-feat-step">You get:</span> a calm, growing reward for showing up.</> },
  { ic:"♪",  name:"Optional gentle sound", body:<>Soft, musical key feedback and a low flow pad that swells as you find a rhythm. <span className="kf-feat-step">Off by default</span> — tap <code>♪</code> anytime to turn it on.</> },
  { ic:"~",  name:"Breathing breaks", body:<>If it senses tension or hesitation (never speed), it offers <b>three slow breaths</b> to loosen your shoulders. On by default; tune it or switch it off in <code>⚙</code>.</> },
];
function Welcome({onStart,onClose,muted}){
  return (
    <div className="kf-welcome-backdrop" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="kf-welcome">
      <div className="kf-welcome-head">
        <div>
          <h2>Welcome to Keygarden</h2>
          <p className="kf-welcome-sub">the symbols data work runs on — slow, relaxed, repeated</p>
        </div>
        <button className="kf-welcome-x" onClick={onClose}>Skip ✕</button>
      </div>
      <p className="kf-premise">A calm place to drill the brackets, braces, and operators that slow you down in SQL, Python, and spreadsheets. <b>No timer, no score, nothing to fail</b> — a few quiet minutes, most days, is the whole method. Here's what's inside:</p>
      <div className="kf-feats">
        {FEATURES.map((f,i)=>(
          <div className="kf-feat" key={i}>
            <span className="kf-feat-ic">{f.ic}</span>
            <div className="kf-feat-b"><h4>{f.name}</h4><p>{f.body}</p></div>
          </div>
        ))}
      </div>
      <div className="kf-welcome-cta">
        <button className="kf-start" onClick={onStart}>Start the warm-up →</button>
        <span>New here? The warm-up is the gentlest way in.{muted?" Sound is off — tap ♪ to add it.":""}</span>
      </div>
    </div>
    </div>
  );
}

/* ── Simple line sketch ──
   One connected path with pathLength="100", revealed a fraction at a time via stroke-dashoffset.
   Clean, thick, blue accent stroke — in the lesson visual style. No filters, no fills, no packs. */
function SketchDefs(){ return null; } // legacy hook — no filters needed anymore
function SketchArt({sketch,frac}){
  const f=Math.max(0,Math.min(1,frac));
  return (
    <svg className="kf-art" viewBox="0 0 120 120" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <path className="ghost" d={sketch.d} pathLength="100"/>
      <path className="ink" d={sketch.d} pathLength="100" style={{strokeDasharray:100,strokeDashoffset:100*(1-f)}}/>
    </svg>
  );
}
/* LiveSketch: the prominent drawing panel in the work area.
   A pen-tip dot follows the end of the drawn line so it looks like it's being sketched. */
function LiveSketch({sketch,onSave,onDiscard}){
  const pending=sketch.pending!=null;
  const cur=SKETCHES[pending?sketch.pending:sketch.current]||SKETCHES[0];
  const frac=pending?1:Math.max(0,Math.min(1,sketch.strokes/STROKES_GOAL));
  const near=frac>=0.75&&!pending;
  const n=sketch.finished?sketch.finished.length:0;
  const title=cur.name.charAt(0).toUpperCase()+cur.name.slice(1);
  const pathRef=useRef(null);
  const [tip,setTip]=useState({x:60,y:60,visible:false});
  useEffect(()=>{
    if(!pathRef.current||frac===0||frac>=1){setTip(t=>({...t,visible:false}));return;}
    try{ const total=pathRef.current.getTotalLength(); const pt=pathRef.current.getPointAtLength(frac*total); setTip({x:pt.x,y:pt.y,visible:true}); }catch(e){}
  },[frac,cur.d]);
  return (
    <div className={"kf-sketch-row"+(pending?" done":"")}>
        <div className="kf-sketch-canvas">
          <svg className="kf-art" viewBox="0 0 120 120" aria-hidden="true">
            <path className="ghost" d={cur.d} pathLength="100"/>
            <path ref={pathRef} className="ink" d={cur.d} pathLength="100" style={{strokeDasharray:100,strokeDashoffset:100*(1-frac)}}/>
            {tip.visible&&<circle cx={tip.x} cy={tip.y} r="3.6" className="kf-pen-tip" fill="var(--accent)"/>}
          </svg>
        </div>
        <div className="kf-sketch-info">
          <p className="kf-sketch-name">{title}</p>
          {pending?(
            <>
              <p className="kf-dim">Keep this one in your collection?</p>
              <div className="kf-save-row" style={{marginTop:".6rem"}}>
                <button className="kf-save" onClick={onSave}>Save</button>
                <button className="kf-del" onClick={onDiscard}>Delete</button>
              </div>
            </>
          ):(
            <>
              <div className="kf-sketch-prog"><i style={{width:Math.round(frac*100)+"%"}}/></div>
              <p className="kf-dim">{near?"Almost there — a few more keystrokes finish it.":n>0?`${n} ${n===1?"sketch":"sketches"} saved · type to draw`:"Type to draw — each keystroke unfolds the line."}</p>
            </>
          )}
        </div>
    </div>
  );
}
