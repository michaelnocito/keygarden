<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keygarden — typing practice for your field</title>
<meta name="description" content="A calm typing trainer for the symbols your field runs on — SQL, Python, healthcare charting, shell commands, spreadsheet formulas, and more. No timer, no score, nothing to fail." />
<meta name="theme-color" content="#2f6df0" />
<meta property="og:title" content="Keygarden — typing practice for your field" />
<meta property="og:description" content="Pick your field. Practice the symbols that actually slow you down. Grow a biodiversity garden as you go." />
<meta property="og:type" content="website" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Keygarden" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<style>
  /* ── Nocito calm-analyst design system (spreadsheet-archaeology/DESIGN_SYSTEM.md) ──
     Light theme · system-ui chrome · monospace only for keys/code · no external fonts */
  *{box-sizing:border-box;}
  body{margin:0;}
  #root{
    --bg:#eef1f5;--panel:#ffffff;--line:#d6dce4;
    --shadow:0 1px 2px rgba(20,30,50,.06),0 6px 20px rgba(20,30,50,.06);
    --ink:#1f2328;--dim:#5b6470;
    --accent:#2f6df0;--accent-d:#1f4fc4;--accent-bg:#eef4ff;--accent-bd:#d4e1ff;
    --good:#1a7f37;--good-bg:#e7f6ec;--good-bd:#bfe5ca;
    --bad:#cf222e;--bad-bg:#fdecee;
    --warm:#9a6700;--warm-bg:#fbf7ec;--warm-bd:#e3d7a5;
    --sheet-head:#f3f5f8;
    --mono:"Consolas",ui-monospace,SFMono-Regular,Menlo,monospace;
    min-height:100vh;background:var(--bg);color:var(--ink);
    font:15px/1.55 -apple-system,"Segoe UI",Roboto,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;align-items:center;padding:1.6rem 1rem 3.5rem;
  }
  /* ── Brand header ── */
  .kf-head{text-align:center;margin-bottom:1.1rem;}
  .kf-brand{display:flex;align-items:center;justify-content:center;gap:.5rem;}
  .kf-glyph{font-family:var(--mono);color:var(--accent);font-size:.82rem;background:linear-gradient(135deg,#eaf1ff,#dbe7ff);padding:.1rem .38rem;border-radius:6px;}
  .kf-head h1{font-weight:800;font-size:1.9rem;margin:0;letter-spacing:-.4px;color:var(--ink);}
  .kf-tag{color:var(--dim);font-size:.8rem;margin:.3rem 0 0;}
  .kf-field-chip{display:inline-block;margin:.4rem 0 0;font-size:.72rem;font-weight:700;color:var(--accent-d);background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:999px;padding:.18rem .6rem;}
  /* ── Nav ── */
  .kf-nav{display:flex;gap:.32rem;margin-bottom:1.1rem;flex-wrap:wrap;justify-content:center;align-items:center;}
  .kf-nav button{font-family:inherit;font-size:.72rem;font-weight:600;color:var(--dim);background:var(--sheet-head);border:1px solid var(--line);padding:.26rem .7rem;border-radius:999px;cursor:pointer;transition:.18s;}
  .kf-nav button:hover{color:var(--accent-d);border-color:var(--accent-bd);}
  .kf-nav button.on{color:#fff;background:var(--accent);border-color:var(--accent);box-shadow:0 2px 8px rgba(47,109,240,.28);}
  .kf-mute{width:1.8rem;height:1.8rem;padding:0!important;border-radius:50%!important;font-size:.78rem;font-family:inherit;font-weight:600;color:var(--dim);background:var(--sheet-head);border:1px solid var(--line);cursor:pointer;transition:.18s;}
  .kf-mute:hover{color:var(--accent-d);border-color:var(--accent-bd);}
  .kf-mute.off{opacity:.4;text-decoration:line-through;}
  /* ── Settings ── */
  .kf-settings{width:100%;max-width:600px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:1rem 1.2rem;margin-bottom:.9rem;box-shadow:var(--shadow);}
  .kf-settings label{font-size:.88rem;color:var(--ink);}
  .kf-settings label strong{color:var(--accent-d);}
  .kf-settings input[type=range]{width:100%;margin:.7rem 0 .2rem;accent-color:var(--accent);cursor:pointer;}
  .kf-slabels{display:flex;justify-content:space-between;font-size:.64rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
  .kf-settings .kf-dim{margin:.5rem 0 0;}
  .kf-reset{margin-top:.85rem;font-family:inherit;font-size:.72rem;font-weight:600;color:var(--bad);background:transparent;border:1px solid rgba(207,34,46,.3);padding:.35rem .75rem;border-radius:8px;cursor:pointer;transition:.15s;}
  .kf-reset:hover{background:var(--bad-bg);}
  /* ── Field picker ── */
  .kf-picker{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.5rem;}
  .kf-pick{font-family:inherit;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:.8rem .95rem;cursor:pointer;transition:.15s;box-shadow:var(--shadow);}
  .kf-pick:hover{border-color:var(--accent-bd);background:var(--accent-bg);transform:translateY(-2px);}
  .kf-pick-label{display:block;font-weight:700;font-size:.9rem;color:var(--ink);}
  .kf-pick-blurb{display:block;font-size:.68rem;color:var(--dim);margin-top:.2rem;}
  /* ── Cards ── */
  .kf-main{width:100%;max-width:600px;}
  .kf-card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:1.1rem 1.3rem 1.2rem;box-shadow:var(--shadow);margin-bottom:.6rem;}
  .kf-eyebrow{font-size:9px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--accent-d);margin:0 0 .3rem;}
  /* ── Celebration ── */
  .kf-celebrate{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:6;}
  .kf-check{border-radius:50%;background:var(--good);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 8px 24px -6px rgba(26,127,55,.5);animation:pop .55s cubic-bezier(.2,1.5,.4,1),celebfade .35s ease-out .7s forwards;}
  .kf-check.hi{background:var(--accent);box-shadow:0 8px 30px -4px rgba(47,109,240,.55);}
  .kf-praise.hi{color:var(--accent-d);font-weight:700;}
  @keyframes pop{0%{transform:scale(0);}60%{transform:scale(1.18);}100%{transform:scale(1);}}
  @keyframes celebfade{to{opacity:0;transform:scale(.9);}}
  .kf-praise{position:absolute;top:calc(50% + 44px);font-weight:700;color:var(--good);font-size:1.05rem;white-space:nowrap;animation:praise 1s ease-out forwards;}
  @keyframes praise{0%{opacity:0;transform:translateY(6px);}25%{opacity:1;transform:none;}80%{opacity:1;}100%{opacity:0;}}
  .kf-particle{position:absolute;width:9px;height:9px;border-radius:50%;animation:burst .85s cubic-bezier(.25,.6,.3,1) forwards;}
  @keyframes burst{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}
  @media(prefers-reduced-motion:reduce){.kf-particle,.kf-check,.kf-praise{animation:none!important;opacity:0;}}
  /* ── Drill ── */
  .kf-center{text-align:center;}
  .kf-fade{animation:fade .4s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .kf-dim{color:var(--dim);font-size:.78rem;}
  .kf-dim code,.kf-focus code{font-family:var(--mono);color:var(--accent-d);background:var(--accent-bg);border:1px solid var(--accent-bd);padding:.05rem .35rem;border-radius:5px;}
  .kf-bigkey{font-family:var(--mono);position:relative;font-size:5.5rem;font-weight:700;line-height:1;margin:1rem 0 .5rem;color:var(--ink);transition:.12s;display:inline-block;}
  .kf-bigkey.ok{color:var(--good);transform:scale(.92);}
  .kf-bigkey.ok::after{content:"";position:absolute;left:50%;top:50%;width:1.2em;height:1.2em;border:2px solid var(--good);border-radius:50%;transform:translate(-50%,-50%);animation:ring .45s ease-out forwards;}
  @keyframes ring{0%{opacity:.6;transform:translate(-50%,-50%) scale(.6);}100%{opacity:0;transform:translate(-50%,-50%) scale(1.8);}}
  .kf-bigkey.miss{color:var(--bad);animation:nudge .18s;}
  @keyframes nudge{0%,100%{transform:none;}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
  .kf-name{font-weight:700;font-size:1rem;margin:.15rem 0 .05rem;color:var(--ink);}
  .kf-finger{color:var(--accent-d);font-size:.75rem;font-weight:600;letter-spacing:.4px;}
  .kf-hint{margin:.6rem auto 0;color:var(--warm);font-size:.8rem;background:var(--warm-bg);border:1px solid var(--warm-bd);border-left:3px solid var(--warm);border-radius:6px;padding:.35rem .65rem;display:inline-block;animation:fade .25s ease;max-width:520px;}
  .kf-newkey{display:inline-block;font-size:.6rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--good);border-radius:999px;padding:.15rem .55rem;margin-bottom:.4rem;animation:fade .3s ease;}
  /* ── Snippet ── */
  .kf-snip{font-family:var(--mono);font-size:1.1rem;line-height:1.85;letter-spacing:.3px;margin:.5rem 0 .4rem;word-break:break-word;border-radius:8px;padding:.45rem .6rem;transition:.15s;}
  .kf-snip.wrong{background:var(--bad-bg);}
  .kf-snip .done{color:var(--good);}
  .kf-snip .auto{color:var(--good);opacity:.6;font-style:italic;border-bottom:1px dotted var(--good);}
  .kf-snip .pending{color:var(--dim);opacity:.5;}
  .kf-snip .cur{color:#fff;background:var(--accent);border-radius:4px;padding:.05rem .12rem;box-shadow:0 0 0 2px rgba(47,109,240,.25);}
  .kf-tracks{display:flex;gap:.28rem;flex-wrap:wrap;margin-bottom:.5rem;}
  .kf-tracks button{font-family:inherit;font-size:.68rem;font-weight:600;color:var(--dim);background:var(--sheet-head);border:1px solid var(--line);padding:.2rem .55rem;border-radius:999px;cursor:pointer;transition:.15s;}
  .kf-tracks button:hover{color:var(--accent-d);border-color:var(--accent-bd);}
  .kf-tracks button.on{color:#fff;background:var(--accent);border-color:var(--accent);}
  .kf-card h2{font-weight:700;margin:0 0 .8rem;font-size:1.2rem;color:var(--ink);}
  .kf-focus{font-size:.85rem;margin:0 0 .9rem;}
  .kf-focus code{margin-right:.3rem;font-size:.92rem;}
  /* ── Progress / heatmap ── */
  .kf-heat{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:.25rem;}
  .kf-cell{border-radius:7px;padding:.28rem .1rem;text-align:center;border:1px solid var(--line);}
  .kf-cell-ch{font-family:var(--mono);display:block;font-size:.82rem;font-weight:600;color:var(--ink);}
  .kf-cell-meta{display:block;font-size:.52rem;color:var(--dim);margin-top:.05rem;}
  .kf-empty{text-align:center;padding:.4rem 0;}
  .kf-empty p{margin:.4rem 0;}
  .kf-empty p:first-child{font-weight:700;font-size:1.15rem;color:var(--ink);}
  /* ── Relax overlay ── */
  .kf-relax{position:fixed;inset:0;background:linear-gradient(180deg,#1b2a44 0%,#243a5e 55%,#33506f 100%);color:#eaf0fb;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;cursor:pointer;text-align:center;padding:2rem;animation:fade .5s ease;}
  .kf-relax p{font-weight:700;font-size:1.6rem;margin:.4rem 0 0;}
  .kf-relax .kf-dim{color:#cdddf5;font-size:.85rem;max-width:300px;}
  .kf-breath{width:90px;height:90px;border-radius:50%;border:2px solid #7ea8d8;margin-bottom:1.5rem;animation:breath 4s ease-in-out infinite;}
  @keyframes breath{0%,100%{transform:scale(.7);opacity:.4;}50%{transform:scale(1.15);opacity:1;}}
  /* ── PWA install pill ── */
  .kf-install{display:inline-flex;align-items:center;gap:.3rem;font-family:inherit;font-size:.7rem;font-weight:700;color:var(--accent-d);background:var(--accent-bg);border:1px solid var(--accent-bd);padding:.22rem .32rem .22rem .58rem;border-radius:999px;cursor:pointer;transition:background .15s,color .15s;user-select:none;}
  .kf-install:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .kf-install-x{display:inline-flex;align-items:center;justify-content:center;width:.95rem;height:.95rem;border-radius:50%;color:var(--dim);font-size:.9rem;line-height:1;margin-left:.08rem;transition:background .12s;}
  .kf-install:hover .kf-install-x{color:rgba(255,255,255,.85);}
  /* ── Touch / no-keyboard notice ── */
  .kf-touch-notice{width:100%;max-width:520px;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:2.2rem 1.8rem;box-shadow:var(--shadow);}
  .kf-touch-notice h2{font-weight:700;font-size:1.2rem;margin:0 0 .5rem;color:var(--ink);}
  .kf-touch-notice p{font-size:.88rem;color:var(--dim);margin:0;}
  /* ── 60-second onboarding overlay ── */
  .kf-onboard-wrap{position:fixed;inset:0;z-index:40;background:rgba(20,30,50,.45);display:flex;align-items:flex-start;justify-content:center;padding:2.5rem 1.2rem;overflow:auto;animation:fade .3s ease;}
  .kf-onboard{width:100%;max-width:520px;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 24px 60px -24px rgba(20,30,50,.5);padding:1.4rem 1.5rem 1.5rem;}
  .kf-onboard h3{font-weight:700;font-size:1.1rem;margin:0 0 .45rem;color:var(--ink);}
  .kf-onboard p{font-size:.88rem;line-height:1.55;color:#2b3240;margin:0 0 .9rem;}
  .kf-onboard b{color:var(--accent-d);}
  .kf-onboard-cta{font-family:inherit;font-size:.9rem;font-weight:700;color:#fff;background:var(--accent);border:0;border-radius:10px;padding:.6rem 1.3rem;cursor:pointer;box-shadow:0 2px 8px rgba(47,109,240,.28);transition:.15s;}
  .kf-onboard-cta:hover{background:var(--accent-d);}
  /* ── Garden ── */
  .kf-garden-svg{width:100%;display:block;border-radius:10px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);}
  .kf-garden-prog-wrap{display:flex;align-items:center;gap:.5rem;margin:.45rem 0 .1rem;}
  .kf-garden-progbar{flex:1 1 auto;height:6px;border-radius:999px;background:var(--sheet-head);border:1px solid var(--line);overflow:hidden;}
  .kf-garden-progbar i{display:block;height:100%;background:linear-gradient(90deg,var(--good),#5aaf44);border-radius:999px;transition:width 1.2s ease;}
  .kf-garden-next-label{font-size:.72rem;font-weight:600;color:var(--good);white-space:nowrap;}
  .kf-garden-empty{text-align:center;padding:1rem .5rem 0;color:var(--dim);font-size:.84rem;}
  .kf-garden-ladder{display:flex;flex-direction:column;gap:.2rem;margin:.45rem 0 0;}
  .kf-ladder-step{display:flex;align-items:flex-start;gap:.4rem;padding:.25rem .5rem;border-radius:8px;}
  .kf-ladder-step.done{background:var(--good-bg);border:1px solid var(--good-bd);}
  .kf-ladder-step.next{background:var(--accent-bg);border:1px dashed var(--accent-bd);}
  .kf-ladder-step.locked{opacity:.33;background:var(--sheet-head);border:1px solid transparent;}
  .kf-ladder-ic{flex:0 0 1.05rem;font-size:.86rem;text-align:center;line-height:1.4;}
  .kf-ladder-name{font-weight:700;font-size:.76rem;color:var(--ink);}
  .kf-ladder-fact{font-size:.65rem;color:var(--dim);margin:.04rem 0 0;line-height:1.4;font-style:italic;}
  /* ── Unlock toast ── */
  .kf-unlock-toast{position:fixed;bottom:1.4rem;right:1.4rem;z-index:60;background:var(--panel);border:1px solid var(--good-bd);border-left:4px solid var(--good);border-radius:12px;box-shadow:0 8px 28px -8px rgba(26,127,55,.3);padding:.55rem .8rem .5rem;max-width:265px;cursor:pointer;animation:fade .4s ease;}
  .kf-unlock-head{font-weight:700;font-size:.8rem;color:var(--good);margin:0 0 .1rem;}
  .kf-unlock-body{font-size:.74rem;color:var(--ink);margin:0 0 .1rem;}
  .kf-unlock-fact{font-size:.64rem;color:var(--dim);margin:0;line-height:1.4;font-style:italic;}
  /* ── Wildlife animations ── */
  @keyframes beefloat{0%,100%{transform:translate(0,0);}33%{transform:translate(5px,-4px);}66%{transform:translate(-3px,2px);}}
  @keyframes flutter{0%,100%{transform:scaleX(1);}50%{transform:scaleX(.2)scaleY(1.1);}}
  @keyframes glow{0%,100%{opacity:.18;}50%{opacity:.9;}}
  @keyframes batflight{0%{transform:translate(0,0)scaleX(1);}40%{transform:translate(36px,-12px)scaleX(-1);}100%{transform:translate(0,0)scaleX(1);}}
  @media(prefers-reduced-motion:reduce){
    .kf-bee,.kf-butterfly,.kf-dragonfly,.kf-bird,.kf-bat,.kf-firefly{animation:none!important;opacity:.7!important;}
    .kf-garden-progbar i{transition:none!important;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── Templates: each field retargets which keys you drill + the snippets ──
   keygarden is one product; a template swaps only the practice content.
   The garden, audio, relax system, coaching, and persistence are shared. */
const SYMBOL_META = {
  "=": ["equals","right pinky"], ";": ["semicolon","right pinky"], ":": ["colon","right pinky + Shift"],
  "[": ["left bracket","right pinky"], "]": ["right bracket","right pinky"],
  "{": ["left brace","right pinky + Shift"], "}": ["right brace","right pinky + Shift"],
  "(": ["left paren","right ring + Shift"], ")": ["right paren","right pinky + Shift"],
  "_": ["underscore","right pinky + Shift"], '"': ["double quote","right pinky + Shift"], "'": ["apostrophe","right pinky"],
  "*": ["asterisk","right middle + Shift"], "#": ["hash","left middle + Shift"], "%": ["percent","left index + Shift"],
  "&": ["ampersand","right index + Shift"], "@": ["at","left ring + Shift"], "$": ["dollar","left index + Shift"],
  "<": ["less than","right middle + Shift"], ">": ["greater than","right ring + Shift"], "|": ["pipe","right pinky + Shift"],
  "/": ["slash","right ring"], "\\": ["backslash","right pinky"], "-": ["hyphen","right pinky"], "+": ["plus","right pinky + Shift"],
  ".": ["period","right ring"], ",": ["comma","right middle"], "!": ["exclamation","left pinky + Shift"],
  "?": ["question mark","right pinky + Shift"], "~": ["tilde","left pinky + Shift"],
};
const mk = (chars) => chars.map((ch) => ({ ch, name: SYMBOL_META[ch][0], finger: SYMBOL_META[ch][1] }));

const TEMPLATES = [
  { id: "general", label: "General", blurb: "Everyday writing & email punctuation",
    symbols: mk([".", ",", "'", "-", "/", ":", "?", "!", '"', "(", ")", "@"]),
    snippets: [
      { track: "Everyday", text: "See you @ 5:30 - don't be late!" },
      { track: "Everyday", text: "Re: Friday's meeting (rescheduled)" },
      { track: "Everyday", text: "It's a 24/7 service, right?" },
      { track: "Everyday", text: "Email me: sam@work.com" },
      { track: "Everyday", text: "Q: What's next? A: We'll see." },
      { track: "Everyday", text: "Notes: bring ID, keys, phone." },
    ] },
  { id: "healthcare", label: "Healthcare", blurb: "Charting: doses, units, vitals",
    symbols: mk([".", "-", "/", ":", "(", ")", "%", '"']),
    snippets: [
      { track: "Charting", text: "BP 120/80 mmHg, HR 72" },
      { track: "Charting", text: "Amoxicillin 500 mg PO q8h" },
      { track: "Charting", text: "O2 sat 98% on room air" },
      { track: "Charting", text: "Pt c/o chest pain x2 days" },
      { track: "Charting", text: "Dx: J45.909 (asthma)" },
      { track: "Charting", text: "1-2 tabs q6h PRN pain" },
    ] },
  { id: "software", label: "Software / Web Dev", blurb: "Code: brackets, arrows, operators",
    symbols: mk([";", "=", "/", "*", "[", "]", "(", ")", '"', "<", ">", "{", "}"]),
    snippets: [
      { track: "JavaScript", text: "const total = sum(items);" },
      { track: "JavaScript", text: "arr.map(x => x * 2)" },
      { track: "JavaScript", text: "if (x > 0) { return x; }" },
      { track: "JavaScript", text: "items.filter(n => n >= 10)" },
      { track: "HTML", text: '<div class="card"></div>' },
      { track: "HTML", text: "<a href=\"/home\">Home</a>" },
    ] },
  { id: "cyber", label: "Cybersecurity / IT", blurb: "Shell, configs, addresses",
    symbols: mk([".", "-", "/", ":", "@", "=", "*", "|", "~", "\\"]),
    snippets: [
      { track: "Shell", text: "nmap -sV 192.168.1.0/24" },
      { track: "Shell", text: "chmod 755 ./run.sh" },
      { track: "Shell", text: "grep -i error log.txt | wc -l" },
      { track: "Shell", text: "ssh user@host -p 22" },
      { track: "Shell", text: "cat /etc/passwd | grep root" },
      { track: "Shell", text: "curl -X POST api/v1/login" },
    ] },
  { id: "finance", label: "Finance / Accounting", blurb: "Spreadsheets, figures, formulas",
    symbols: mk([".", ",", "-", ":", "=", "(", ")", "%", "$", "*", "+"]),
    snippets: [

/* ── Audio: researched feedback design ──
   correct = soft warm pitched confirmation (low-salience, ignorable in bulk)
   wrong   = low dull "soft-no", quieter, slight downward slip
   reward  = warm rising arpeggio, only on clean line / clean streak */
const PENTA = (() => {
  const iv=[0,3,5,7,10], out=[];
  for(let o=0;o<2;o++) for(const i of iv) out.push(110*2**((o*12+i)/12));
  out.push(110*2**2); return out;
})();

function fade(a,sr){const f=Math.floor(sr*0.005);for(let i=0;i<f&&i<a.length;i++)a[a.length-1-i]*=i/f;return a;}
function norm(a,p){let m=0;for(const v of a)m=Math.max(m,Math.abs(v));if(m>0)for(let i=0;i<a.length;i++)a[i]=a[i]/m*p;return a;}

function warmPad(f,sr,dur=0.22,gain=0.45){
  const n=Math.floor(sr*dur),buf=new Float32Array(n),w=2*Math.PI*f;
  const a=0.008,d=0.12,sus=0.4;
  for(let i=0;i<n;i++){const t=i/sr;let e;
    if(t<a)e=t/a; else if(t<a+d)e=1-(1-sus)*((t-a)/d); else e=sus*Math.max(0,1-(t-a-d)/(dur-a-d));
    buf[i]=(0.7*Math.sin(w*t)+0.2*Math.sin(2*w*t)+0.1*Math.sin(3*w*t))*e*gain;}
  return fade(buf,sr);
}
// correct: warm, gentle upward lift, no harsh high end
function correctVoice(f,sr){
  const dur=0.085,n=Math.floor(sr*dur),buf=new Float32Array(n);let ph=0;
  for(let i=0;i<n;i++){const t=i/sr;
    const finst=f*(1+0.05*(t/dur));        // small rise = "yes"
    ph+=2*Math.PI*finst/sr;
    let s=0.8*Math.sin(ph)+0.2*Math.sin(2*ph); // + soft octave
    s*=Math.exp(-t/0.03);
    if(t<0.0015)s*=t/0.0015;
    buf[i]=s;}
  return fade(norm(buf,0.55),sr);
}
// wrong: low dull soft-no, downward, quieter
function missVoice(sr){
  const dur=0.12,n=Math.floor(sr*dur),buf=new Float32Array(n);let ph=0;
  for(let i=0;i<n;i++){const t=i/sr;
    const finst=165*(1-0.27*(t/dur));      // downward slip
    ph+=2*Math.PI*finst/sr;
    let s=Math.sin(ph)*Math.exp(-t/0.04);
    if(t<0.008)s+=(Math.random()*2-1)*0.18*(1-t/0.008); // soft body, low-passed feel
    if(t<0.0015)s*=t/0.0015;
    buf[i]=s;}
  return fade(norm(buf,0.6),sr);
}
// reward: warm rising arpeggio (root, fifth, octave)
function rewardVoice(sr){
  const notes=[220,329.63,440],dur=0.6,n=Math.floor(sr*dur),mix=new Float32Array(n);
  notes.forEach((f,k)=>{const v=warmPad(f,sr,0.26,0.4);const off=Math.floor(sr*0.085*k);
    for(let i=0;i<v.length&&i+off<n;i++)mix[i+off]+=v[i];});
  return fade(norm(mix,0.6),sr);
}

// gentle pentatonic phrase — an unbroken run plays it as a melody
const PHRASE=[0,2,4,5,4,2,3,5,7,5,4,3,2,4,5,7];

class AudioEngine{
  constructor(){this.ctx=null;this.master=null;this.notes=new Map();this.miss=null;this.reward=null;this.muted=false;this.flow=0;this.pad=null;}
  ensure(){
    if(this.ctx)return;
    const AC=window.AudioContext||window.webkitAudioContext;
    this.ctx=new AC();
    this.master=this.ctx.createGain();
    this.master.gain.value=this.muted?0:0.5;
    this.master.connect(this.ctx.destination);
    this.miss=this._buf(missVoice(this.ctx.sampleRate));
    this.reward=this._buf(rewardVoice(this.ctx.sampleRate));
    // flow pad: quiet root+fifth drone behind a lowpass; swells with the streak
    const pg=this.ctx.createGain();pg.gain.value=0;
    const lp=this.ctx.createBiquadFilter();lp.type="lowpass";lp.frequency.value=520;
    pg.connect(lp).connect(this.master);
    [110,164.81].forEach(f=>{const o=this.ctx.createOscillator();o.type="sine";o.frequency.value=f;o.connect(pg);o.start();});
    this.pad=pg;
  }
  _buf(a){const b=this.ctx.createBuffer(1,a.length,this.ctx.sampleRate);b.copyToChannel(a,0);return b;}
  _note(idx){
    if(!this.notes.has(idx)) this.notes.set(idx,this._buf(correctVoice(PENTA[idx],this.ctx.sampleRate)));
    return this.notes.get(idx);
  }
  _play(buf,g=1){if(!buf||this.muted)return;const gn=this.ctx.createGain();gn.gain.value=g;
    const s=this.ctx.createBufferSource();s.buffer=buf;s.connect(gn).connect(this.master);s.start();}
  _pad(g){if(this.pad)this.pad.gain.linearRampToValueAtTime(g,this.ctx.currentTime+0.3);}
  playKey(ok){this.ensure();if(this.ctx.state==="suspended")this.ctx.resume();
    if(ok){this._play(this._note(PHRASE[this.flow%PHRASE.length]));this.flow++;this._pad(Math.min(this.flow/22,1)*0.12);}
    else{this.flow=0;this._pad(0);this._play(this.miss,0.85);}}
  milestone(){if(this.ctx)this._play(this.reward);}
  setMuted(m){this.muted=m;if(this.master)this.master.gain.linearRampToValueAtTime(m?0:0.5,this.ctx.currentTime+0.05);}
  duck(on){if(this.master&&!this.muted)this.master.gain.linearRampToValueAtTime(on?0.12:0.5,this.ctx.currentTime+0.15);}
}
const audio=new AudioEngine();

/* ── miss diagnosis: spatial + Shift coaching ── */
const POS=(()=>{
  const rows=["`1234567890-=","qwertyuiop[]\\","asdfghjkl;'","zxcvbnm,./"];
  const sh={"`":"~","1":"!","2":"@","3":"#","4":"$","5":"%","6":"^","7":"&","8":"*","9":"(","0":")","-":"_","=":"+","[":"{","]":"}","\\":"|",";":":","'":'"',",":"<",".":">","/":"?"};
  const m={};
  rows.forEach((row,r)=>row.split("").forEach((base,c)=>{
    const x=c+r*0.4, y=r;
    m[base]={x,y,shift:false,base};
    if(sh[base]) m[sh[base]]={x,y,shift:true,base};
  }));
  for(let i=0;i<26;i++){const lo=String.fromCharCode(97+i);if(m[lo])m[String.fromCharCode(65+i)]={...m[lo],shift:true,base:lo};}
  return m;
})();
const label=ch=>ch===" "?"Space":ch;
function diagnose(targetCh,actualCh){
  const t=POS[targetCh], a=POS[actualCh];
  if(!t) return null;
  if(a){
    if(a.base===t.base){
      if(t.shift&&!a.shift) return `Right key — ${label(targetCh)} just needs Shift.`;
      if(!t.shift&&a.shift) return `Right key — ease off Shift for ${label(targetCh)}.`;
    }
    const dx=t.x-a.x, dy=t.y-a.y, adx=Math.abs(dx), ady=Math.abs(dy);
    const h=dx>0?"right":"left", v=dy>0?"down":"up";
    let dir;
    if(ady<0.5) dir=`just to the ${h}`;
    else if(adx<0.6) dir=`one row ${v}`;
    else dir=`${v} and to the ${h}`;
    return `You hit ${label(actualCh)} — ${label(targetCh)} is ${dir}${t.shift?", with Shift":""}.`;
  }
  return `Not quite — aim for ${label(targetCh)}${t.shift?" (with Shift)":""}.`;
}

const blankStatsFor=(tpl)=>{const s={};tpl.symbols.forEach(x=>s[x.ch]={attempts:0,errors:0,lat:[]});return s;};
const loadStats=(id)=>{
  const t=TPL_BY_ID[id]||TEMPLATES[0];const b=blankStatsFor(t);
  const saved=(store.load().templates||{})[id]&&(store.load().templates||{})[id].stats;
  if(saved)t.symbols.forEach(x=>{if(saved[x.ch])b[x.ch]={attempts:saved[x.ch].attempts|0,errors:saved[x.ch].errors|0,lat:Array.isArray(saved[x.ch].lat)?saved[x.ch].lat.slice(-30):[]};});
  return b;
};
const median=a=>{if(!a.length)return 0;const x=[...a].sort((p,q)=>p-q),m=Math.floor(x.length/2);return x.length%2?x[m]:(x[m-1]+x[m])/2;};
const mean=a=>a.length?a.reduce((p,q)=>p+q,0)/a.length:0;
const weakness=st=>{const acc=st.attempts?st.errors/st.attempts:0;const slow=Math.min(median(st.lat)/600,1);return 0.15+acc*2+slow;};
const pick=stats=>{const w=SYMBOLS.map(s=>weakness(stats[s.ch]));const tot=w.reduce((p,q)=>p+q,0);let r=Math.random()*tot;
  for(let i=0;i<SYMBOLS.length;i++){r-=w[i];if(r<=0)return SYMBOLS[i];}return SYMBOLS[SYMBOLS.length-1];};

/* ── App ── */
function App(){
  const [tplId,setTplId]=useState(initialTemplateId); // null => show picker
  if(tplId) applyTemplate(tplId); else applyTemplate("general");
  const [mode,setMode]=useState("home");
  const [stats,setStats]=useState(()=>loadStats(tplId||"general"));
  const [muted,setMuted]=useState(()=>!!store.load().muted);
  const [sens,setSens]=useState(()=>{const s=store.load().sens;return typeof s==="number"?s:0.4;});
  const [showSet,setShowSet]=useState(false);
  const [garden,setGarden]=useState(loadGarden);
  const [newUnlock,setNewUnlock]=useState(null);
  const [showOnboard,setShowOnboard]=useState(false);
  // PWA install prompt
  const [installPrompt,setInstallPrompt]=useState(null);
  const [installDismissed,setInstallDismissed]=useState(()=>!!store.load().installDismissed);
  const isStandalone=useMemo(()=>{try{return window.matchMedia&&window.matchMedia("(display-mode:standalone)").matches||!!window.navigator.standalone;}catch(e){return false;}},[]);
  // Touch/no-keyboard detection (Part D)
  const isTouch=useMemo(()=>{try{return navigator.maxTouchPoints>0&&!window.matchMedia("(pointer:fine)").matches;}catch(e){return false;}},[]);

  useEffect(()=>{RELAX_SENS=sens;store.save({sens});},[sens]);
  useEffect(()=>{audio.setMuted(muted);store.save({muted});},[muted]);
  useEffect(()=>{store.save({garden});},[garden]);
  // Unlock detection
  const prevUnlockedRef=useRef(null);
  useEffect(()=>{
    if(prevUnlockedRef.current===null){prevUnlockedRef.current=garden.unlocked;return;}
    const fresh=garden.unlocked.filter(id=>!prevUnlockedRef.current.includes(id));
    if(fresh.length)setNewUnlock(GARDEN_BY_ID[fresh[0]]||null);
    prevUnlockedRef.current=garden.unlocked;
  },[garden.unlocked]);
  // PWA install prompt listener
  useEffect(()=>{
    const onPrompt=e=>{e.preventDefault();setInstallPrompt(e);};
    const onInstalled=()=>setInstallPrompt(null);
    window.addEventListener("beforeinstallprompt",onPrompt);
    window.addEventListener("appinstalled",onInstalled);
    return()=>{window.removeEventListener("beforeinstallprompt",onPrompt);window.removeEventListener("appinstalled",onInstalled);};
  },[]);
  const triggerInstall=useCallback(async()=>{if(!installPrompt)return;installPrompt.prompt();const c=await installPrompt.userChoice;if(c&&c.outcome==="accepted")setInstallPrompt(null);},[installPrompt]);
  const dismissInstall=useCallback(()=>{setInstallDismissed(true);store.save({installDismissed:true});},[]);

  const addGrowth=useCallback((n=1)=>setGarden(g=>{
    const growth=g.growth+n;
    const unlocked=[...g.unlocked];
    for(const step of GARDEN_LADDER)if(!unlocked.includes(step.id)&&growth>=step.threshold)unlocked.push(step.id);
    return{...g,growth,unlocked};
  }),[]);
  const saveTimer=useRef(0);
  const record=useCallback((ch,ok,lat)=>{
    if(!SYMBOL_SET.has(ch))return;
    setStats(prev=>{
      const c=prev[ch];
      const next={...prev,[ch]:{attempts:c.attempts+1,errors:c.errors+(ok?0:1),lat:ok?[...c.lat.slice(-30),lat]:c.lat}};
      clearTimeout(saveTimer.current);
      const id=ACTIVE_TPL.id;
      saveTimer.current=setTimeout(()=>saveStatsFor(id,next),400);
      return next;
    });
  },[]);
  const chooseTemplate=(id)=>{
    applyTemplate(id);setStats(loadStats(id));setMode("home");setShowSet(false);setTplId(id);store.save({template:id});
    if(!store.load().onboardSeen)setShowOnboard(true);
  };
  const dismissOnboard=()=>{setShowOnboard(false);setMode("drill");store.save({onboardSeen:true});};
  const toggleMute=()=>setMuted(m=>!m);
  const resetAll=()=>{store.clear();setStats(blankStatsFor(ACTIVE_TPL));setGarden(blankGarden());setSens(0.4);setMuted(false);setShowSet(false);};
  const sensLabel=sens<0.25?"Rarely":sens<0.55?"Calm":sens<0.8?"Attentive":"Eager";
  const total=useMemo(()=>Object.values(stats).reduce((s,x)=>s+x.attempts,0),[stats]);

  // Touch/no-keyboard: show a friendly notice instead of a broken experience
  if(isTouch&&tplId) return(
    <div className="kf-root">
      <header className="kf-head"><div className="kf-brand"><span className="kf-glyph">{"{ }"}</span><h1>Keygarden</h1></div></header>
      <div className="kf-touch-notice">
        <h2>⌨️ Keygarden needs a physical keyboard</h2>
        <p>This typing trainer is designed for desktop use with a real keyboard. Open it on a laptop or desktop for the full experience.</p>
      </div>
    </div>
  );

  if(!tplId) return (
    <div className="kf-root">
      <header className="kf-head">
        <div className="kf-brand"><span className="kf-glyph">{"{ }"}</span><h1>Keygarden</h1></div>
        <p className="kf-tag">typing practice for the symbols your field runs on</p>
      </header>
      <Picker onPick={chooseTemplate}/>
    </div>
  );

  return (
    <div className="kf-root">
      {showOnboard&&<Onboard field={ACTIVE_TPL} onDismiss={dismissOnboard}/>}
      {newUnlock&&<GardenUnlockToast step={newUnlock} onClose={()=>setNewUnlock(null)}/>}
      <header className="kf-head">
        <div className="kf-brand"><span className="kf-glyph">{"{ }"}</span><h1>Keygarden</h1></div>
        <span className="kf-field-chip">{ACTIVE_TPL.label}</span>
      </header>
      <nav className="kf-nav">
        <button className={mode==="drill"?"on":""} onClick={()=>setMode("drill")}>Drill keys</button>
        <button className={mode==="snippet"?"on":""} onClick={()=>setMode("snippet")}>Type snippets</button>
        <button className={mode==="garden"?"on":""} onClick={()=>setMode("garden")}>Garden</button>
        <button className={mode==="home"?"on":""} onClick={()=>setMode("home")}>Progress</button>
        {installPrompt&&!installDismissed&&!isStandalone&&(
          <span className="kf-install kf-fade" onClick={triggerInstall} title="Install as a desktop app">
            <span>⬇ Install app</span>
            <span className="kf-install-x" onClick={e=>{e.stopPropagation();dismissInstall();}} title="Not now">×</span>
          </span>
        )}
        <button className={"kf-mute"+(muted?" off":"")} onClick={toggleMute} title={muted?"sound off":"sound on"}>♪</button>
        <button className="kf-mute" onClick={()=>setShowSet(s=>!s)} title="settings">⚙</button>
      </nav>
      {showSet&&(
        <div className="kf-settings kf-fade">
          <label>Field</label>
          <div className="kf-tracks" style={{marginTop:".5rem"}}>
            {TEMPLATES.map(t=><button key={t.id} className={t.id===tplId?"on":""} onClick={()=>chooseTemplate(t.id)}>{t.label}</button>)}
          </div>
          <label style={{display:"block",marginTop:"1rem"}}>Relax prompts: <strong>{sensLabel}</strong></label>
          <input type="range" min="0" max="1" step="0.05" value={sens} onChange={e=>setSens(parseFloat(e.target.value))}/>
          <div className="kf-slabels"><span>rarely</span><span>eager</span></div>
          <p className="kf-dim">Triggered by mistakes or long pauses — never by speed. Lower = leaves you alone more.</p>
          <button className="kf-reset" onClick={resetAll}>Reset all progress & settings</button>
        </div>
      )}
      <main className="kf-main" key={tplId}>
        {mode==="garden"&&<Garden garden={garden}/>}

      </main>
    </div>
  );
}

  return (
    <div className="kf-heat">
      {SYMBOLS.map(s=>{const st=stats[s.ch];const acc=st.attempts?1-st.errors/st.attempts:null;const ml=Math.round(mean(st.lat));const hue=acc===null?null:95-(1-acc)*95;
        return (
          <div key={s.ch} className="kf-cell"
            style={{background:acc===null?"var(--sheet-head)":`hsl(${hue},48%,${90-acc*8}%)`,borderColor:acc===null?"var(--line)":`hsl(${hue},42%,${80-acc*8}%)`}}
            title={acc===null?"untouched":`${Math.round(acc*100)}% · ${ml}ms · ${st.attempts} hits`}>
            <span className="kf-cell-ch">{s.ch}</span>
            <span className="kf-cell-meta">{acc===null?"—":`${Math.round(acc*100)}%`}</span>
          </div>
        );})}
    </div>
  );
}

function Drill({stats,record,addGrowth}){
  const statsRef=useRef(stats);statsRef.current=stats;
  const warm=useRef(0); // index into SYMBOLS during the one-pass warmup
  const [target,setTarget]=useState(()=>SYMBOLS[0]); // begin on the easiest key
  const [flash,setFlash]=useState(null);
  const [hint,setHint]=useState(null);
  const [cel,setCel]=useState(0);
  const [celLvl,setCelLvl]=useState(1);
  const shownAt=useRef(performance.now());
  const streak=useRef(0);
  const relax=useRelaxCue();
  useEffect(()=>{audio.duck(relax.show);},[relax.show]);
  const next=useCallback(()=>{
    warm.current++;
    setTarget(warm.current<SYMBOLS.length?SYMBOLS[warm.current]:pick(statsRef.current));
    shownAt.current=performance.now();
  },[]);
  useEffect(()=>{
    shownAt.current=performance.now();
    const onKey=e=>{
      if(e.metaKey||e.ctrlKey||e.altKey)return;
      if(e.key.length!==1)return;
      e.preventDefault();
      const lat=performance.now()-shownAt.current;
      const ok=e.key===target.ch;
      record(target.ch,ok,lat);relax.report(ok,lat);audio.playKey(ok);
      if(ok){
        setHint(null);
        const finishedWarmup=warm.current===SYMBOLS.length-1; // last warmup key just cleared
        streak.current+=1;
        if(finishedWarmup||streak.current%12===0){audio.milestone();setCelLvl(finishedWarmup?2:Math.min(Math.floor(streak.current/12),4));setCel(c=>c+1);addGrowth(1);}
      }
      else{setHint(diagnose(target.ch,e.key));streak.current=0;}
      setFlash(ok?"ok":"miss");setTimeout(()=>setFlash(null),180);
      if(ok)setTimeout(next,120);
    };
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[target,record,next,relax]);
  return (
    <section className="kf-card kf-fade kf-center">
      {relax.show&&<RelaxOverlay onClose={relax.dismiss}/>}
      <Celebrate trigger={cel} level={celLvl}/>
      <p className="kf-dim">{warm.current<SYMBOLS.length?`Warm-up · ${warm.current+1}/${SYMBOLS.length}`:"Adaptive practice"} — no timer, no penalty.</p>
      <div className={"kf-bigkey "+(flash||"")}>{target.ch}</div>
      <p className="kf-name">{target.name}</p>
      <p className="kf-finger">{target.finger}</p>
      {hint&&<p className="kf-hint" key={hint}>{hint}</p>}
    </section>
  );
}

function Snippet({record,addGrowth}){
  const [track,setTrack]=useState("Mixed");
  const pool=useMemo(()=>track==="Mixed"?SNIPPETS:SNIPPETS.filter(s=>s.track===track),[track]);
  const [snip,setSnip]=useState(()=>pool[0]);
  const [pos,setPos]=useState(0);
  const [wrong,setWrong]=useState(false);
  const [hint,setHint]=useState(null);
  const [auto,setAuto]=useState(()=>new Set()); // indices the "editor" auto-filled
  const [cel,setCel]=useState(0);
  const [celLvl,setCelLvl]=useState(1);
  const stack=useRef([]);
  const lastAt=useRef(performance.now());
  const errs=useRef(0);
  const relax=useRelaxCue();
  useEffect(()=>{audio.duck(relax.show);},[relax.show]);
  const loadNext=useCallback(p=>{const list=p||pool;setSnip(list[Math.floor(Math.random()*list.length)]);setPos(0);setWrong(false);setHint(null);setAuto(new Set());stack.current=[];errs.current=0;lastAt.current=performance.now();},[pool]);
  useEffect(()=>{loadNext(pool);},[track]); // eslint-disable-line
  useEffect(()=>{
    const onKey=e=>{
      if(e.metaKey||e.ctrlKey||e.altKey)return;
      if(e.key.length!==1)return;
      e.preventDefault();
      const want=snip.text[pos];
      const lat=performance.now()-lastAt.current;
      const ok=e.key===want;
      if(SYMBOL_SET.has(want))record(want,ok,lat);
      relax.report(ok,lat);audio.playKey(ok);
      if(ok){
        setWrong(false);setHint(null);lastAt.current=performance.now();
        const top=stack.current[stack.current.length-1];
        const closingQuote=(want==='"'||want==="'")&&top===want;
        if(PAIRS[want]&&!closingQuote)stack.current.push(PAIRS[want]); // opener owes a closer
        else if(closingQuote)stack.current.pop();                      // manual closing quote
        let np=pos+1;const skipped=[];
        while(np<snip.text.length&&stack.current.length&&snip.text[np]===stack.current[stack.current.length-1]){
          stack.current.pop();skipped.push(np);np++; // closer auto-fills; you don't type it
        }
        if(skipped.length)setAuto(prev=>{const s=new Set(prev);skipped.forEach(i=>s.add(i));return s;});
        setPos(np); // always advance, even off the end, so the line closes cleanly
        if(np>=snip.text.length){if(errs.current===0){audio.milestone();setCelLvl(snip.text.length>=24?3:snip.text.length>=16?2:1);setCel(c=>c+1);addGrowth(1);}setTimeout(()=>loadNext(),380);}
      }else{errs.current+=1;setWrong(true);setHint(diagnose(want,e.key));setTimeout(()=>setWrong(false),200);}
    };
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[snip,pos,record,loadNext,relax]);
  return (
    <section className="kf-card kf-fade">
      {relax.show&&<RelaxOverlay onClose={relax.dismiss}/>}
      <Celebrate trigger={cel} level={celLvl}/>
      <div className="kf-tracks">
        {TRACKS.map(t=><button key={t} className={t===track?"on":""} onClick={()=>setTrack(t)}>{t}</button>)}
      </div>
      <p className="kf-dim">Closers auto-fill, like your editor — just type the openers. <code>{snip.track}</code></p>
      <div className={"kf-snip "+(wrong?"wrong":"")}>
        {snip.text.split("").map((c,i)=><span key={i} className={(i<pos?"done":i===pos?"cur":"pending")+(auto.has(i)?" auto":"")}>{c===" "?"\u00A0":c}</span>)}
      </div>
      {hint&&<p className="kf-hint" key={hint}>{hint}</p>}
    </section>
  );
}

// shared sensitivity, 0 (rarely) .. 1 (eager); default calm
let RELAX_SENS = 0.4;
function useRelaxCue(){
  const [show,setShow]=useState(false);
  const recent=useRef([]);const cooldown=useRef(0);const spikes=useRef(0);
  const report=useCallback((ok,lat)=>{
    const r=recent.current;r.push({ok,lat});if(r.length>16)r.shift();
    if(performance.now()<cooldown.current)return;
    // sensitivity maps to thresholds: low sens = needs more evidence
    const errNeeded=Math.round(7-RELAX_SENS*4);      // 0→7 errors … 1→3 errors
    const spikeMult=4.5-RELAX_SENS*1.5;              // 0→4.5× … 1→3× the median gap
    const spikesNeeded=RELAX_SENS>0.66?1:2;          // only eager mode trips on a single pause
    const med=median(r.map(x=>x.lat));
    if(med>0 && lat>med*spikeMult && lat>450) spikes.current++; else spikes.current=Math.max(0,spikes.current-1);
    const errCount=r.filter(x=>!x.ok).length;
    if(r.length>=12 && (errCount>=errNeeded || spikes.current>=spikesNeeded)){
      setShow(true);recent.current=[];spikes.current=0;cooldown.current=performance.now()+60000;
    }
  },[]);
  const dismiss=useCallback(()=>setShow(false),[]);
  return {show,report,dismiss};
}
const PRAISE=["Clean","Nice flow","Smooth","Locked in","Effortless","No misses","Flowing","Crisp"];
const PRAISE_HI=["On fire","Unstoppable","Flawless run","In the zone","Masterful"];
function Celebrate({trigger,level=1}){
  const [state,setState]=useState(null);
  useEffect(()=>{
    if(!trigger)return;
    const L=Math.max(1,Math.min(level,4));
    const hi=L>=3;
    const pool=hi?PRAISE_HI:PRAISE;
    setState({L,hi,word:pool[Math.floor(Math.random()*pool.length)]});
    const t=setTimeout(()=>setState(null),1100);
    return ()=>clearTimeout(t);
  },[trigger]);
  if(!state)return null;
  const {L,hi,word}=state;
  const count=6+L*5;            // 11 → 26 particles
  const radius=40+L*16;         // 56 → 104 px
  const parts=Array.from({length:count},(_,i)=>{
    const ang=(i/count)*Math.PI*2+(i%2?0.3:0);
    const r=radius*(0.7+Math.random()*0.5);
    return [Math.cos(ang)*r,Math.sin(ang)*r,i%2];
  });
  return (
    <div className="kf-celebrate" key={trigger}>
      <div className={"kf-check"+(hi?" hi":"")} style={{width:(48+L*8)+"px",height:(48+L*8)+"px",fontSize:(1.6+L*0.15)+"rem"}}>✓</div>
      {parts.map((d,i)=><span key={i} className="kf-particle" style={{"--tx":d[0]+"px","--ty":d[1]+"px",background:d[2]?"var(--accent)":"var(--good)",width:(7+L)+"px",height:(7+L)+"px"}}/>)}
      <span className={"kf-praise"+(hi?" hi":"")}>{word}{hi?` ×${level}`:""}</span>
    </div>
  );
}

function RelaxOverlay({onClose}){
  useEffect(()=>{const t=setTimeout(onClose,6000);return ()=>clearTimeout(t);},[onClose]);

  );
}

      </g>}

      {has("bat")&&<g>
        {has("oak")
          ?<><rect x="519" y="134" width="11" height="22" fill="#3a2010" rx="1"/><rect x="517" y="132" width="15" height="4" fill="#2a1808" rx="1"/></>
          :<><rect x="474" y="155" width="3.5" height="46" fill="#7a5030" rx="1"/><rect x="466" y="138" width="19" height="20" fill="#3a2010" rx="1"/><rect x="464" y="135" width="23" height="5" fill="#2a1808" rx="1"/></>
        }
        <g className="kf-bat" style={{animation:"batflight 8s ease-in-out infinite"}} transform="translate(480,102)">
          <path d="M0,0 C-12,-9 -22,-1 -14,6 C-9,3 -4,1 0,0" fill="#2d1b4e" opacity=".88"/>
          <path d="M0,0 C12,-9 22,-1 14,6 C9,3 4,1 0,0" fill="#2d1b4e" opacity=".88"/>
          <ellipse rx="4" ry="3.5" fill="#3d2460"/>
          <circle cx="-1.5" cy="-2" r="1.5" fill="#5a3880"/><circle cx="1.5" cy="-2" r="1.5" fill="#5a3880"/>
        </g>
        {[[458,184],[488,173],[510,187],[470,193],[498,197]].map(([fx,fy],i)=>(
          <circle key={i} className="kf-firefly" cx={fx} cy={fy} r="2.5" fill="#a8ff78"
            style={{animation:`glow ${1.4+i*0.35}s ease-in-out infinite ${i*0.28}s`}} opacity="0.75"/>
        ))}
      </g>}

      {has("cert")&&<g>
        <rect x="630" y="190" width="4" height="15" fill="#7a5c3a" rx="1"/>
        <rect x="619" y="174" width="26" height="18" fill="#fff" rx="3" stroke="#1a7f37" strokeWidth="1.5"/>
        <text x="632" y="184" textAnchor="middle" fontSize="6" fill="#1a7f37" fontWeight="700" fontFamily="system-ui,sans-serif">CERTIFIED</text>
        <text x="632" y="190" textAnchor="middle" fontSize="5.5" fill="#5b6470" fontFamily="system-ui,sans-serif">HABITAT ✓</text>
        <g className="kf-bird" style={{animation:"beefloat 3.8s ease-in-out infinite .6s"}} transform="translate(608,151)">
          <ellipse rx="6.5" ry="3" fill="#059669"/><ellipse cx="-4.5" cy="0" rx="5" ry="3" fill="#047857"/>
          <path d="M-9,0 L-17,-.5" stroke="#333" strokeWidth="1.2" fill="none" strokeLinecap="round"/>
          <circle cx="-5" cy="-.5" r="1.2" fill="#ecfdf5"/><circle cx="-5" cy="-.5" r=".65" fill="#111"/>
          <ellipse cx="1" cy="-3" rx="5" ry="1.8" fill="rgba(16,185,129,.45)" transform="rotate(-15)"/>
          <ellipse cx="1" cy="3" rx="5" ry="1.8" fill="rgba(16,185,129,.45)" transform="rotate(15)"/>
        </g>
      </g>}

      <GardenGhost unlocked={unlocked}/>
    </svg>
  );
}

function Garden({garden}){
  const{growth,unlocked}=garden;
  const done=GARDEN_LADDER.filter(l=>unlocked.includes(l.id));
  const next=GARDEN_LADDER.find(l=>!unlocked.includes(l.id));
  const prevThresh=done.length?done[done.length-1].threshold:0;
  const prog=next?Math.min(1,(growth-prevThresh)/Math.max(1,next.threshold-prevThresh)):1;
  return(
    <section className="kf-card kf-fade">
      <div className="kf-eyebrow">Your garden</div>
      <GardenScene unlocked={unlocked}/>
      {next?(
        <div className="kf-garden-prog-wrap">
          <div className="kf-garden-progbar"><i style={{width:Math.round(prog*100)+"%"}}/></div>
          <span className="kf-garden-next-label">→ {next.name}</span>
        </div>
      ):(
        <p style={{marginTop:".35rem",fontSize:".8rem",color:"var(--good)",fontWeight:700}}>🏆 Fully certified wildlife habitat!</p>
      )}
      {unlocked.length===0&&(
        <p className="kf-garden-empty">Your garden is bare soil and possibility.<br/><span style={{fontSize:".74rem"}}>Each clean drill streak or snippet adds growth. Nothing wilts — it'll wait for you.</span></p>
      )}
      <div className="kf-garden-ladder">
        {GARDEN_LADDER.map(l=>{
          const st=unlocked.includes(l.id)?"done":next&&next.id===l.id?"next":"locked";
          return(
            <div key={l.id} className={"kf-ladder-step "+st}>
              <span className="kf-ladder-ic">{l.emoji}</span>
              <div>
                <span className="kf-ladder-name">{st==="done"?"✓ ":""}{l.name}</span>
                {st==="done"&&<p className="kf-ladder-fact">{l.fact}</p>}
                {st==="next"&&<p className="kf-ladder-fact">Coming next — keep typing.</p>}
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );
}
