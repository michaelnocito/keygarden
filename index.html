<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keygarden — symbol typing trainer</title>
<meta name="description" content="A calm typing trainer for the brackets, braces, and operators that slow data analysts down in SQL, Python, Excel, Tableau, and Power BI. No timer, no score, nothing to fail." />
<meta name="theme-color" content="#2f6df0" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Keygarden" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<style>
  /* ── Nocito calm-analyst design system (canonical: spreadsheet-archaeology/DESIGN_SYSTEM.md) ──
     Light theme, soft shadows, restrained color. System-ui for chrome; monospace only for code/keys. */
  *{box-sizing:border-box;}
  body{margin:0;}
  #root{
    --bg:#eef1f5;--panel:#ffffff;--line:#d6dce4;
    --shadow:0 1px 2px rgba(20,30,50,.06),0 6px 20px rgba(20,30,50,.06);
    --ink:#1f2328;--dim:#5b6470;
    --accent:#2f6df0;--accent-d:#1f4fc4;--accent-bg:#eef4ff;--accent-bd:#d4e1ff;
    --good:#1a7f37;--good-bg:#e7f6ec;--good-bd:#bfe5ca;
    --bad:#cf222e;--bad-bg:#fdecee;
    --warm:#9a6700;--warm-bg:#fbf7ec;--warm-bd:#e3d7a5;
    --sheet-head:#f3f5f8;
    --mono:"Consolas",ui-monospace,SFMono-Regular,Menlo,monospace;
    /* Responsive scaling: small laptop/high-zoom defaults; bumped at 1100px and 1400px breakpoints */
    --rail-w:220px;
    --kbd-key:26px;
    --kbd-font:8px;
    --kbd-max:460px;
    --bigkey:3.1rem;
    --place-where:.92rem;
    --place-finger:.72rem;
    --name-size:.82rem;
    --sketch-canvas:92px;
    --sketch-w:100px;
    --slot-size:1.4rem;
    --slot-font:.88rem;
    --stage-max:1180px;
    min-height:100vh;background:radial-gradient(120% 120% at 50% 0%,#f6f8fb 0%,#eef1f5 62%);
    color:var(--ink);font:15px/1.55 -apple-system,"Segoe UI",Roboto,system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    padding:0;display:block;}
  /* Responsive scaling overrides — use more real estate on bigger displays */
  @media (min-width:1100px){
    #root{--rail-w:260px;--kbd-key:32px;--kbd-font:10px;--kbd-max:600px;--bigkey:4.4rem;--place-where:1.1rem;--place-finger:.82rem;--name-size:.95rem;--sketch-canvas:130px;--sketch-w:144px;--slot-size:1.7rem;--slot-font:1.05rem;--stage-max:1380px;}
  }
  @media (min-width:1400px){
    #root{--rail-w:300px;--kbd-key:38px;--kbd-font:11px;--kbd-max:760px;--bigkey:5.6rem;--place-where:1.3rem;--place-finger:.92rem;--name-size:1.05rem;--sketch-canvas:172px;--sketch-w:188px;--slot-size:1.95rem;--slot-font:1.2rem;--stage-max:1560px;}
  }
  /* ── Desktop shell: sticky top bar + two-column stage (progress rail + work area) ── */
  .kf-topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:.5rem;padding:.3rem .9rem;background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(20,30,50,.03);}
  .kf-brand{display:flex;align-items:center;gap:.5rem;}
  .kf-glyph{font-family:var(--mono);color:var(--accent);font-size:.82rem;letter-spacing:-2px;background:linear-gradient(135deg,#eaf1ff,#dbe7ff);padding:.1rem .3rem;border-radius:6px;}
  .kf-brandname{font-weight:700;font-size:.88rem;letter-spacing:-.4px;color:var(--ink);}
  .kf-nav{display:flex;gap:.4rem;margin-left:.8rem;align-items:center;}
  .kf-nav button{font-family:inherit;font-size:.72rem;font-weight:600;color:var(--dim);background:var(--sheet-head);border:1px solid var(--line);padding:.25rem .7rem;border-radius:999px;cursor:pointer;transition:.18s;}
  .kf-nav button:hover{color:var(--accent-d);border-color:var(--accent-bd);}
  .kf-nav button.on{color:#fff;background:var(--accent);border-color:var(--accent);box-shadow:0 2px 8px rgba(47,109,240,.3);}
  .kf-controls{margin-left:auto;display:flex;gap:.4rem;align-items:center;}
  /* PWA install pill — surfaces the browser's install action in a place users actually see */
  .kf-install{display:inline-flex;align-items:center;gap:.3rem;font-family:inherit;font-size:.7rem;font-weight:700;color:var(--accent-d);background:var(--accent-bg);border:1px solid var(--accent-bd);padding:.25rem .35rem .25rem .6rem;border-radius:999px;cursor:pointer;transition:background .15s,color .15s,transform .12s;user-select:none;}
  .kf-install:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-1px);}
  .kf-install-arrow{font-size:.78rem;line-height:1;}
  .kf-install-label{white-space:nowrap;}
  .kf-install-x{display:inline-flex;align-items:center;justify-content:center;width:1rem;height:1rem;border-radius:50%;color:var(--dim);font-size:.92rem;line-height:1;margin-left:.1rem;transition:background .12s,color .12s;}
  .kf-install:hover .kf-install-x{color:rgba(255,255,255,.85);}
  .kf-install-x:hover{background:rgba(0,0,0,.12);color:var(--ink);}
  .kf-install:hover .kf-install-x:hover{background:rgba(255,255,255,.25);color:#fff;}
  @media (max-width:520px){ .kf-install-label{display:none;} }
  .kf-mute{width:1.65rem;height:1.65rem;padding:0!important;border-radius:50%!important;font-size:.78rem;font-family:inherit;font-weight:700;color:var(--dim);background:var(--sheet-head);border:1px solid var(--line);cursor:pointer;transition:.18s;}
  .kf-mute:hover{color:var(--accent-d);border-color:var(--accent-bd);}
  .kf-mute.on{color:#fff;background:var(--accent);border-color:var(--accent);}
  .kf-mute.off{opacity:.4;text-decoration:line-through;}
  .kf-stage{max-width:var(--stage-max);margin:.6rem auto;padding:0 .9rem 1.5rem;display:grid;grid-template-columns:var(--rail-w) 1fr;gap:.9rem;align-items:start;}
  .kf-rail{position:sticky;top:50px;align-self:start;max-height:calc(100vh - 60px);overflow-y:auto;display:flex;flex-direction:column;gap:.4rem;padding-bottom:.4rem;}
  .kf-work{min-width:0;}
  .kf-railcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:.5rem .7rem;}
  @media (max-width:880px){
    .kf-stage{grid-template-columns:1fr;gap:1rem;margin-top:1rem;}
    .kf-rail{position:static;max-height:none;overflow:visible;order:1;}
    .kf-work{order:2;}
    .kf-nav{margin-left:0;}
    .kf-topbar{flex-wrap:wrap;}
  }
  /* settings as a dropdown panel from the top-right */
  .kf-settings-wrap{position:fixed;inset:0;z-index:30;display:flex;justify-content:flex-end;padding:3.6rem 1.5rem 1rem;background:rgba(20,30,50,.12);}
  .kf-settings{width:100%;max-width:380px;align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 50px -18px rgba(20,30,50,.45);padding:1.1rem 1.3rem;max-height:82vh;overflow:auto;}
  .kf-settings label{font-size:.9rem;color:var(--ink);}
  .kf-settings label strong{color:var(--accent-d);}
  .kf-settings input[type=range]{width:100%;margin:.7rem 0 .2rem;accent-color:var(--accent);cursor:pointer;}
  .kf-slabels{display:flex;justify-content:space-between;font-size:.66rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
  .kf-settings .kf-dim{margin:.6rem 0 0;}
  .kf-reset{margin-top:.9rem;font-family:inherit;font-size:.72rem;font-weight:600;color:var(--bad);background:transparent;border:1px solid rgba(207,34,46,.3);padding:.4rem .8rem;border-radius:8px;cursor:pointer;transition:.15s;}
  .kf-reset:hover{background:var(--bad-bg);}
  .kf-main{width:100%;}
  .kf-card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:.85rem 1.1rem 1rem;box-shadow:var(--shadow);}
  .kf-eyebrow{font-size:9px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--accent-d);margin:0 0 .25rem;}
  .kf-celebrate{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:6;}
  .kf-check{border-radius:50%;background:var(--good);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 8px 24px -6px rgba(26,127,55,.5);animation:pop .55s cubic-bezier(.2,1.5,.4,1),celebfade .35s ease-out .7s forwards;}
  .kf-check.hi{background:var(--accent);box-shadow:0 8px 30px -4px rgba(47,109,240,.55);}
  .kf-praise.hi{color:var(--accent-d);font-weight:700;}
  @keyframes pop{0%{transform:scale(0);}60%{transform:scale(1.18);}100%{transform:scale(1);}}
  @keyframes celebfade{to{opacity:0;transform:scale(.9);}}
  .kf-praise{position:absolute;top:calc(50% + 44px);font-weight:700;color:var(--good);font-size:1.1rem;white-space:nowrap;animation:praise 1s ease-out forwards;}
  @keyframes praise{0%{opacity:0;transform:translateY(6px);}25%{opacity:1;transform:none;}80%{opacity:1;}100%{opacity:0;}}
  .kf-particle{position:absolute;width:9px;height:9px;border-radius:50%;animation:burst .85s cubic-bezier(.25,.6,.3,1) forwards;}
  @keyframes burst{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}
  .kf-center{text-align:center;}
  /* Typed history: a clean row of slot-boxes (matches the kf-bigkey guide aesthetic).
     Each keystroke fills the next box with the character — correct = blue, wrong = red. */
  .kf-term{display:flex;flex-wrap:wrap;justify-content:center;gap:.25rem;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:.35rem .6rem;margin:.4rem auto 0;max-width:560px;min-height:2.2rem;box-shadow:inset 0 1px 3px rgba(20,30,50,.04);}
  .kf-term-label{font-family:inherit;font-size:.66rem;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--accent-d);margin-right:.4rem;user-select:none;}
  .kf-slot{font-family:var(--mono);font-size:var(--slot-font);font-weight:700;line-height:1;width:var(--slot-size);height:var(--slot-size);display:inline-flex;align-items:center;justify-content:center;border-radius:5px;background:var(--accent-bg);color:var(--accent-d);border:1px solid var(--accent-bd);box-shadow:0 1px 0 rgba(47,109,240,.08);animation:slotpop .35s cubic-bezier(.2,1.6,.4,1);position:relative;}
  .kf-slot.bad{background:var(--bad-bg);color:var(--bad);border-color:rgba(207,34,46,.3);}
  .kf-slot::after{content:"";position:absolute;left:50%;top:50%;width:130%;height:130%;border-radius:50%;border:2px solid var(--accent);opacity:0;transform:translate(-50%,-50%) scale(.5);animation:slotring .5s ease-out forwards;}
  .kf-slot.bad::after{border-color:var(--bad);}
  @keyframes slotpop{0%{transform:scale(0);opacity:0;}55%{transform:scale(1.18);opacity:1;}100%{transform:scale(1);opacity:1;}}
  @keyframes slotring{0%{opacity:.55;transform:translate(-50%,-50%) scale(.6);}100%{opacity:0;transform:translate(-50%,-50%) scale(1.7);}}
  .kf-slot-empty{width:var(--slot-size);height:var(--slot-size);border-radius:5px;border:1.5px dashed var(--accent-bd);background:transparent;animation:caret 1.15s ease-in-out infinite;}
  @keyframes caret{0%,100%{opacity:.5;}50%{opacity:.85;}}
  .kf-newkey{display:inline-block;font-size:.62rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--good);border-radius:999px;padding:.15rem .55rem;margin-bottom:.35rem;animation:fade .3s ease;}
  .kf-fade{animation:fade .4s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .kf-dim{color:var(--dim);font-size:.72rem;}
  .kf-dim code,.kf-focus code{font-family:var(--mono);color:var(--accent-d);background:var(--accent-bg);border:1px solid var(--accent-bd);padding:.05rem .35rem;border-radius:5px;}
  .kf-place{margin:0 auto .35rem;max-width:480px;}
  .kf-place-where{font-size:var(--place-where);line-height:1.25;font-weight:700;color:var(--ink);margin:0;}
  .kf-place-finger{font-size:var(--place-finger);font-weight:600;color:var(--accent-d);margin:.15rem 0 0;letter-spacing:.3px;}
  .kf-focusbar{font-size:.85rem;color:var(--ink);background:var(--warm-bg);border:1px solid var(--warm-bd);border-radius:8px;padding:.35rem .7rem;margin:0 auto .5rem;display:inline-block;}
  .kf-focusbar code{font-family:var(--mono);color:var(--warm);background:#fff;border:1px solid var(--warm-bd);padding:.02rem .3rem;border-radius:5px;margin:0 .08rem;font-size:.95em;}
  .kf-linkbtn{font-family:inherit;font-size:.78rem;font-weight:600;color:var(--accent-d);background:none;border:0;border-bottom:1px solid var(--accent-bd);cursor:pointer;padding:0 0 1px;margin-left:.4rem;}
  .kf-linkbtn:hover{color:var(--accent);}
  .kf-bigkey{font-family:var(--mono);position:relative;font-size:var(--bigkey);font-weight:700;line-height:1;margin:.05rem 0 .2rem;color:var(--ink);transition:.12s;display:inline-block;}
  .kf-bigkey.ok{color:var(--good);transform:scale(.92);}
  .kf-bigkey.ok::after{content:"";position:absolute;left:50%;top:50%;width:1.2em;height:1.2em;border:2px solid var(--good);border-radius:50%;transform:translate(-50%,-50%);animation:ring .45s ease-out forwards;}
  @keyframes ring{0%{opacity:.6;transform:translate(-50%,-50%) scale(.6);}100%{opacity:0;transform:translate(-50%,-50%) scale(1.8);}}
  .kf-bigkey.miss{color:var(--bad);animation:nudge .18s;}
  @keyframes nudge{0%,100%{transform:none;}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
  .kf-name{font-weight:700;font-size:var(--name-size);margin:.05rem 0 0;color:var(--ink);}
  .kf-finger{color:var(--accent-d);font-size:.7rem;font-weight:600;letter-spacing:.5px;}
  .kf-hint{margin:.35rem auto 0;color:var(--warm);font-size:.78rem;background:var(--warm-bg);border:1px solid var(--warm-bd);border-left:3px solid var(--warm);border-radius:6px;padding:.3rem .6rem;display:inline-block;animation:fade .25s ease;max-width:520px;}
  /* keystroke counter (drill + snippet) */
  .kf-counter{font-family:var(--mono);font-size:.62rem;color:var(--dim);letter-spacing:.04em;margin-bottom:.2rem;}
  .kf-counter b{color:var(--ink);}
  /* speech toggle in controls */
  .kf-mute.speech{font-size:.9rem;}
  /* on-screen keyboard diagram */
  .kf-kbd{flex:1 1 auto;min-width:0;max-width:var(--kbd-max);user-select:none;}
  /* keyboard + drawing side-by-side inside the typing card */
  .kf-kbdrow{display:flex;align-items:flex-start;justify-content:center;gap:.6rem;margin:.45rem auto 0;flex-wrap:wrap;}
  /* inline LiveSketch — compact, sits next to the keyboard */
  .kf-sketch-row.inline{flex:0 0 auto;flex-direction:column;align-items:center;gap:.25rem;width:var(--sketch-w);}
  .kf-sketch-row.inline .kf-sketch-canvas{width:var(--sketch-canvas);height:var(--sketch-canvas);border-radius:8px;}
  .kf-sketch-row.inline .kf-sketch-name{font-size:.65rem;margin:.05rem 0 .12rem;text-align:center;line-height:1.1;}
  .kf-sketch-row.inline .kf-sketch-prog{height:4px;margin-bottom:.1rem;}
  .kf-sketch-row.inline.done{background:var(--good-bg);border:1px solid var(--good-bd);border-radius:8px;padding:.3rem;}
  .kf-sketch-row.inline .kf-save,.kf-sketch-row.inline .kf-del{font-size:.62rem;padding:.18rem .45rem;}
  .kf-kbd svg{width:100%;height:auto;display:block;}
  .kf-krow{display:flex;gap:2px;margin-bottom:2px;justify-content:center;}
  .kf-key{font-family:var(--mono);font-size:var(--kbd-font);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:default;transition:background .12s,transform .12s;line-height:1.05;}
  .kf-key.std{height:var(--kbd-key);width:var(--kbd-key);background:var(--sheet-head);border:1px solid var(--line);color:var(--dim);}
  .kf-key.wide{height:var(--kbd-key);width:calc(var(--kbd-key) * 1.55);background:var(--sheet-head);border:1px solid var(--line);color:var(--dim);}
  .kf-key.xwide{height:var(--kbd-key);width:calc(var(--kbd-key) * 2.1);background:var(--sheet-head);border:1px solid var(--line);color:var(--dim);}
  .kf-key.spc{height:var(--kbd-key);width:calc(var(--kbd-key) * 5.4);background:var(--sheet-head);border:1px solid var(--line);color:var(--dim);}
  .kf-key .kf-shifted{font-size:calc(var(--kbd-font) * 0.92);color:var(--dim);opacity:.75;margin-bottom:0;}
  .kf-key .kf-base{font-weight:600;color:var(--ink);}
  .kf-key.finger-lp{background:#eaf3ee;}
  .kf-key.finger-lr{background:#fef3ec;}
  .kf-key.finger-lm{background:#fff8e6;}
  .kf-key.finger-li{background:#fdf2e0;}
  .kf-key.finger-ri{background:#eef4ff;}
  .kf-key.finger-rm{background:#f3eeff;}
  .kf-key.finger-rr{background:#f9eeff;}
  .kf-key.finger-rp{background:#fef0f0;}
  .kf-key.target{background:var(--accent)!important;border-color:var(--accent-d)!important;box-shadow:0 2px 10px rgba(47,109,240,.4);transform:scale(1.08);}
  .kf-key.target .kf-base,.kf-key.target .kf-shifted{color:#fff!important;}
  .kf-key.target-shift{background:#7b68ee!important;border-color:#6a5bc4!important;}
  .kf-key.target-shift .kf-base{color:#fff!important;}
  .kf-key.wrong{background:var(--bad)!important;border-color:#b01a24!important;animation:nudge .18s;}
  .kf-key.wrong .kf-base,.kf-key.wrong .kf-shifted{color:#fff!important;}
  /* sketch — sits at top of the progress rail; vertical stack in narrow column */
  .kf-sketch-row{display:flex;flex-direction:column;align-items:center;gap:.4rem;}
  .kf-sketch-canvas{width:110px;height:110px;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
  .kf-sketch-canvas svg{width:88%;height:88%;}
  .kf-sketch-info{width:100%;text-align:center;}
  .kf-art{display:block;width:100%;height:100%;}
  .kf-art .ghost{fill:none;stroke:var(--accent-bd);stroke-width:5;stroke-linecap:round;stroke-linejoin:round;}
  .kf-art .ink{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;stroke-linejoin:round;transition:stroke-dashoffset .28s ease-out;}
  .kf-pen-tip{transition:cx .28s ease-out,cy .28s ease-out;}
  /* collapsible rail cards */
  .kf-coll{padding:0;overflow:hidden;}
  .kf-coll-head{display:flex;align-items:center;justify-content:space-between;width:100%;background:transparent;border:0;cursor:pointer;font-family:inherit;text-align:left;padding:.4rem .7rem;transition:background .12s;}
  .kf-coll-head:hover{background:var(--accent-bg);}
  .kf-coll.open .kf-coll-head{border-bottom:1px solid var(--line);}
  .kf-coll-title{display:flex;align-items:baseline;gap:.45rem;}
  .kf-coll-sub{font-size:.65rem;color:var(--dim);font-weight:500;}
  .kf-coll-chev{font-size:.82rem;color:var(--dim);transition:transform .18s ease;display:inline-block;}
  .kf-coll.open .kf-coll-chev{transform:rotate(180deg);color:var(--accent-d);}
  .kf-coll-body{padding:.45rem .7rem .6rem;animation:fade .25s ease;max-height:240px;overflow-y:auto;}
  .kf-coll-body::-webkit-scrollbar{width:6px;}
  .kf-coll-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  .kf-coll-body::-webkit-scrollbar-thumb:hover{background:var(--dim);}
  .kf-sketch-info{flex:1 1 auto;min-width:0;}
  .kf-sketch-status{font-size:.62rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-d);margin:0 0 .1rem;}
  .kf-sketch-name{font-size:.82rem;font-weight:700;color:var(--ink);margin:0 0 .25rem;}
  .kf-sketch-prog{height:5px;border-radius:999px;background:var(--sheet-head);border:1px solid var(--line);overflow:hidden;margin-bottom:.25rem;}
  .kf-sketch-prog i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .28s ease-out;}
  .kf-pen-tip{transition:transform .32s ease-out;pointer-events:none;}
  .kf-snip{font-family:var(--mono);font-size:1.05rem;line-height:1.75;letter-spacing:.3px;margin:.4rem 0 .25rem;word-break:break-word;border-radius:7px;padding:.4rem;transition:.15s;}
  .kf-snip.wrong{background:var(--bad-bg);}
  .kf-snip .done{color:var(--good);}
  .kf-snip .auto{color:var(--good);opacity:.6;font-style:italic;border-bottom:1px dotted var(--good);}
  .kf-snip .pending{color:var(--dim);opacity:.55;}
  .kf-snip .cur{color:#fff;background:var(--accent);border-radius:4px;padding:.05rem .12rem;box-shadow:0 0 0 2px rgba(47,109,240,.25);}
  .kf-tracks{display:flex;gap:.25rem;flex-wrap:wrap;margin-bottom:.4rem;align-items:center;}
  .kf-tracks-label{font-size:.56rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-right:.15rem;}
  .kf-tracks button{font-family:inherit;font-size:.62rem;font-weight:600;color:var(--dim);background:var(--sheet-head);border:1px solid var(--line);padding:.15rem .5rem;border-radius:999px;cursor:pointer;transition:.15s;}
  .kf-tracks button:hover{color:var(--accent-d);border-color:var(--accent-bd);}
  .kf-tracks button.on{color:#fff;background:var(--accent);border-color:var(--accent);}
  .kf-card h2{font-weight:700;margin:0 0 1rem;font-size:1.4rem;color:var(--ink);}
  .kf-focus{font-size:.85rem;margin:0 0 1.3rem;}
  .kf-focus code{margin-right:.3rem;font-size:1rem;}
  .kf-heat{display:grid;grid-template-columns:repeat(auto-fill,minmax(36px,1fr));gap:.22rem;}
  .kf-cell{border-radius:6px;padding:.25rem .1rem;text-align:center;border:1px solid var(--line);}
  .kf-cell-ch{font-family:var(--mono);display:block;font-size:.78rem;font-weight:600;color:var(--ink);}
  .kf-cell-meta{display:block;font-size:.5rem;color:var(--dim);margin-top:.05rem;}
  .kf-empty{text-align:center;}
  .kf-empty p{margin:.5rem 0;}
  .kf-empty p:first-child{font-weight:700;font-size:1.25rem;color:var(--ink);}
  .kf-relax{position:fixed;inset:0;background:linear-gradient(180deg,#1b2a44 0%,#243a5e 55%,#33506f 100%);color:#eaf0fb;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;cursor:pointer;text-align:center;padding:2rem;animation:fade .5s ease;}
  .kf-relax p{font-weight:700;font-size:2rem;margin:.5rem 0 0;}
  .kf-relax .kf-dim{color:#cdddf5;font-size:1.15rem;line-height:1.5;max-width:420px;margin-top:.6rem;}
  .kf-relax .kf-skip{position:absolute;bottom:1.4rem;font-size:.72rem;color:#8fa3c4;letter-spacing:.04em;}
  .kf-bcount{font-size:.74rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#9fb6da;margin:0 0 1.1rem;}
  .kf-borb{width:130px;height:130px;border-radius:50%;border:2px solid #cfe0ff;background:radial-gradient(circle at 50% 42%,rgba(207,224,255,.4),rgba(207,224,255,.05));box-shadow:0 0 60px rgba(188,208,240,.45);margin-bottom:1.6rem;transform:scale(.55);transition:transform 4s ease-in-out;}
  @media (prefers-reduced-motion:reduce){ .kf-borb{transition:opacity .4s ease!important;transform:scale(.9)!important;} }

  /* ── Welcome / orientation screen (first visit; reopen via ?) ── */
  .kf-welcome-backdrop{position:fixed;inset:0;z-index:40;background:rgba(20,30,50,.45);display:flex;align-items:flex-start;justify-content:center;padding:3rem 1.25rem;overflow:auto;animation:fade .3s ease;}
  .kf-welcome{width:100%;max-width:640px;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 24px 60px -24px rgba(20,30,50,.5);padding:1.5rem 1.6rem 1.6rem;animation:fade .4s ease;}
  .kf-welcome-head{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
  .kf-welcome h2{font-weight:700;font-size:1.45rem;margin:0;color:var(--ink);}
  .kf-welcome-sub{color:var(--dim);font-size:.88rem;margin:.25rem 0 0;}
  .kf-welcome-x{flex:0 0 auto;font-family:inherit;font-size:.72rem;font-weight:600;color:var(--dim);background:var(--sheet-head);border:1px solid var(--line);border-radius:7px;padding:.3rem .65rem;cursor:pointer;transition:.15s;}
  .kf-welcome-x:hover{color:var(--accent-d);border-color:var(--accent-bd);}
  .kf-premise{font-size:.92rem;line-height:1.55;color:#2b3240;margin:1rem 0 1.1rem;}
  .kf-premise b{color:var(--accent-d);}
  .kf-feats{display:flex;flex-direction:column;gap:.55rem;margin:0 0 1.2rem;}
  .kf-feat{display:flex;gap:.8rem;align-items:flex-start;background:var(--sheet-head);border:1px solid var(--line);border-radius:11px;padding:.7rem .85rem;}
  .kf-feat-ic{flex:0 0 auto;width:2rem;height:2rem;border-radius:8px;display:grid;place-items:center;font-family:var(--mono);font-size:1rem;font-weight:700;background:var(--accent-bg);color:var(--accent-d);border:1px solid var(--accent-bd);}
  .kf-feat-b{flex:1 1 auto;min-width:0;}
  .kf-feat-b h4{margin:0 0 .15rem;font-size:.92rem;font-weight:700;color:var(--ink);}
  .kf-feat-step{font-weight:700;color:var(--accent-d);}
  .kf-feat-b p{margin:0;font-size:.82rem;line-height:1.45;color:#41505f;}
  .kf-welcome-cta{display:flex;align-items:center;gap:.95rem;flex-wrap:wrap;}
  .kf-start{font-family:inherit;font-size:.95rem;font-weight:700;color:#fff;background:var(--accent);border:0;border-radius:10px;padding:.7rem 1.4rem;cursor:pointer;box-shadow:0 2px 8px rgba(47,109,240,.3);transition:.15s;}
  .kf-start:hover{background:var(--accent-d);}
  .kf-start:active{transform:translateY(1px);}
  .kf-welcome-cta span{font-size:.82rem;color:var(--dim);}
  .kf-welcome code,.kf-toggle code{font-family:var(--mono);color:var(--accent-d);background:var(--accent-bg);border:1px solid var(--accent-bd);padding:.02rem .3rem;border-radius:5px;font-size:.82em;}
  .kf-toggle{display:flex;align-items:center;gap:.5rem;font-size:.88rem;color:var(--ink);cursor:pointer;margin:.2rem 0 .3rem;}
  .kf-toggle input{accent-color:var(--accent);cursor:pointer;width:1rem;height:1rem;}

  /* ── Charcoal drawing: soft graphite stroke on paper, one muted color accent ── */
  .kf-art{display:block;width:100%;height:100%;}
  .kf-art .ghost{fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
  .kf-art .ink{fill:none;stroke-linecap:round;stroke-linejoin:round;transition:stroke-dashoffset .85s ease;}

  /* live sketch panel — sits under the typing card on Drill + Type snippets */
  .kf-live{display:flex;align-items:center;gap:1rem;width:100%;margin:0;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:.8rem 1rem;animation:fade .4s ease;}
  .kf-live-paper{flex:0 0 auto;width:118px;height:94px;background:linear-gradient(160deg,#f4f3ef,#e7e8ea);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .kf-live-meta{flex:1 1 auto;min-width:0;}
  .kf-live-eyebrow{font-size:.64rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-d);margin:0 0 .15rem;}
  .kf-live-title{font-weight:700;font-size:.95rem;color:var(--ink);margin:0 0 .4rem;}
  .kf-live-bar{height:6px;border-radius:999px;background:var(--sheet-head);border:1px solid var(--line);overflow:hidden;}
  .kf-live-bar i{display:block;height:100%;background:linear-gradient(90deg,#9aa0a6,#46443f);border-radius:999px;transition:width .8s ease;}
  .kf-live-note{font-size:.74rem;color:var(--dim);margin:.4rem 0 0;}
  .kf-live-note b{color:var(--ink);}

  /* Progress: returning-streak banner + finished-sketch collection */
  .kf-streak{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:9px;padding:.35rem .6rem;margin:0;}
  .kf-streak-num{font-size:1.05rem;font-weight:800;color:var(--accent-d);line-height:1;}
  .kf-streak-txt{flex:1 1 140px;font-size:.7rem;color:#2b3240;line-height:1.35;}
  .kf-streak-txt b{color:var(--accent-d);}
  .kf-collection-label{margin:1.5rem 0 .6rem;}
  .kf-collection{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:.25rem;}
  .kf-frame{aspect-ratio:1;background:#fff;border:1px solid var(--line);border-radius:6px;padding:.2rem;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .kf-frame.empty{border-style:dashed;color:var(--line);font-size:1.2rem;}

  /* status report: most-missed keys + "drill just these" */
  .kf-report{background:var(--sheet-head);border:1px solid var(--line);border-radius:12px;padding:.9rem 1rem 1rem;margin:0 0 1.2rem;}
  .kf-missed{display:flex;flex-direction:column;gap:.25rem;margin:.05rem 0 .45rem;}
  .kf-missed-row{display:flex;align-items:center;gap:.35rem;}
  .kf-missed-ch{font-family:var(--mono);font-size:.75rem;font-weight:700;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:4px;width:1.2rem;text-align:center;padding:.03rem 0;flex:0 0 auto;}
  .kf-missed-bar{flex:1 1 auto;height:6px;border-radius:999px;background:#fff;border:1px solid var(--line);overflow:hidden;}
  .kf-missed-bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#e0a45b,var(--bad));transition:width .8s ease;}
  .kf-missed-pct{flex:0 0 auto;width:2rem;text-align:right;font-size:.66rem;font-weight:700;color:var(--bad);}
  .kf-drillthese{font-family:inherit;font-size:.7rem;font-weight:700;color:#fff;background:var(--accent);border:0;border-radius:7px;padding:.3rem .7rem;cursor:pointer;box-shadow:0 2px 6px rgba(47,109,240,.25);transition:.15s;}
  .kf-drillthese:hover{background:var(--accent-d);}
  .kf-drillthese code{font-family:var(--mono);background:rgba(255,255,255,.22);border-radius:4px;padding:.02rem .28rem;margin:0 .08rem;font-size:.92em;}

  /* art-style picker (in settings) + the save/delete moment when a sketch finishes */
  .kf-live.done{border-color:var(--good-bd);background:var(--good-bg);}
  .kf-save-row{display:flex;gap:.5rem;margin-top:.5rem;}
  .kf-save,.kf-del{font-family:inherit;font-size:.78rem;font-weight:700;border-radius:8px;padding:.4rem 1rem;cursor:pointer;border:1px solid transparent;transition:.15s;}
  .kf-save{background:var(--good);color:#fff;box-shadow:0 2px 8px rgba(26,127,55,.25);}
  .kf-save:hover{filter:brightness(1.06);}
  .kf-del{background:#fff;color:var(--bad);border-color:rgba(207,34,46,.3);}
  .kf-del:hover{background:var(--bad-bg);}
  @media (prefers-reduced-motion:reduce){
    .kf-art .ink{transition:none!important;}
  }

  /* ── Biodiversity garden ── */
  .kf-garden-wrap{width:100%;}
  .kf-garden-svg{width:100%;display:block;border-radius:12px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);}
  .kf-garden-prog-wrap{display:flex;align-items:center;gap:.5rem;margin:.5rem 0 .15rem;}
  .kf-garden-progbar{flex:1 1 auto;height:6px;border-radius:999px;background:var(--sheet-head);border:1px solid var(--line);overflow:hidden;}
  .kf-garden-progbar i{display:block;height:100%;background:linear-gradient(90deg,var(--good),#5aaf44);border-radius:999px;transition:width 1.2s ease;}
  .kf-garden-next-label{font-size:.72rem;font-weight:600;color:var(--good);white-space:nowrap;}
  .kf-garden-empty{text-align:center;padding:1.2rem .5rem 0;color:var(--dim);font-size:.85rem;}
  .kf-garden-ladder{display:flex;flex-direction:column;gap:.22rem;margin:.5rem 0 0;}
  .kf-ladder-step{display:flex;align-items:flex-start;gap:.45rem;padding:.28rem .5rem;border-radius:8px;}
  .kf-ladder-step.done{background:var(--good-bg);border:1px solid var(--good-bd);}
  .kf-ladder-step.next{background:var(--accent-bg);border:1px dashed var(--accent-bd);}
  .kf-ladder-step.locked{opacity:.35;background:var(--sheet-head);border:1px solid transparent;}
  .kf-ladder-ic{flex:0 0 1.1rem;font-size:.88rem;text-align:center;line-height:1.4;}
  .kf-ladder-name{font-weight:700;font-size:.78rem;color:var(--ink);}
  .kf-ladder-fact{font-size:.67rem;color:var(--dim);margin:.05rem 0 0;line-height:1.4;font-style:italic;}
  /* Unlock toast (bottom-right, auto-dismisses) */
  .kf-unlock-toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:60;background:var(--panel);border:1px solid var(--good-bd);border-left:4px solid var(--good);border-radius:12px;box-shadow:0 8px 28px -8px rgba(26,127,55,.3);padding:.6rem .85rem .55rem;max-width:270px;cursor:pointer;animation:fade .4s ease;}
  .kf-unlock-head{font-weight:700;font-size:.82rem;color:var(--good);margin:0 0 .12rem;}
  .kf-unlock-body{font-size:.76rem;color:var(--ink);margin:0 0 .12rem;}
  .kf-unlock-fact{font-size:.66rem;color:var(--dim);margin:0;line-height:1.4;font-style:italic;}
  /* Wildlife CSS animations — subtle motion only */
  @keyframes beefloat{0%,100%{transform:translate(0,0);}33%{transform:translate(5px,-4px);}66%{transform:translate(-3px,2px);}}
  @keyframes flutter{0%,100%{transform:scaleX(1);}50%{transform:scaleX(.2)scaleY(1.1);}}
  @keyframes glow{0%,100%{opacity:.18;}50%{opacity:.9;}}
  @keyframes batflight{0%{transform:translate(0,0)scaleX(1);}40%{transform:translate(36px,-12px)scaleX(-1);}100%{transform:translate(0,0)scaleX(1);}}
  @media(prefers-reduced-motion:reduce){
    .kf-bee,.kf-butterfly,.kf-dragonfly,.kf-bird,.kf-bat,.kf-firefly{animation:none!important;opacity:.7!important;}
    .kf-garden-progbar i{transition:none!important;}
  }

  /* ── Field pill in topbar (click to re-open the field picker) ── */
  .kf-field-pill{display:inline-flex;align-items:center;gap:.25rem;margin-left:.55rem;font-size:.66rem;font-weight:700;color:var(--accent-d);background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:999px;padding:.14rem .35rem .14rem .58rem;cursor:pointer;transition:.15s;user-select:none;white-space:nowrap;}
  .kf-field-pill:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .kf-field-pill-caret{font-size:.78rem;line-height:1;opacity:.7;}
  /* Picker "Cancel" link when there's already a chosen field */
  .kf-picker-back{display:inline-flex;align-items:center;gap:.3rem;font-family:inherit;font-size:.78rem;font-weight:600;color:var(--dim);background:transparent;border:1px solid var(--line);border-radius:8px;padding:.32rem .7rem;cursor:pointer;margin-bottom:.85rem;transition:.15s;}
  .kf-picker-back:hover{color:var(--accent-d);border-color:var(--accent-bd);background:var(--accent-bg);}
  .kf-pickbtn.current{border-color:var(--good)!important;background:var(--good-bg)!important;}
  .kf-pickbtn.current::before{content:"✓ Currently active";display:block;font-size:.6rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--good);margin-bottom:.35rem;}
  /* ── First-run field picker grid ── */
  .kf-pickergrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.65rem;}
  .kf-pickbtn{display:flex;flex-direction:column;align-items:flex-start;text-align:left;font-family:inherit;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:.9rem 1rem .8rem;cursor:pointer;transition:.15s;box-shadow:var(--shadow);min-height:96px;}
  .kf-pickbtn:hover{border-color:var(--accent-bd);background:var(--accent-bg);transform:translateY(-2px);box-shadow:0 6px 16px -4px rgba(47,109,240,.18);}
  .kf-pickbtn-label{font-weight:700;font-size:.98rem;color:var(--ink);margin:0 0 .15rem;}
  .kf-pickbtn-blurb{font-size:.72rem;color:var(--dim);line-height:1.4;margin:0 0 .45rem;}
  .kf-pickbtn-syms{font-family:var(--mono);font-size:.78rem;font-weight:700;color:var(--accent-d);letter-spacing:.18em;margin-top:auto;}
  /* ── Field switcher inside settings ── */
  .kf-fieldgrid{display:grid;grid-template-columns:1fr;gap:.3rem;margin-top:.35rem;}
  .kf-fieldbtn{display:flex;flex-direction:column;align-items:flex-start;text-align:left;font-family:inherit;background:var(--sheet-head);border:1px solid var(--line);border-radius:9px;padding:.5rem .7rem;cursor:pointer;transition:.12s;}
  .kf-fieldbtn:hover{background:var(--accent-bg);border-color:var(--accent-bd);}
  .kf-fieldbtn.on{background:var(--accent);border-color:var(--accent);box-shadow:0 2px 8px rgba(47,109,240,.25);}
  .kf-fieldbtn.on .kf-fieldbtn-label,.kf-fieldbtn.on .kf-fieldbtn-blurb{color:#fff;}
  .kf-fieldbtn-label{font-weight:700;font-size:.82rem;color:var(--ink);}
  .kf-fieldbtn-blurb{font-size:.66rem;color:var(--dim);margin-top:.1rem;}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── Data: master symbol DB + per-field templates ──
   Each field swaps which symbols + snippets are practiced. Everything else is shared. */
const SYMBOL_DB = {
  "=": { name:"equals",       finger:"right pinky",          where:"Top row, far right — just left of Backspace",                physKey:"=",  shift:false },
  ";": { name:"semicolon",    finger:"right pinky",          where:"Home row, just right of L",                                  physKey:";",  shift:false },
  "[": { name:"left bracket", finger:"right pinky",          where:"Top-letter row, two keys right of P",                        physKey:"[",  shift:false },
  "]": { name:"right bracket",finger:"right pinky",          where:"Top-letter row, three keys right of P",                      physKey:"]",  shift:false },
  ":": { name:"colon",        finger:"right pinky + Shift",  where:"Home row, right of L — with Shift",                          physKey:";",  shift:true  },
  "_": { name:"underscore",   finger:"right pinky + Shift",  where:"Top number row, right of the 0 — with Shift",                physKey:"-",  shift:true  },
  '"': { name:"double quote", finger:"right pinky + Shift",  where:"Home row, right of the ; key — with Shift",                  physKey:"'",  shift:true  },
  "'": { name:"apostrophe",   finger:"right pinky",          where:"Home row, right of the ; key",                               physKey:"'",  shift:false },
  "(": { name:"left paren",   finger:"right ring + Shift",   where:"Top number row, above the 9 — with Shift",                   physKey:"9",  shift:true  },
  ")": { name:"right paren",  finger:"right pinky + Shift",  where:"Top number row, above the 0 — with Shift",                   physKey:"0",  shift:true  },
  "{": { name:"left brace",   finger:"right pinky + Shift",  where:"Right of P — with Shift",                                    physKey:"[",  shift:true  },
  "}": { name:"right brace",  finger:"right pinky + Shift",  where:"Two keys right of P — with Shift",                           physKey:"]",  shift:true  },
  "*": { name:"asterisk",     finger:"right middle + Shift", where:"Top number row, above the 8 — with Shift",                   physKey:"8",  shift:true  },
  "<": { name:"less than",    finger:"right middle + Shift", where:"Bottom row, just right of M — with Shift",                   physKey:",",  shift:true  },
  ">": { name:"greater than", finger:"right ring + Shift",   where:"Bottom row, two right of M — with Shift",                    physKey:".",  shift:true  },
  "#": { name:"hash",         finger:"left middle + Shift",  where:"Top number row, above the 3 — with Shift",                   physKey:"3",  shift:true  },
  "%": { name:"percent",      finger:"left index + Shift",   where:"Top number row, above the 5 — with Shift",                   physKey:"5",  shift:true  },
  "&": { name:"ampersand",    finger:"right index + Shift",  where:"Top number row, above the 7 — with Shift",                   physKey:"7",  shift:true  },
  "@": { name:"at",           finger:"left ring + Shift",    where:"Top number row, above the 2 — with Shift",                   physKey:"2",  shift:true  },
  "|": { name:"pipe",         finger:"right pinky + Shift",  where:"Top right, above Enter (right of ]) — with Shift",           physKey:"\\", shift:true  },
  ".": { name:"period",       finger:"right ring",           where:"Bottom row, two right of M",                                 physKey:".",  shift:false },
  ",": { name:"comma",        finger:"right middle",         where:"Bottom row, just right of M",                                physKey:",",  shift:false },
  "-": { name:"hyphen",       finger:"right pinky",          where:"Top number row, right of the 0",                             physKey:"-",  shift:false },
  "/": { name:"slash",        finger:"right pinky",          where:"Bottom row, far right (left of right-Shift)",                physKey:"/",  shift:false },
  "?": { name:"question mark",finger:"right pinky + Shift",  where:"Bottom row, far right — with Shift",                         physKey:"/",  shift:true  },
  "!": { name:"exclamation",  finger:"left pinky + Shift",   where:"Top row, above the 1 — with Shift",                          physKey:"1",  shift:true  },
  "$": { name:"dollar",       finger:"left index + Shift",   where:"Top number row, above the 4 — with Shift",                   physKey:"4",  shift:true  },
  "+": { name:"plus",         finger:"right pinky + Shift",  where:"Top row, far right (above =) — with Shift",                  physKey:"=",  shift:true  },
  "~": { name:"tilde",        finger:"left pinky + Shift",   where:"Top-left, above Tab — with Shift",                           physKey:"`",  shift:true  },
  "\\":{ name:"backslash",    finger:"right pinky",          where:"Top-letter row, far right (right of ])",                     physKey:"\\", shift:false },
};
const mk = (chars) => chars.map(ch=>({ch,...SYMBOL_DB[ch]}));

/* ── Templates: each field swaps SYMBOLS + snippets + tracks. Everything else (keyboard
   diagram, learning scheduler, LiveSketch, breathing, ProgressRail, garden, voice) is shared. */
const TEMPLATES = [
  { id:"data", label:"Data & Analytics", blurb:"SQL, Python, Excel, Tableau (the original)",
    symbols: mk(["=",";","[",":","_",'"',"(","{","*","<",">","#","%","&","@","|"]),
    tracks: ["Mixed","SQL","Python","Excel","Tableau","Stats","Power BI"],

/* ── Audio: researched feedback design ──
   correct = soft warm pitched confirmation (low-salience, ignorable in bulk)
   wrong   = low dull "soft-no", quieter, slight downward slip
   reward  = warm rising arpeggio, only on clean line / clean streak */
const PENTA = (() => {
  const iv=[0,3,5,7,10], out=[];
  for(let o=0;o<2;o++) for(const i of iv) out.push(110*2**((o*12+i)/12));
  out.push(110*2**2); return out;
})();

function fade(a,sr){const f=Math.floor(sr*0.005);for(let i=0;i<f&&i<a.length;i++)a[a.length-1-i]*=i/f;return a;}
function norm(a,p){let m=0;for(const v of a)m=Math.max(m,Math.abs(v));if(m>0)for(let i=0;i<a.length;i++)a[i]=a[i]/m*p;return a;}

function warmPad(f,sr,dur=0.22,gain=0.45){
  const n=Math.floor(sr*dur),buf=new Float32Array(n),w=2*Math.PI*f;
  const a=0.008,d=0.12,sus=0.4;
  for(let i=0;i<n;i++){const t=i/sr;let e;
    if(t<a)e=t/a; else if(t<a+d)e=1-(1-sus)*((t-a)/d); else e=sus*Math.max(0,1-(t-a-d)/(dur-a-d));
    buf[i]=(0.7*Math.sin(w*t)+0.2*Math.sin(2*w*t)+0.1*Math.sin(3*w*t))*e*gain;}
  return fade(buf,sr);
}
// correct: warm, gentle upward lift, no harsh high end
function correctVoice(f,sr){
  const dur=0.085,n=Math.floor(sr*dur),buf=new Float32Array(n);let ph=0;
  for(let i=0;i<n;i++){const t=i/sr;
    const finst=f*(1+0.05*(t/dur));        // small rise = "yes"
    ph+=2*Math.PI*finst/sr;
    let s=0.8*Math.sin(ph)+0.2*Math.sin(2*ph); // + soft octave
    s*=Math.exp(-t/0.03);
    if(t<0.0015)s*=t/0.0015;
    buf[i]=s;}
  return fade(norm(buf,0.55),sr);
}
// wrong: low dull soft-no, downward, quieter
function missVoice(sr){
  const dur=0.12,n=Math.floor(sr*dur),buf=new Float32Array(n);let ph=0;
  for(let i=0;i<n;i++){const t=i/sr;
    const finst=165*(1-0.27*(t/dur));      // downward slip
    ph+=2*Math.PI*finst/sr;
    let s=Math.sin(ph)*Math.exp(-t/0.04);
    if(t<0.008)s+=(Math.random()*2-1)*0.18*(1-t/0.008); // soft body, low-passed feel
    if(t<0.0015)s*=t/0.0015;
    buf[i]=s;}
  return fade(norm(buf,0.6),sr);
}
// reward: warm rising arpeggio (root, fifth, octave)
function rewardVoice(sr){
  const notes=[220,329.63,440],dur=0.6,n=Math.floor(sr*dur),mix=new Float32Array(n);
  notes.forEach((f,k)=>{const v=warmPad(f,sr,0.26,0.4);const off=Math.floor(sr*0.085*k);
    for(let i=0;i<v.length&&i+off<n;i++)mix[i+off]+=v[i];});
  return fade(norm(mix,0.6),sr);
}

// gentle pentatonic phrase — an unbroken run plays it as a melody
const PHRASE=[0,2,4,5,4,2,3,5,7,5,4,3,2,4,5,7];

class AudioEngine{
  constructor(){this.ctx=null;this.master=null;this.notes=new Map();this.miss=null;this.reward=null;this.muted=false;this.flow=0;this.pad=null;}
  ensure(){
    if(this.ctx)return;
    const AC=window.AudioContext||window.webkitAudioContext;
    this.ctx=new AC();
    this.master=this.ctx.createGain();
    this.master.gain.value=this.muted?0:0.5;
    this.master.connect(this.ctx.destination);
    this.miss=this._buf(missVoice(this.ctx.sampleRate));
    this.reward=this._buf(rewardVoice(this.ctx.sampleRate));
    // flow pad: quiet root+fifth drone behind a lowpass; swells with the streak
    const pg=this.ctx.createGain();pg.gain.value=0;
    const lp=this.ctx.createBiquadFilter();lp.type="lowpass";lp.frequency.value=520;
    pg.connect(lp).connect(this.master);
    [110,164.81].forEach(f=>{const o=this.ctx.createOscillator();o.type="sine";o.frequency.value=f;o.connect(pg);o.start();});
    this.pad=pg;
  }
  _buf(a){const b=this.ctx.createBuffer(1,a.length,this.ctx.sampleRate);b.copyToChannel(a,0);return b;}
  _note(idx){
    if(!this.notes.has(idx)) this.notes.set(idx,this._buf(correctVoice(PENTA[idx],this.ctx.sampleRate)));
    return this.notes.get(idx);
  }
  _play(buf,g=1){if(!buf||this.muted)return;const gn=this.ctx.createGain();gn.gain.value=g;
    const s=this.ctx.createBufferSource();s.buffer=buf;s.connect(gn).connect(this.master);s.start();}
  _pad(g){if(this.pad)this.pad.gain.linearRampToValueAtTime(g,this.ctx.currentTime+0.3);}
  playKey(ok){this.ensure();if(this.ctx.state==="suspended")this.ctx.resume();
    if(ok){this._play(this._note(PHRASE[this.flow%PHRASE.length]));this.flow++;this._pad(Math.min(this.flow/22,1)*0.12);}
    else{this.flow=0;this._pad(0);this._play(this.miss,0.85);}}
  milestone(){if(this.ctx)this._play(this.reward);}
  setMuted(m){this.muted=m;if(this.master)this.master.gain.linearRampToValueAtTime(m?0:0.5,this.ctx.currentTime+0.05);}
  duck(on){if(this.master&&!this.muted)this.master.gain.linearRampToValueAtTime(on?0.12:0.5,this.ctx.currentTime+0.15);}
}

/* ── miss diagnosis: spatial + Shift coaching ── */
const POS=(()=>{
  const rows=["`1234567890-=","qwertyuiop[]\\","asdfghjkl;'","zxcvbnm,./"];
  const sh={"`":"~","1":"!","2":"@","3":"#","4":"$","5":"%","6":"^","7":"&","8":"*","9":"(","0":")","-":"_","=":"+","[":"{","]":"}","\\":"|",";":":","'":'"',",":"<",".":">","/":"?"};
  const m={};
  rows.forEach((row,r)=>row.split("").forEach((base,c)=>{
    const x=c+r*0.4, y=r;
    m[base]={x,y,shift:false,base};
    if(sh[base]) m[sh[base]]={x,y,shift:true,base};
  }));
  for(let i=0;i<26;i++){const lo=String.fromCharCode(97+i);if(m[lo])m[String.fromCharCode(65+i)]={...m[lo],shift:true,base:lo};}
  return m;
})();
const label=ch=>ch===" "?"Space":ch;
function diagnose(targetCh,actualCh){
  const t=POS[targetCh], a=POS[actualCh];
  if(!t) return null;
  if(a){
    if(a.base===t.base){
      if(t.shift&&!a.shift) return `Right key — ${label(targetCh)} just needs Shift.`;
      if(!t.shift&&a.shift) return `Right key — ease off Shift for ${label(targetCh)}.`;
    }
    const dx=t.x-a.x, dy=t.y-a.y, adx=Math.abs(dx), ady=Math.abs(dy);
    const h=dx>0?"right":"left", v=dy>0?"down":"up";
    let dir;
    if(ady<0.5) dir=`just to the ${h}`;
    else if(adx<0.6) dir=`one row ${v}`;
    else dir=`${v} and to the ${h}`;
    return `You hit ${label(actualCh)} — ${label(targetCh)} is ${dir}${t.shift?", with Shift":""}.`;
  }
  return `Not quite — aim for ${label(targetCh)}${t.shift?" (with Shift)":""}.`;
}

const median=a=>{if(!a.length)return 0;const x=[...a].sort((p,q)=>p-q),m=Math.floor(x.length/2);return x.length%2?x[m]:(x[m-1]+x[m])/2;};
